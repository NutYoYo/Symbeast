function exportSave() {
  const raw = localStorage.getItem(SLOT_KEY(currentSlot));
  if(!raw) { alert(T('ไม่มีข้อมูล Save','No save data found')); return; }
  const blob = new Blob([raw], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `symbeast_slot${currentSlot}_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importSave(file) {
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if(!data.pets) { alert(T('ไฟล์ไม่ถูกต้อง','Invalid save file')); return; }
      localStorage.setItem(SLOT_KEY(currentSlot), e.target.result);
      loadGame(currentSlot);
      settingsOpen = false;
      render();
      alert(T('โหลด Save สำเร็จ!','Save loaded successfully!'));
    } catch { alert(T('ไฟล์เสียหาย','Save file corrupted')); }
  };
  reader.readAsText(file);
}

function saveGame() {
  try {
    const _now = Date.now(); totalPlayTime += Math.max(0, _now - _playTimeRef); _playTimeRef = _now;
    localStorage.setItem(SLOT_KEY(currentSlot), JSON.stringify({pets, storage, activePetIdx, inventory, artifactBag, gold, stage, hardMode, hardStage, scoutGrid, scoutPos, savedAt: Date.now(), lastScrollDay, currentBiome, stamina, firstBossKilled, overdriveCharge, towerFloor, towerHighest, towerCheckpoint, towerPendingGold, towerPendingArtifacts, towerRunSummary, seenEvolved:[...seenEvolved], seenFinal:[...seenFinal], totalPlayTime, replayStage, replayHard, towerFirstClears:[...towerFirstClears], scoutFirstClears:[...scoutFirstClears], hellMode, hellStage, vsCurrentStage}));
  } catch(e) {}
}

function getSlotInfo(n) {
  try {
    const raw = localStorage.getItem(SLOT_KEY(n));
    if(!raw) return null;
    const d = JSON.parse(raw);
    const firstName = d.pets?.[0]?.name || '???';
    const firstPhase = d.pets?.[0]?.phase || 'egg';
    const ms = typeof d.totalPlayTime==='number' ? d.totalPlayTime : 0;
    const h = Math.floor(ms/3600000), m = Math.floor((ms%3600000)/60000);
    const timeStr = h>0 ? `${h}h ${m}m` : `${m}m`;
    const stageStr = d.hellMode ? `Hell ${d.hellStage||1}` : d.hardMode ? `Hard ${d.hardStage||1}` : `Stage ${d.stage||1}`;
    const pet0 = d.pets?.[0] ? {...newPet(), ...d.pets[0]} : null;
    return { stage: d.stage||1, name: firstName, phase: firstPhase, timeStr, stageStr, pet0 };
  } catch(e) { return null; }
}

function loadGame(slotNum) {
  try {
    const raw = localStorage.getItem(SLOT_KEY(slotNum));
    if(raw) {
      const d = JSON.parse(raw);
      if(Array.isArray(d.pets) && d.pets.length) {
        pets = d.pets.map(p=>({...newPet(),...p}));
        pets.forEach(p=>{ if(!p.buffExpiry) p.buffExpiry={atk:0,spd:0,def:0}; });
        activePetIdx = d.activePetIdx||0;
        inventory = Array.isArray(d.inventory) ? d.inventory.filter(s=>!s.type.startsWith('artifact_')||s.type==='artifact_box') : [];
        // migrate artifact_ items from old inventory to artifactBag (exclude artifact_box)
        artifactBag = Array.isArray(d.artifactBag) ? d.artifactBag : [];
        if(Array.isArray(d.inventory)) d.inventory.filter(s=>s.type.startsWith('artifact_')&&s.type!=='artifact_box').forEach(s=>{ addArtifactToBag(s.type.slice('artifact_'.length), s.qty); });
        if(typeof d.stage==='number') stage = d.stage;
    if(typeof d.hardMode==='boolean') hardMode = d.hardMode;
    if(typeof d.hardStage==='number') hardStage = d.hardStage;
        gold = (typeof d.gold==='number' && !isNaN(d.gold)) ? d.gold : 0;
        pets.forEach(p=>{ if(typeof p.trainCount !== 'number' || isNaN(p.trainCount)) p.trainCount = 0; });
        // Normalize old symbol format: 'sym_F' → 'F'
        pets.forEach(p=>{ p.symbols = (p.symbols||[]).map(s=>s.length>1?s.split('_').pop():s).filter(s=>'FWS'.includes(s)); });
        if(Array.isArray(d.scoutGrid)&&d.scoutGrid.length) scoutGrid = d.scoutGrid;
        if(d.scoutPos) scoutPos = d.scoutPos;
        if(d.lastScrollDay) lastScrollDay = d.lastScrollDay;
        if(d.currentBiome) currentBiome = d.currentBiome;
        if(d.replayStage) replayStage = d.replayStage;
        if(d.replayHard) replayHard = d.replayHard;
        if(d.stamina !== undefined) stamina = d.stamina;
        if(d.firstBossKilled) firstBossKilled = d.firstBossKilled;
        if(typeof d.overdriveCharge==='number') overdriveCharge = d.overdriveCharge;
        if(typeof d.towerHighest==='number') towerHighest = d.towerHighest;
        if(typeof d.towerFloor==='number') towerFloor = d.towerFloor;
        if(typeof d.towerCheckpoint==='number') towerCheckpoint = d.towerCheckpoint;
        if(typeof d.towerPendingGold==='number') towerPendingGold = d.towerPendingGold;
        if(Array.isArray(d.towerPendingArtifacts)) towerPendingArtifacts = d.towerPendingArtifacts;
        if(d.towerRunSummary && typeof d.towerRunSummary==='object') towerRunSummary = d.towerRunSummary;
        if(Array.isArray(d.seenEvolved)) seenEvolved = new Set(d.seenEvolved);
        if(Array.isArray(d.seenFinal))   seenFinal   = new Set(d.seenFinal);
        if(Array.isArray(d.towerFirstClears)) towerFirstClears = new Set(d.towerFirstClears);
        if(Array.isArray(d.scoutFirstClears)) scoutFirstClears = new Set(d.scoutFirstClears);
        if(typeof d.hellMode==='boolean') hellMode = d.hellMode;
        if(typeof d.hellStage==='number') hellStage = d.hellStage;
        if(typeof d.vsCurrentStage==='number') vsCurrentStage = d.vsCurrentStage;
        if(typeof d.totalPlayTime==='number') totalPlayTime = d.totalPlayTime;
        _playTimeRef = Date.now();
        // backfill from current pets/storage in case save predates this feature
        pets.concat(storage).forEach(p=>{ if(p.phase==='evolved'&&p.formKey) seenEvolved.add(p.formKey); if(p.phase==='final'&&p.finalKey) seenFinal.add(p.finalKey); });
        if(Array.isArray(d.storage)) {
          storage = d.storage.map(p=>({...newPet(),...p}));
          storage.forEach(p=>{ if(!p.buffExpiry) p.buffExpiry={atk:0,spd:0,def:0}; });
          storage.forEach(p=>{ if(typeof p.trainCount !== 'number' || isNaN(p.trainCount)) p.trainCount = 0; });
          storage.forEach(p=>{ p.symbols = (p.symbols||[]).map(s=>s.length>1?s.split('_').pop():s).filter(s=>'FWS'.includes(s)); });
        }
        if(d.savedAt) {
          const elapsed = Math.floor((Date.now() - d.savedAt) / 10000);
          if(elapsed > 0) {
            pets.forEach(p=>{ if(p.phase!=='egg') p.hp = Math.min(p.maxHp, p.hp + elapsed); });
            storage.forEach(p=>{ if(p.phase!=='egg') p.hp = Math.min(p.maxHp, p.hp + elapsed); });
          }
          const staminaRegen = Math.floor((Date.now() - d.savedAt) / 60000);
          if(staminaRegen > 0) stamina = Math.min(MAX_STAMINA, stamina + staminaRegen);
        }
        syncCreature();
        // ONE-TIME DEV CHEAT — remove after testing
        if(!localStorage.getItem('_devCheat1')) {
          ['shiny_egg','box_R','box_E'].forEach(t=>addItemToInventory(t));
          localStorage.setItem('_devCheat1','1');
          scoutToast = '🎁 DEV: Shiny Egg + box_R + box_E added!';
        }
        return true;
      }
    }
  } catch(e) {}
  return false;
}

// ============================================================
// SCOUT GRID
// ============================================================
const GRID = 8;
function idx(x,y) { return y*GRID+x; }

function genScoutGrid() {
  currentBiome = ['desert','forest','grass'][Math.floor(Math.random()*3)];
  scoutGrid = Array(GRID*GRID).fill(null).map(() => ({type:'empty', vis:false}));
  const place = (type, n) => {
    let c=0;
    while(c<n) {
      const i = Math.floor(Math.random()*GRID*GRID);
      if (scoutGrid[i].type==='empty' && i!==0) { scoutGrid[i].type=type; c++; }
    }
  };
  place('monster', 10);
  place('boss', 1);
  if(Math.random() < 0.25) place('mini_boss', 1);
  if(Math.random() < 0.12) place('secret_shop', 1);
  // Assign enemy type by biome
  scoutGrid.forEach(c => { if(c.type==='monster'||c.type==='boss'||c.type==='mini_boss') c.enemyType=pickBiomeEnemyType(c.type==='boss'); });
  place('heal', 1);
  place('treasure', 3);
  place('gold_chest', 2);
  place('rest', 2);
  revealAround(0,0);
}

function revealAround(x,y) {
  for(let dy=-1;dy<=1;dy++) for(let dx=-1;dx<=1;dx++) {
    const nx=x+dx, ny=y+dy;
    if(nx>=0&&nx<GRID&&ny>=0&&ny<GRID) scoutGrid[idx(nx,ny)].vis=true;
  }
}

function moveScout(dx,dy) {
  const nx=scoutPos.x+dx, ny=scoutPos.y+dy;
  if(nx<0||nx>=GRID||ny<0||ny>=GRID) return;
  if(stamina<=0) { scoutToast=T('⚡ Stamina หมด! รอรีเจน 1 AP/นาที','⚡ Stamina empty! Regens 1 AP/min'); render(); return; }
  stamina--;
  scoutPos={x:nx,y:ny};
  revealAround(nx,ny);
  const cell = scoutGrid[idx(nx,ny)];
  const t = cell.type;

  if(t==='heal') {
    const healed = Math.round(creature.maxHp * 0.3);
    creature.hp = Math.min(creature.maxHp, creature.hp + healed);
    cell.type='empty'; scoutToast=T(`💚 ฟื้น +${healed} HP!`,`💚 Healed +${healed} HP!`); saveGame(); render(); return;
  }
  if(t==='treasure') {
    if(Math.random() < 0.10) {
      // MIMIC!
      cell.type='empty';
      pendingBattleCell = {x:nx, y:ny, type:'mimic'};
      startBattle('mimic');
      return;
    }
    const pool = hellMode
      ? [{t:'super_potion',w:15},{t:'max_potion',w:15},{t:'power_shard',w:10},{t:'speed_shard',w:10},{t:'guard_shard',w:10},{t:'sym_F',w:5},{t:'sym_W',w:5},{t:'sym_S',w:5},{t:'map_scroll',w:4},{t:'energy_drink',w:6},{t:'essence',w:8},{t:'fusion_stone',w:5},{t:'box_R',w:2}]
      : hardMode
      ? [{t:'super_potion',w:22},{t:'max_potion',w:15},{t:'power_shard',w:10},{t:'speed_shard',w:10},{t:'guard_shard',w:10},{t:'sym_F',w:5},{t:'sym_W',w:5},{t:'sym_S',w:5},{t:'map_scroll',w:4},{t:'energy_drink',w:6},{t:'essence',w:5},{t:'fusion_stone',w:3}]
      : [{t:'hp_potion',w:30},{t:'max_potion',w:12},{t:'power_shard',w:10},{t:'speed_shard',w:10},{t:'guard_shard',w:10},{t:'sym_F',w:5},{t:'sym_W',w:5},{t:'sym_S',w:5},{t:'map_scroll',w:5},{t:'energy_drink',w:8}];
    let r=Math.random()*100, cum=0, item=pool[0].t;
    for(const p of pool){cum+=p.w;if(r<cum){item=p.t;break;}}
    addItemToInventory(item);
    cell.type='empty'; scoutToast=T(`🎁 ได้ ${ITEMS[item].icon} ${ITEMS[item].name}!`,`🎁 Found ${ITEMS[item].icon} ${ITEMS[item].name}!`); saveGame(); render(); return;
  }
  if(t==='gold_chest') {
    const g = 15 + stage*8 + Math.floor(Math.random()*stage*5);
    gold += g;
    cell.type='empty'; scoutToast=T(`💰 ได้ ${g}G!`,`💰 Found ${g}G!`); saveGame(); render(); return;
  }
  if(t==='rest') {
    creature.hp = creature.maxHp;
    cell.type='empty'; scoutToast=T(`🏕 พักผ่อน — HP เต็ม!`,`🏕 Rested — HP full!`); saveGame(); render(); return;
  }
  if(t==='monster'||t==='boss'||t==='mini_boss') {
    pendingBattleCell = {x:nx, y:ny, type:t};
    startBattle(t==='boss' ? 'boss' : t==='mini_boss' ? 'mini' : false);
    return;
  }
  if(t==='secret_shop') {
    cell.type='empty'; secretShopOpen=true; secretShopSymbol='sym_'+['F','W','S'][Math.floor(Math.random()*3)]; secretShopBought={}; saveGame(); render(); return;
  }
  saveGame(); render();
}

function collectSymbol(sym) {
  if(creature.symbols.length >= 3) return;
  creature.symbols.push(sym);
  scoutToast = `${SYMS[sym].icon} ${SYMS[sym].name} COLLECTED!`;
  if(creature.symbols.length===3) scoutToast += T(' — EVOLVE READY!',' — EVOLVE READY!');
  saveGame();
}

// ============================================================
// BATTLE
// ============================================================
function startBattle(battleType) {
  if(creature.hp <= 0) { scoutToast = T('💀 ตัวนี้ HP=0 เปลี่ยนตัวก่อน!','💀 HP=0 — swap to another beast first!'); render(); return; }
  if(creature.resting) { scoutToast = T('🛌 กำลัง Rest อยู่ — หยุด Rest ก่อน!','🛌 Resting — stop Rest first!'); render(); return; }
  if(creature.shiny) playShinySound();
  // battleType: 'boss' | 'mini' | false(monster)
  const isBoss  = battleType === 'boss';
  const isMini  = battleType === 'mini';
  const isMimic = battleType === 'mimic';
  const effectiveStage = replayStage > 0 ? (replayHard ? 20 + replayStage : replayStage) : hellMode ? 40 + hellStage : hardMode ? 20 + hardStage : stage;
  const lv = isBoss ? effectiveStage+2 : isMini ? effectiveStage+1 : effectiveStage;
  const cell = scoutGrid[idx(scoutPos.x, scoutPos.y)];
  const typeKey = isMimic ? 'F' : (cell?.enemyType || ['F','W','S'][Math.floor(Math.random()*3)]);
  const et = ENEMY_TYPES[typeKey];
  const tierStage = replayStage>0 ? (replayHard?20:replayStage) : stage;
  const tier = Math.min(2, Math.floor((tierStage-1)/3));

  const baseHp  = isBoss ? Math.round(80+lv*18+lv*lv*0.8) : isMini ? Math.round(60+lv*13+lv*lv*0.6) : Math.round(40+lv*9+lv*lv*0.4);
  const baseAtk = Math.round((isMini?1.4:isMimic?1.2:1)*(8+lv*3+lv*lv*0.15));
  const baseDef = Math.round(3+lv*2+lv*lv*0.1);
  const baseSpd = Math.round((isMimic?1.3:1)*(7+lv*1.2));

  const MONSTER_SPRITES = {
    F: ['monster & boss/F-Slime-Mon.png','monster & boss/F-wolf-mon.png','monster & boss/F-Bear-Mon.png','monster & boss/F-scropion-mon.png'],
    W: ['monster & boss/W-chicken-mon.png','monster & boss/W-slime-mon.png','monster & boss/W-cat-mon.png','monster & boss/W-bat-mon.png'],
    S: ['monster & boss/S-goblin-mon.png','monster & boss/S-slime-mon.png','monster & boss/S-Skeleton-mon.png','monster & boss/S-golem-mon.png'],
  };
  const BOSS_SPRITES = {
    F: ['monster & boss/F-werewolf-boss.png','monster & boss/F-werewolf2-boss.png'],
    W: ['monster & boss/W-griffon-boss.png'],
    S: ['monster & boss/S-slime-boss.png'],
  };
  const MINIBOSS_SPRITES = {
    F: ['monster & boss/F-werewolf2-miniboss.png'],
    W: ['monster & boss/W-griffon-miniboss.png'],
    S: ['monster & boss/S-slime-miniboss.png'],
  };
  const spritePool = battleType==='boss' ? (BOSS_SPRITES[typeKey]||BOSS_SPRITES.F) : battleType==='mini' ? (MINIBOSS_SPRITES[typeKey]||MINIBOSS_SPRITES.F) : battleType==='mimic' ? ['monster & boss/mimic-mon.png'] : (MONSTER_SPRITES[typeKey]||MONSTER_SPRITES.F);

  // Persist random choices in cell so retries face the same enemy
  if(cell && !isMimic) {
    if(cell.spriteIdx === undefined) cell.spriteIdx = Math.floor(Math.random()*spritePool.length);
    if(cell.hardSeed === undefined) cell.hardSeed = Math.random();
    if(cell.hardTypeSeed === undefined) cell.hardTypeSeed = Math.random();
    if(cell.hardKeySeed === undefined) cell.hardKeySeed = Math.random();
  }
  const spriteFile = isMimic ? 'monster & boss/mimic-mon.png' : spritePool[cell?.spriteIdx ?? Math.floor(Math.random()*spritePool.length)];

  // Hard Mode: 40% chance to spawn Evolved/Fusion form instead
  const isEffectiveHard = replayStage>0 ? replayHard : (hardMode || hellMode);
  const effectiveHardStage = replayStage>0 ? replayStage : hellMode ? hellStage : hardStage;
  let scoutHardForm = null;
  if(isEffectiveHard && !isMimic && (cell?.hardSeed??Math.random())<0.4) {
    const scoutEvoScale = baseHp / 75;
    const scoutFusScale = baseHp / 135;
    const useFusion = effectiveHardStage>=11 && (cell?.hardTypeSeed??Math.random())<0.5;
    if(useFusion) {
      const fkeys=Object.keys(FINAL_FORMS), fk=fkeys[Math.floor((cell?.hardKeySeed??Math.random())*fkeys.length)], ff=FINAL_FORMS[fk];
      const bm = isBoss?1.4:isMini?1.2:1, am = isBoss?1.2:isMini?1.6:1.7;
      scoutHardForm = { name:`${ff.name}`, typeKey, isBoss, isMini, isMimic, spriteFile:null, isFusionEnemy:true, fusionKey:fk,
        maxHp:Math.round(ff.hp*scoutFusScale*bm), hp:Math.round(ff.hp*scoutFusScale*bm),
        atk:Math.round(ff.atk*scoutFusScale*am), def:Math.round(ff.def*scoutFusScale*am), spd:Math.round(baseSpd*(ff.spd/14)*1.7),
        passives:[fk, ...pickEnemyPassives(typeKey, isBoss?1:0)], ownPassiveDesc:ff.passive, ownPassiveIcon:ff.passiveIcon };
    } else {
      const ekeys=Object.keys(FORMS), ek=ekeys[Math.floor((cell?.hardKeySeed??Math.random())*ekeys.length)], ef=FORMS[ek];
      const bm = isBoss?1.2:isMini?1.1:1, am = isBoss?1.0:isMini?1.5:1.4;
      scoutHardForm = { name:`${ef.name}`, typeKey, isBoss, isMini, isMimic, spriteFile:null, isEvolvedEnemy:true, evolvedKey:ek,
        maxHp:Math.round(ef.hp*scoutEvoScale*bm), hp:Math.round(ef.hp*scoutEvoScale*bm),
        atk:Math.round(ef.atk*scoutEvoScale*am), def:Math.round(ef.def*scoutEvoScale*am), spd:Math.round(baseSpd*(ef.spd/14)*1.4),
        passives:[ek, ...pickEnemyPassives(typeKey, isBoss?1:0)], ownPassiveDesc:ef.passive, ownPassiveIcon:ef.passiveIcon };
    }
  }

  const enemy = scoutHardForm || {
    name:   isBoss ? et.bossName : isMini ? `MINI-${et.bossName}` : isMimic ? 'MIMIC' : (SPRITE_NAMES[spriteFile] || et.names[tier]),
    typeKey,
    maxHp:  Math.round(baseHp  * (isMimic?1.3:et.hp)),
    hp:     Math.round(baseHp  * (isMimic?1.3:et.hp)),
    atk:    Math.round(baseAtk * (isMimic?1.0:et.atk)),
    def:    Math.round(baseDef * (isMimic?1.0:et.def)),
    spd:    Math.round(baseSpd * (isMimic?1.0:et.spd)),
    isBoss, isMini, isMimic, spriteFile,
  };
  if(!enemy.passives) {
    if(isMimic) {
      enemy.passives = pickEnemyPassives(['F','W','S'][Math.floor(Math.random()*3)], 1);
    } else if(isMini) {
      enemy.passives = pickEnemyPassives(typeKey, hellMode ? 2 : 1);
    } else if(hellMode) {
      enemy.passives = pickEnemyPassives(typeKey, isBoss ? 3 : 2);
    } else if(hardMode) {
      enemy.passives = pickEnemyPassives(typeKey, isBoss ? 2 : 1);
    } else if(stage >= 20) {
      enemy.passives = pickEnemyPassives(typeKey, isBoss ? 2 : 1);
    } else if(stage >= 11) {
      enemy.passives = pickEnemyPassives(typeKey, 1);
    } else {
      enemy.passives = [];
    }
  }

  battleState = {
    enemy, isBoss, isMini, isMimic,
    turn: 1, log: [],
    passivesLog: [], // [{turn, passives:[{icon,text}]}]
    lastResult: null,
    animPhase: null, // null | 'atk1' | 'atk2'
    waiting: false,
    phantasmStack: 0,
    vanguardStack: 0,
    sovereignStack: 0,
    warlordConsec: 0,
    ironcladStack: 0,
    stormfangStun: false,
    wraithDodged: false,
    colossusHits: 0,
    colossusBoost: false,
    overdriveUsed: false,
    odBuff: null,        // {type, turnsLeft}
    enemyStunTurns: 0,
  };
  state = 'battle';
  render();
}

function doEnemyOnlyTurn() {
  if(!battleState || battleState.waiting) return;
  const {enemy} = battleState;
  const et = ENEMY_TYPES[enemy.typeKey] || ENEMY_TYPES.F;
  const em = pickEnemyMove(et.ai);
  let ed = Math.max(1, Math.round((em.dmg + enemy.atk/3 + Math.random()*4)) - Math.floor(getEffStat('def')/2));
  battleState.preAnimPlayerHp = creature.hp;
  battleState.preAnimEnemyHp  = enemy.hp;
  creature.hp = Math.max(0, creature.hp - ed);
  battleState.lastResult = { pm:{name:'—',icon:'🔄',desc:''}, em, cmp:'lose', crit:false, pd:0, ed, playerFirst:false, passives:[], playerHeal:0, enemyHeal:0 };
  battleState.log.push(`T${battleState.turn} [SWITCH/ITEM] foe -0  you -${ed}`);
  battleState.turn++;
  battleState.animPhase = 'e-atk';
  battleState.waiting = true;
  battleState.preAnimCleared = false;
  SFX.hit();
  render();
  setTimeout(() => { if(battleState) { battleState.preAnimCleared = true; render(); } }, 350);
  setTimeout(() => {
    battleState.animPhase = null;
    battleState.waiting = false;
    if(creature.hp <= 0) endBattle(false);
    else if(battleState.enemy.hp <= 0) endBattle(true);
    else render();
  }, 750);
}

function doOverdriveTurn() {
  if(!battleState || battleState.waiting || battleState.overdriveUsed) return;
  const bs = battleState;
  const {enemy, isBoss} = bs;
  const ff = creature.phase==='final' ? creature.finalKey : null;
  if(!ff || overdriveCharge < MAX_OVERDRIVE) return;
  const et = ENEMY_TYPES[enemy.typeKey] || ENEMY_TYPES.F;
  const em = pickEnemyMove(et.ai);
  bs.overdriveUsed = true;
  overdriveCharge = 0;
  SFX.overdrive();
  const passives = [];
  let pd=0, ed=0, playerHeal=0, enemyHeal=0, reflectDmg=0, pdHits=[];
  const atk = getEffStat('atk');
  const _hit = (mult=1.0, critBonus=0) => {
    const c = Math.random()<(0.12+critBonus);
    const d = Math.max(1, Math.round((atk/3+Math.random()*4)*mult*(c?1.6:1)) - Math.floor(enemy.def/2));
    return {d,c};
  };
  const _ed = () => {
    const ec = Math.random()<(isBoss?0.12:0.08);
    return Math.max(1, Math.round((em.dmg+enemy.atk/3+Math.random()*4)*(ec?1.5:1)) - Math.floor(getEffStat('def')/2));
  };
  if(ff==='F+F') {
    const h1=_hit(2.0,0.25), h2=_hit(2.0,0.25); pd=h1.d+h2.d; ed=0; pdHits=[h1.d,h2.d];
    bs.odBuff={type:'apocalypse',turnsLeft:3};
    passives.push({icon:'💥',text:`APOCALYPSE ×2.0 [${h1.d}${h1.c?' ✦':''}+${h2.d}${h2.c?' ✦':''}]→${pd} | Crit+25% ×2.0 (3T)`});
  } else if(ff==='F+W') {
    const h=_hit(2.5); pd=h.d; ed=0; bs.enemyStunTurns=1; bs.odBuff={type:'thunderFang',turnsLeft:3};
    passives.push({icon:'⚡',text:`THUNDER FANG ×2.5→${pd}${h.c?' ✦':''} + STUN | ATK/SPD×2+Stun25% (3T)`});
  } else if(ff==='F+S') {
    pd=Math.max(1,Math.round((atk/3+Math.random()*4)*2.5)); ed=0;
    bs.odBuff={type:'fortressBreak',turnsLeft:3};
    passives.push({icon:'🛡',text:`FORTRESS BREAK ×2.5 (ignore DEF)→${pd} | PierceDEF+Reflect50% (3T)`});
  } else if(ff==='F+M') {
    const h1=_hit(1.0),h2=_hit(1.0),h3=_hit(1.0),h4=_hit(1.0); pd=h1.d+h2.d+h3.d+h4.d; ed=_ed(); pdHits=[h1.d,h2.d,h3.d,h4.d];
    bs.odBuff={type:'warlord',turnsLeft:3};
    passives.push({icon:'⚔️',text:`CONQUEROR'S WRATH ×4 [${h1.d}+${h2.d}+${h3.d}+${h4.d}]→${pd} (3T)`});
  } else if(ff==='W+W') {
    const h=_hit(5.0); pd=h.d; ed=_ed();
    bs.odBuff={type:'deathScythe',turnsLeft:3};
    passives.push({icon:'💀',text:`DEATH SCYTHE ×5→${pd}${h.c?' ✦':''} | Crit+50% ATK×2 (3T)`});
  } else if(ff==='W+S') {
    pd=0; ed=0; bs.vanguardStack=3; bs.odBuff={type:'ironCurtain',turnsLeft:3};
    passives.push({icon:'🌀',text:`IRON CURTAIN Shield MAX | ATK×2+Heal15%MaxHP (3T)`});
  } else if(ff==='W+M') {
    const h=_hit(2.0); pd=h.d; ed=0; bs.odBuff={type:'soulSurge',turnsLeft:3};
    passives.push({icon:'🌫️',text:`SOUL SURGE ×2.0→${pd}${h.c?' ✦':''} + DODGE | ATK×2+Dodge+50% (3T)`});
  } else if(ff==='S+S') {
    const h=_hit(2.0); pd=h.d; ed=_ed();
    const ref=isBoss?Math.min(ed,Math.max(0,enemy.hp-1)):ed;
    if(ref>0){enemy.hp=Math.max(isBoss?1:0,enemy.hp-ref);reflectDmg+=ref;}
    bs.odBuff={type:'colossus',turnsLeft:3};
    passives.push({icon:'🏔️',text:`EARTHSHATTER ×2→${pd}${h.c?' ✦':''} + Reflect ${ref} | ATK×2+Reflect100% (3T)`});
  } else if(ff==='S+M') {
    pd=0; ed=1; bs.odBuff={type:'aegis',turnsLeft:3};
    passives.push({icon:'🏰',text:`DIVINE AEGIS dmg=1 | ATK×3+Heal5%MaxHP (3T)`});
  } else if(ff==='M+M') {
    pd=0; ed=Math.round(_ed()*0.5);
    bs.odBuff={type:'sovereign',turnsLeft:3};
    passives.push({icon:'👑',text:`BLOOD TRIBUTE DEF-50% | ATK×2+Lifesteal35%+SPD/DEF×2 (3T)`});
  }
  // apply damage
  bs.preAnimPlayerHp = creature.hp;
  bs.preAnimEnemyHp  = enemy.hp;
  enemy.hp=Math.max(0,enemy.hp-pd);
  const playerAlive=creature.hp>0;
  if(ed>0&&playerAlive) creature.hp=Math.max(0,creature.hp-ed);
  const turnNum=bs.turn;
  bs.lastCmp='win';
  bs.lastResult={pm:{name:OVERDRIVE_INFO[ff]?.name||'OVERDRIVE',icon:OVERDRIVE_INFO[ff]?.icon||'🔥',desc:''},em,cmp:'win',crit:false,enemyCrit:false,pd,ed,playerFirst:true,passives,playerHeal,enemyHeal,reflectDmg,eReflectDmg:0,enemyStunned:false,playerStunned:false,pdHits,extraHits:[]};
  bs.turn++;
  bs.log.push(`T${turnNum} ★OVERDRIVE★ ${OVERDRIVE_INFO[ff]?.name||ff}`,`  foe -${pd}  you -${ed}`);
  passives.forEach(p=>bs.log.push(`  ${p.icon} ${p.text}`));
  bs.animPhase='p-atk'; bs.waiting=true; bs.preAnimCleared=false; render();
  setTimeout(()=>{ if(bs) { bs.preAnimCleared=true; render(); } }, 300);
  setTimeout(()=>{
    bs.animPhase=ed>0?'e-atk':null; bs.preAnimCleared=false; render();
    setTimeout(()=>{ if(bs) { bs.preAnimCleared=true; render(); } }, 300);
    setTimeout(()=>{
      bs.animPhase=null; bs.waiting=false;
      if(enemy.hp<=0||creature.hp<=0) endBattle(enemy.hp<=0);
      else render();
    }, ed>0?600:0);
  },600);
}

function doTurn(moveIdx) {
  if(!battleState || battleState.waiting) return;
  const {enemy, isBoss} = battleState;
  const pm = MOVES[moveIdx];
  const et = ENEMY_TYPES[enemy.typeKey] || ENEMY_TYPES.F;
  const em = pickEnemyMove(et.ai);
  const cmp = compareMoves(pm.name, em.name);
  const mult = cmp==='win' ? 2.0 : cmp==='lose' ? 0.5 : 1.0;
  const fk = creature.formKey;
  const ff = creature.phase==='final' ? creature.finalKey : null;
  const bs = battleState;

  // Artifact stacks (per-battle state)
  if(!bs.artifactStacks)  bs.artifactStacks  = {};
  if(!bs.artifactStacks2) bs.artifactStacks2 = {};
  const art   = creature.artifact  ? ARTIFACTS[creature.artifact]  : null;
  const art2  = creature.artifact2 ? ARTIFACTS[creature.artifact2] : null;
  const artId  = creature.artifact  || null;
  const artId2 = creature.artifact2 || null;

  // Crit chance (RAZORCLAW passive + artifact)
  let critChance = fk==='FFW' ? 0.25 : 0.12;
  if(artId==='keen_edge'      || artId2==='keen_edge')      critChance += 0.10;
  if(artId==='berserker_claw' || artId2==='berserker_claw') critChance += 0.20;
  if(artId==='crit_core'      || artId2==='crit_core')      critChance += 0.25;
  if(artId==='deathblow'      || artId2==='deathblow')      critChance += 0.15;
  if(bs.odBuff?.type==='apocalypse')  critChance = Math.min(1, critChance + 0.25);
  if(bs.odBuff?.type==='deathScythe') critChance = Math.min(1, critChance + 0.50);
  const sniperReady = (artId==='sniper_eye' || artId2==='sniper_eye') && bs.turn % 3 === 0;
  const crit = sniperReady ? true : Math.random() < critChance;
  const hasDeathblow = artId==='deathblow' || artId2==='deathblow';
  const critMult = sniperReady ? 2.0 : hasDeathblow ? 2.0 : 1.6;
  let playerHeal = 0, enemyHeal = 0, reflectDmg = 0, eReflectDmg = 0, enemyStunned = false, playerStunned = false, pdHits = [], extraHits = [];
  const spdBoost = (bs.odBuff?.type==='sovereign' || bs.odBuff?.type==='thunderFang') ? 2.0 : 1.0;
  const playerFirst = Math.round(getEffStat('spd')*spdBoost) >= enemy.spd;

  const minPd = Math.floor(getEffStat('atk') / 6);
  let pd = Math.max(minPd, Math.round((pm.dmg + getEffStat('atk')/3 + Math.random()*4) * mult * (crit?critMult:1)) - Math.floor(enemy.def/2));
  const eArtId  = enemy.artifact  || null;
  const eArtId2 = enemy.artifact2 || null;
  const eHasIronWill = eArtId==='iron_will' || eArtId2==='iron_will';
  let eCritBonus = 0;
  if(eArtId==='keen_edge'      || eArtId2==='keen_edge')      eCritBonus += 0.10;
  if(eArtId==='berserker_claw' || eArtId2==='berserker_claw') eCritBonus += 0.20;
  if(eArtId==='crit_core'      || eArtId2==='crit_core')      eCritBonus += 0.25;
  if(eArtId==='deathblow'      || eArtId2==='deathblow')      eCritBonus += 0.15;
  const enemyCritChance = (isBoss ? 0.12 : 0.08) + eCritBonus;
  const enemyCrit = Math.random() < enemyCritChance;
  const eSniperReady = (eArtId==='sniper_eye' || eArtId2==='sniper_eye') && bs.turn % 3 === 0;
  const eCritMult = (eArtId==='deathblow'||eArtId2==='deathblow') ? 2.0 : 1.5;
  let ed = Math.max(1, Math.round((em.dmg + enemy.atk/3 + Math.random()*4) / mult * ((eSniperReady||enemyCrit) ? eCritMult : 1)) - Math.floor(getEffStat('def')/2));

  const passives = [];
  const startHp = creature.hp; // HP at start of turn (before any heals/modifications)

  // Apply stun carried from previous turn
  if(bs.playerStunnedNextTurn) { pd=0; playerStunned=true; bs.playerStunnedNextTurn=false; SFX.stun(); passives.push({icon:'⚡',text:T('STUN! โจมตีพลาด (ค้างจากเทิร์นที่แล้ว)','STUN! Miss (carried from last turn)')}); }
  if(bs.enemyStunnedNextTurn)  { ed=0; enemyStunned=true;  bs.enemyStunnedNextTurn=false;  SFX.stun(); passives.push({icon:'⚡',text:T('STUN! ศัตรูยังขยับไม่ได้ (ค้างจากเทิร์นที่แล้ว)','STUN! Enemy still cannot act (carried)')}); }

  // ===== ENEMY ARTIFACT EFFECTS =====
  if(eArtId || eArtId2) {
    const eas = bs.eArtStacks || (bs.eArtStacks = {});
    const eHasA = k => eArtId===k || eArtId2===k;
    // blade_shard: ed +10%
    if(eHasA('blade_shard') && !enemyStunned) { ed=Math.round(ed*1.10); passives.push({icon:'🗡',text:`[E] Blade Shard →${ed}`}); }
    // iron_plate: reduce pd by 15%
    if(eHasA('iron_plate')) { pd=Math.round(pd*0.85); passives.push({icon:'🛡',text:`[E] Iron Plate →${pd}`}); }
    // stone_skin: reduce pd 10% when HP > 70%
    if(eHasA('stone_skin') && enemy.hp > enemy.maxHp*0.70) { pd=Math.round(pd*0.90); passives.push({icon:'🪨',text:`[E] Stone Skin →${pd}`}); }
    // swift_ring: 10% dodge player attack
    if(eHasA('swift_ring') && Math.random()<0.10) { pd=0; passives.push({icon:'💨',text:'[E] Swift Ring DODGE!'}); }
    // wind_step: 15% dodge player attack
    if(eHasA('wind_step') && Math.random()<0.15) { pd=0; passives.push({icon:'🌀',text:'[E] Wind Step DODGE!'}); }
    // true_sight: ed +50%, player can't dodge
    if(eHasA('true_sight') && !enemyStunned) { ed=Math.round(ed*1.50); passives.push({icon:'🔭',text:`[E] True Sight →${ed}`}); }
    // tide_breaker: if enemy lost last round, ed +75%
    if(eHasA('tide_breaker') && bs.lastCmp==='win' && !enemyStunned) { ed=Math.round(ed*1.75); passives.push({icon:'🌊',text:`[E] Tide Breaker →${ed}`}); }
    // precision_stone: every 3 turns, ed ×2
    if(eHasA('precision_stone') && bs.turn%3===0 && !enemyStunned) { ed=Math.round(ed*2); passives.push({icon:'🔮',text:`[E] Precision Stone ×2 →${ed}`}); }
    // rage_core: stack ed +15% on each WIN (from player's perspective = enemy lost = cmp==='win')
    if(eHasA('rage_core')) {
      if(cmp==='win') eas.rageCoreStack=Math.min(3,(eas.rageCoreStack||0)+1); else eas.rageCoreStack=0;
      if((eas.rageCoreStack||0)>0 && !enemyStunned) { ed=Math.round(ed*(1+0.15*eas.rageCoreStack)); passives.push({icon:'🔥',text:`[E] Rage Core ×${eas.rageCoreStack} →${ed}`}); }
    }
    // victory_chain: stack ed +20% each time enemy wins (cmp==='lose')
    if(eHasA('victory_chain')) {
      if(cmp==='lose') eas.victoryStack=Math.min(3,(eas.victoryStack||0)+1);
      if((eas.victoryStack||0)>0 && !enemyStunned) { ed=Math.round(ed*(1+0.20*eas.victoryStack)); passives.push({icon:'⛓',text:`[E] Victory Chain ×${eas.victoryStack} →${ed}`}); }
    }
    // reflect_coat: reflect 15% of player dmg back
    if(eHasA('reflect_coat') && pd>0) { const ref=Math.round(pd*0.15); eReflectDmg+=ref; creature.hp=Math.max(0,creature.hp-ref); passives.push({icon:'🪞',text:`[E] Reflect Coat ${ref}`}); }
    // shock_bead: 8% stun player next turn
    if(!playerStunned && eHasA('shock_bead') && Math.random()<0.08)
      { bs.playerStunnedNextTurn=true; SFX.stun(); passives.push({icon:'⚡',text:T('[E] Shock Bead STUN! ต่อไป','[E] Shock Bead STUN! next')}); }
    // paralysis_fang: 15% stun player, +30% ed next turn if stun
    if(!playerStunned && eHasA('paralysis_fang')) {
      if(eas.paralysisProc) { ed=Math.round(ed*1.30); passives.push({icon:'🦷',text:`[E] Paralysis Boost →${ed}`}); eas.paralysisProc=false; }
      if(Math.random()<0.15) { bs.playerStunnedNextTurn=true; eas.paralysisProc=true; SFX.stun(); passives.push({icon:'🦷',text:T('[E] Paralysis Fang STUN! ต่อไป','[E] Paralysis Fang STUN! next')}); }
    }
    // berserker_claw: player takes extra 10% dmg (pd reduced against enemy)
    if(eHasA('berserker_claw') && !enemyStunned) { ed=Math.round(ed*1.10); passives.push({icon:'🐾',text:`[E] Berserker →${ed}`}); }
    // blood_pact: enemy heals 15% of pd when player crits
    if(crit && eHasA('blood_pact')) { const h=Math.round(pd*0.15); enemy.hp=Math.min(enemy.maxHp,enemy.hp+h); enemyHeal+=h; passives.push({icon:'🔴',text:`[E] Blood Pact +${h}`}); }
    // double_attack: 20% attack twice
    if(!enemyStunned && eHasA('double_attack') && Math.random()<0.20)
      { const ed2=Math.max(1,Math.round(ed)); ed+=ed2; passives.push({icon:'⚔',text:`[E] Double Attack +${ed2}→${ed}`}); }
    // chain_strike: WIN streak bonus on ed
    if(eHasA('chain_strike')) {
      if(cmp==='lose') { eas.chainStreak=(eas.chainStreak||0)+1; const rate=eas.chainStreak>=3?2.00:eas.chainStreak>=2?1.30:0.65; const bonus=Math.round(ed*rate); if(!enemyStunned){creature.hp=Math.max(0,creature.hp-bonus); eReflectDmg+=bonus;} passives.push({icon:'💥',text:`[E] Chain Strike ×${eas.chainStreak} +${bonus}`}); }
      else eas.chainStreak=0;
    }
    // death_mark: ed +100% when player HP < 30%
    if(eHasA('death_mark') && creature.hp < creature.maxHp*0.30 && !enemyStunned)
      { ed=Math.round(ed*2.00); passives.push({icon:'💀',text:`[E] Death Mark ×2 →${ed}`}); }
    // execution: ed +200% when enemy HP < 20%
    if(eHasA('execution') && enemy.hp < enemy.maxHp*0.20 && !enemyStunned)
      { ed=Math.round(ed*3.00); passives.push({icon:'☠',text:`[E] Execution ×3 →${ed}`}); }
    // wild_card: 25% random effect
    if(eHasA('wild_card') && Math.random()<0.25) {
      const roll=Math.random();
      if(roll<0.333) { const h=Math.round(enemy.maxHp*0.30); enemy.hp=Math.min(enemy.maxHp,enemy.hp+h); enemyHeal+=h; passives.push({icon:'🎲',text:`[E] Wild Card Heal +${h}`}); }
      else if(roll<0.667 && !enemyStunned) { ed=Math.round(ed*1.50); passives.push({icon:'🎲',text:`[E] Wild Card ATK×1.5 →${ed}`}); }
      else { const ref=Math.round(pd*0.50); eReflectDmg+=ref; creature.hp=Math.max(0,creature.hp-ref); passives.push({icon:'🎲',text:`[E] Wild Card Reflect ${ref}`}); }
    }
    // sniper_eye / crit log
    if(eSniperReady) passives.push({icon:'👁',text:`[E] Sniper Eye ×${eCritMult}→${ed}`});
    else if(enemyCrit && eCritBonus>0) passives.push({icon:'🎯',text:`[E] Crit Art ×${eCritMult}→${ed}`});
  }

  // ===== OVERDRIVE BUFF (multi-turn effects) =====
  const hasFortressBreak = bs.odBuff?.type==='fortressBreak';
  const hasColossusOD    = bs.odBuff?.type==='colossus';
  const hasAegisOD       = bs.odBuff?.type==='aegis';
  if(bs.odBuff) {
    const {type} = bs.odBuff;
    if(type==='apocalypse') {
      if(crit && critMult < 2.0) pd = Math.round(pd / critMult * 2.0);
      passives.push({icon:'💥',text:`APOCALYPSE Crit+25% ×2.0→${pd}`});
    }
    if(type==='thunderFang') {
      pd=Math.round(pd*2.0);
      if(Math.random()<0.25 && !enemyStunned) { ed=0; enemyStunned=true; passives.push({icon:'⚡',text:`THUNDER FANG STUN! ATK×2→${pd}`}); }
      else passives.push({icon:'⚡',text:`THUNDER FANG ATK×2→${pd}`});
    }
    if(type==='warlord') {
      const pdBase=pd;
      const c2=Math.random()<critChance;
      const h2=Math.max(1,Math.round((pm.dmg+getEffStat('atk')/3+Math.random()*4)*mult*(c2?critMult:1))-Math.floor(enemy.def/2));
      pd+=h2; pdHits=[pdBase,h2]; passives.push({icon:'⚔️',text:`WRATH +1Hit ${h2}${c2?' ✦':''}→${pd}`});
    }
    if(type==='deathScythe') {
      pd=Math.round(pd*2.0);
      if(crit && critMult < 2.0) pd = Math.round(pd / critMult * 2.0);
      passives.push({icon:'💀',text:`DEATH SCYTHE ATK×2→${pd}`});
    }
    if(type==='ironCurtain') {
      pd=Math.round(pd*2.0);
      if(bs.vanguardStack>0) { const b=Math.round(pd*0.10*bs.vanguardStack); pd+=b; }
      const heal=Math.round(creature.maxHp*0.15);
      creature.hp=Math.min(creature.maxHp,creature.hp+heal); playerHeal+=heal;
      passives.push({icon:'🌀',text:`IRON CURTAIN ATK×2+Shield→${pd} | +${heal}HP`});
    }
    if(type==='soulSurge') { pd=Math.round(pd*2.0); passives.push({icon:'🌫️',text:`SOUL SURGE ATK×2→${pd}`}); }
    if(type==='colossus') { pd=Math.round(pd*2.0); passives.push({icon:'🏔️',text:`EARTHSHATTER ATK×2→${pd}`}); }
    if(type==='aegis') { pd=Math.round(pd*3.0); ed=1; passives.push({icon:'🏰',text:`DIVINE AEGIS ATK×3→${pd} | dmg=1`}); }
    if(type==='fortressBreak') { pd+=Math.floor(enemy.def/2); passives.push({icon:'🛡',text:`FORTRESS BREAK PierceDEF+${Math.floor(enemy.def/2)}→${pd} | Reflect 50%`}); }
    if(type==='sovereign') {
      pd=Math.round(pd*2.0); ed=Math.round(ed*0.5);
      bs._sovereignLs = true;
      passives.push({icon:'👑',text:`BLOOD TRIBUTE ATK×2→${pd} | DEF×2→${ed}↓ | SPD/DEF×2`});
    }
    bs.odBuff.turnsLeft--;
    if(bs.odBuff.turnsLeft<=0) bs.odBuff=null;
  }
  // Enemy stun (from THUNDER FANG)
  if(bs.enemyStunTurns>0) { ed=0; bs.enemyStunTurns--; passives.push({icon:'⚡',text:`STUN! Enemy cannot attack (${bs.enemyStunTurns} left)`}); }

  // ===== PRE-DAMAGE: EVOLVED PASSIVES =====
  if(fk==='FFF') { pd=Math.round(pd*1.25); passives.push({icon:'💢',text:`+25% ATK → ${pd}`}); }
  if(fk==='FWS' && cmp==='win') { pd=Math.round(pd*1.2); ed=Math.round(ed*0.8); passives.push({icon:'🏆',text:'WIN +20%/-20%'}); }
  if(fk==='WSS' && cmp==='win') { ed=Math.round(ed*0.4); passives.push({icon:'🛡',text:T(`WIN: ลดดาเมจ 60% → ${ed}`,`WIN: -60% dmg → ${ed}`)}); }
  if(fk==='FWW' && Math.random()<0.25) { if(!playerFirst){bs.enemyStunnedNextTurn=true;SFX.stun();passives.push({icon:'⚡',text:T('STUN! ศัตรูขยับไม่ได้เทิร์นถัดไป','STUN! Enemy cannot act next turn')});}else{ed=0;enemyStunned=true;SFX.stun();passives.push({icon:'⚡',text:T('STUN! ศัตรูขยับไม่ได้','STUN! Enemy cannot act')});} }
  if(fk==='WWW' && Math.random()<0.25) { ed=0; passives.push({icon:'👻',text:'DODGE!'}); }
  if(fk==='WWS' && Math.random()<0.10) {
    const healed=Math.round(creature.maxHp*0.5);
    creature.hp=Math.min(creature.maxHp,creature.hp+healed);
    ed=0; passives.push({icon:'🌀',text:T(`DODGE + ฟื้น +${healed} HP`,`DODGE + Healed +${healed} HP`)});
  }
  if(fk==='SSS' && Math.random()<0.35) { ed=Math.round(ed*0.5); passives.push({icon:'⬛',text:T(`ลดดาเมจ → ${ed}`,`Reduced dmg → ${ed}`)}); }

  // ===== PRE-DAMAGE: FINAL FORM PASSIVES =====
  if(ff==='F+F') { // RAGNAROK: ATK×1.2 (lifesteal post-damage)
    pd=Math.round(pd*1.2);
    passives.push({icon:'💥',text:`ATK×1.2 → ${pd}`});
  }

  if(ff==='F+W') { // STORMFANG: ATK×1.15 + stun 20% (prev stun→ATK×1.5 first)
    if(bs.stormfangStun) { pd=Math.round(pd*1.5); passives.push({icon:'⚡',text:'STUN BOOST ATK×1.5'}); }
    pd=Math.round(pd*1.15);
    bs.stormfangStun=false;
    if(Math.random()<0.20) { if(!playerFirst){bs.enemyStunnedNextTurn=true;bs.stormfangStun=true;SFX.stun();passives.push({icon:'⚡',text:`ATK×1.15→${pd} + STUN! (next turn, ×1.5 after)`});}else{ed=0;enemyStunned=true;SFX.stun();bs.stormfangStun=true;passives.push({icon:'⚡',text:`ATK×1.15→${pd} + STUN! (×1.5 next)`});} }
    else { passives.push({icon:'⚡',text:`ATK×1.15 → ${pd}`}); }
  }

  if(ff==='F+S') { // IRONCLAD: ATK×1.15 + Stack bonus (max 3: +5% ATK/reflect per stack)
    const sb=bs.ironcladStack*0.05;
    pd=Math.round(pd*1.15*(1+sb));
    passives.push({icon:'🛡',text:`ATK×${(1.15*(1+sb)).toFixed(2)}→${pd}${bs.ironcladStack?` Stack${bs.ironcladStack}`:''}`});
  }

  if(ff==='F+M') { // WARLORD: ATK×1.2 + WIN→dmg+15% (2×consec→+35%)
    pd=Math.round(pd*1.2);
    if(cmp==='win') {
      bs.warlordConsec++;
      const bonus=bs.warlordConsec>=2?0.35:0.15;
      pd=Math.round(pd*(1+bonus));
      passives.push({icon:'⚔️',text:`WIN×${bs.warlordConsec} dmg+${Math.round(bonus*100)}%→${pd}`});
    } else { passives.push({icon:'⚔️',text:`ATK×1.2 → ${pd}`}); }
  }

  if(ff==='W+W') { // PHANTASM: dodge 20%+ (stack), heal post-damage
    const dodgeChance=[0.20,0.20,0.30,0.40][Math.min(bs.phantasmStack,3)];
    if(Math.random()<dodgeChance) {
      ed=0; bs.phantasmStack=Math.min(3,bs.phantasmStack+1);
      passives.push({icon:'👁️',text:`DODGE! Stack${bs.phantasmStack}`});
    }
  }

  if(ff==='W+S') { // VANGUARD: dodge 25% + Shield Stack (max 3, 15%/stack)
    if(Math.random()<0.25) {
      ed=0; bs.vanguardStack=Math.min(3,bs.vanguardStack+1);
      passives.push({icon:'🌀',text:`DODGE! Shield×${bs.vanguardStack}`});
    } else if(bs.vanguardStack>0 && ed>0) {
      const reduce=bs.vanguardStack*0.15;
      ed=Math.round(ed*(1-reduce));
      passives.push({icon:'🌀',text:`Shield×${bs.vanguardStack} -${Math.round(reduce*100)}%→${ed}`});
    }
  }

  if(ff==='W+M') { // WRAITH: dodge 25% (+50% during soulSurge OD buff) + หลบสำเร็จ→ATK+50% next round
    const dodgeChance = bs.odBuff?.type==='soulSurge' ? 0.75 : 0.25;
    let dodged=false;
    if(Math.random()<dodgeChance) { ed=0; dodged=true; passives.push({icon:'🌫️',text:`DODGE! (${Math.round(dodgeChance*100)}%) → ATK+50% next round`}); }
    if(bs.wraithDodged) {
      pd=Math.round(pd*1.5);
      passives.push({icon:'🌫️',text:`DODGE BOOST ATK×1.5→${pd}`});
    }
    bs.wraithDodged=dodged;
  }

  if(ff==='S+S') { // COLOSSUS: dmg×0.65 + โดนตีครบ 3 ครั้ง → round ถัดไป ATK+50%
    ed=Math.round(ed*0.65);
    if(bs.colossusBoost) {
      pd=Math.round(pd*1.5);
      passives.push({icon:'🏔️',text:`RAGE ATK×1.5→${pd} | dmg×0.65→${ed}`});
      bs.colossusBoost=false;
    } else {
      passives.push({icon:'🏔️',text:`dmg×0.65→${ed}`});
    }
    if(ed>0) {
      bs.colossusHits++;
      if(bs.colossusHits>=3) { bs.colossusBoost=true; bs.colossusHits=0; passives.push({icon:'🏔️',text:T('โดน 3 ครั้ง! → ATK×1.5 next','Hit 3 times! → ATK×1.5 next')}); }
    }
  }

  if(ff==='S+M') { // AEGIS: dmg×0.7 + HP<40% → ฟื้น 8% maxHP + ATK+50%
    const lowHp=creature.hp<creature.maxHp*0.4;
    ed=Math.round(ed*0.7);
    if(lowHp) {
      pd=Math.round(pd*1.5);
      const regen=Math.round(creature.maxHp*0.08);
      creature.hp=Math.min(creature.maxHp,creature.hp+regen);
      playerHeal+=regen;
      passives.push({icon:'🏰',text:T(`dmg×0.7→${ed} | HP<40% ATK×1.5→${pd} ฟื้น+${regen}`,`dmg×0.7→${ed} | HP<40% ATK×1.5→${pd} regen+${regen}`)});
    } else {
      passives.push({icon:'🏰',text:`dmg×0.7→${ed}`});
    }
  }

  if(ff==='M+M') { // SOVEREIGN: ดูดเลือด 3%×(1+stack) ทุก round + WIN→dmg+15%/recv-15% stack ×2
    const curStack=bs.sovereignStack||0;
    const drainRate=0.03*(1+curStack);
    bs._sovereignFormLs = drainRate; // defer — calculate after artifact boosts
    if(cmp==='win') {
      bs.sovereignStack=Math.min(2,curStack+1);
      const s=bs.sovereignStack;
      pd=Math.round(pd*(1+0.15*s)); ed=Math.round(ed*(1-0.15*s));
      passives.push({icon:'👑',text:T(`ดูดเลือด ${Math.round(drainRate*100)}% | WIN×${s} dmg+${15*s}%/recv-${15*s}%`,`Lifesteal ${Math.round(drainRate*100)}% | WIN×${s} ATK+${15*s}%/dmgRecv-${15*s}%`)});
    } else {
      passives.push({icon:'👑',text:T(`ดูดเลือด ${Math.round(drainRate*100)}%`,`Lifesteal ${Math.round(drainRate*100)}%`)});
    }
  }

  // ===== ARTIFACT EFFECTS =====
  if(art) {
    const as = bs.artifactStacks;
    // Normal
    if(artId==='swift_ring' && Math.random()<0.10) { ed=0; passives.push({icon:'💨',text:'Swift Ring DODGE!'}); }
    if(artId==='life_seed') { const h=Math.max(1,Math.round(creature.maxHp*0.05)); creature.hp=Math.min(creature.maxHp,creature.hp+h); playerHeal+=h; passives.push({icon:'🌱',text:`Life Seed +${h}`}); }
    if(artId==='crimson_fang' && pd>0) bs._ls1 = (bs._ls1||0) + 0.05;
    if(artId==='blood_pact'   && pd>0) bs._ls1 = (bs._ls1||0) + 0.15;
    if(artId==='soul_reaper'  && pd>0) bs._ls1 = (bs._ls1||0) + 0.25;
    if(artId==='shock_bead' && Math.random()<0.08) { if(!playerFirst){bs.enemyStunnedNextTurn=true;SFX.stun();passives.push({icon:'⚡',text:'Shock Bead STUN! (next turn)'});}else{ed=0;enemyStunned=true;SFX.stun();passives.push({icon:'⚡',text:'Shock Bead STUN!'});} }
    if(artId==='blade_shard') { pd=Math.round(pd*1.10); passives.push({icon:'🗡',text:`Blade Shard ATK×1.1 → ${pd}`}); }
    if(artId==='iron_plate') { ed=Math.round(ed*0.85); passives.push({icon:'🛡',text:`Iron Plate DEF → ${ed}`}); }
    if(artId==='stone_skin' && creature.hp>creature.maxHp*0.70) { ed=Math.round(ed*0.90); passives.push({icon:'🪨',text:`Stone Skin -10% → ${ed}`}); }
    if(artId==='tide_breaker' && bs.lastCmp==='lose') { pd=Math.round(pd*1.75); passives.push({icon:'🌊',text:`Tide Breaker ATK+75% → ${pd}`}); }
    if(artId==='vitality_core') { /* HP bonus applied at equip time, passive handled in equip */ }
    // Rare
    if(artId==='death_mark' && creature.hp<creature.maxHp*0.30) { pd=Math.round(pd*2.00); passives.push({icon:'💀',text:`Death Mark ATK+100% → ${pd}`}); }
    if(artId==='precision_stone' && bs.turn%3===0) { pd=Math.round(pd*2); passives.push({icon:'🔮',text:`Precision Stone ×2 → ${pd}`}); }
    if(artId==='berserker_claw') { ed=Math.round(ed*1.10); } // DEF -10% (take more)
    if(artId==='reflect_coat') { const ref=Math.round(ed*0.15); enemyHeal-=ref; reflectDmg+=ref; enemy.hp=Math.max(0,enemy.hp-ref); passives.push({icon:'🪞',text:`Reflect Coat ${ref} dmg`}); }
    if(artId==='wind_step' && Math.random()<0.15) { ed=0; passives.push({icon:'🌀',text:'Wind Step DODGE!'}); }
    if(artId==='rage_core') {
      if(cmp==='win') { as.rageCoreStack=0; }
      else { as.rageCoreStack=Math.min(3,(as.rageCoreStack||0)+1); }
      if(as.rageCoreStack>0) { pd=Math.round(pd*(1+0.15*as.rageCoreStack)); passives.push({icon:'🔥',text:`Rage Core ×${as.rageCoreStack} ATK → ${pd}`}); }
    }
    if(artId==='victory_chain') {
      if(cmp==='win') as.victoryStack=Math.min(3,(as.victoryStack||0)+1);
      if((as.victoryStack||0)>0) { pd=Math.round(pd*(1+0.20*as.victoryStack)); passives.push({icon:'⛓',text:`Victory Chain ×${as.victoryStack} → ${pd}`}); }
    }
    if(artId==='paralysis_fang') {
      if(as.paralysisProc) { pd=Math.round(pd*1.30); passives.push({icon:'🦷',text:`Paralysis Boost ATK → ${pd}`}); as.paralysisProc=false; }
      if(Math.random()<0.15) { if(!playerFirst){bs.enemyStunnedNextTurn=true;SFX.stun();as.paralysisProc=true;passives.push({icon:'🦷',text:'Paralysis Fang STUN! (next turn)'});}else{ed=0;enemyStunned=true;SFX.stun();as.paralysisProc=true;passives.push({icon:'🦷',text:'Paralysis Fang STUN!'});} }
    }
    if(artId==='drain_aura') {
      if(!as.drainInit) { as.drainAuraStack=0; as.drainInit=true; }
      if(cmp==='lose') as.drainAuraStack=Math.min(2,(as.drainAuraStack||0)+1);
      if((as.drainAuraStack||0)>0) { ed=Math.round(ed*(1-0.10*as.drainAuraStack)); passives.push({icon:'🌑',text:T(`Drain Aura -${10*as.drainAuraStack}% ศัตรู → ${ed}`,`Drain Aura -${10*as.drainAuraStack}% enemy → ${ed}`)}); }
    }
    // Epic
    if(eHasIronWill && bs.eIronWillBoostReady) { ed=Math.round(ed*4); bs.eIronWillBoostReady=false; bs.eIronWillRevengeThisTurn=true; passives.push({icon:'💎',text:`Enemy Iron Will REVENGE ATK×4 → ${ed}`}); }
    if(artId==='iron_will') {
      if(as.ironWillBoostReady) { pd=Math.round(pd*4); as.ironWillBoostReady=false; passives.push({icon:'💎',text:`Iron Will REVENGE ATK×4 → ${pd}`}); }
    }
    if(artId==='true_sight') { pd=Math.round(pd*1.50); passives.push({icon:'🔭',text:`True Sight ATK+50% → ${pd}`}); }
    if(artId==='moon_veil') { const h=Math.max(1,Math.round(creature.maxHp*0.08)); creature.hp=Math.min(creature.maxHp,creature.hp+h); playerHeal+=h; passives.push({icon:'🌙',text:`Moon Veil +${h}`}); }
    if(artId==='double_attack' && Math.random()<0.20) { const orig=pd; pd=Math.round(pd*2); pdHits=[orig,orig]; passives.push({icon:'⚔',text:`Double Attack ×2 → ${pd}`}); }
    if(artId==='execution' && startHp<creature.maxHp*0.20) { pd=Math.round(pd*3.00); passives.push({icon:'☠',text:`Execution +200% → ${pd}`}); }
    if(artId==='chain_strike') { if(cmp==='win') { bs.chainStrikeStreak=(bs.chainStrikeStreak||0)+1; const rate=bs.chainStrikeStreak>=3?2.00:bs.chainStrikeStreak>=2?1.30:0.65; const bonus=Math.round(pd*rate); enemy.hp=Math.max(0,enemy.hp-bonus); extraHits.push(bonus); passives.push({icon:'💥',text:`Chain Strike${bs.chainStrikeStreak>=3?' ×3':bs.chainStrikeStreak>=2?' ×2':''} ${Math.round(rate*100)}% → +${bonus}`}); } else { bs.chainStrikeStreak=0; } }
    if(artId==='crit_core' && crit) { const h=Math.max(1,Math.round(creature.maxHp*0.05)); creature.hp=Math.min(creature.maxHp,creature.hp+h); playerHeal+=h; passives.push({icon:'🎯',text:`Crit Core Heal +${h}`}); }
    if(artId==='deathblow') { /* crit mult handled above */ }
    if(artId==='wild_card' && Math.random()<0.25) {
      const roll=Math.random();
      if(roll<0.333) { const h=Math.round(creature.maxHp*0.30); creature.hp=Math.min(creature.maxHp,creature.hp+h); playerHeal+=h; passives.push({icon:'🎲',text:`Wild Card Heal +${h}`}); }
      else if(roll<0.667) { pd=Math.round(pd*1.50); passives.push({icon:'🎲',text:`Wild Card ATK×1.5 → ${pd}`}); }
      else { const ref=Math.round(ed*0.50); enemy.hp=Math.max(0,enemy.hp-ref); passives.push({icon:'🎲',text:`Wild Card Reflect ${ref}`}); }

      const counterCapped=isBoss?Math.min(counter,Math.max(0,enemy.hp-1)):counter;
      reflectDmg+=counterCapped; enemy.hp=Math.max(isBoss?1:0,enemy.hp-counterCapped);
      passives.push({icon:'⚔️',text:`IRONCLAD Counter! -${counterCapped}`});
    }
  }
  // EARTHSHATTER OD buff: reflect 100%
  if(hasColossusOD && edApplied && ed>0) {
    let ref=Math.max(1,ed);
    if(isBoss) ref=Math.min(ref,Math.max(0,enemy.hp-1));
    reflectDmg+=ref; enemy.hp=Math.max(isBoss?1:0,enemy.hp-ref);
    passives.push({icon:'🏔️',text:`EARTHSHATTER Reflect 100% → -${ref}`});
  }
  // DIVINE AEGIS OD buff: heal 5% MaxHP/turn
  if(hasAegisOD && creature.hp>0) {
    const heal=Math.round(creature.maxHp*0.05);
    creature.hp=Math.min(creature.maxHp,creature.hp+heal); playerHeal+=heal;
    passives.push({icon:'🏰',text:`AEGIS Regen +${heal}HP`});
  }
  // IRONCLAD: reflect 20%+5%/stack + สะสม stack เมื่อโดนตี (max 3)
  if(ff==='F+S' && edApplied && ed>0) {
    const refPct=0.20+bs.ironcladStack*0.05;
    const ref=Math.max(1,Math.round(ed*refPct));
    reflectDmg+=ref; enemy.hp=Math.max(0,enemy.hp-ref);
    bs.ironcladStack=Math.min(3,bs.ironcladStack+1);
    passives.push({icon:'🛡',text:`reflect ${ref} (${Math.round(refPct*100)}%) → Stack${bs.ironcladStack}`});
  }
  // PHANTASM: heal 20% maxHP on dodge
  if(ff==='W+W' && bs.phantasmStack>0 && !edApplied && playerAlive) {
    const heal=Math.round(creature.maxHp*0.20);
    creature.hp=Math.min(creature.maxHp,creature.hp+heal);
    playerHeal+=heal;
    passives.push({icon:'👁️',text:`+${heal} HP`});
  }
  // COLOSSUS: reflect 20% (HP>60%→40%), can't kill boss
  if(ff==='S+S' && edApplied && ed>0) {
    const refPct=creature.hp>creature.maxHp*0.6?0.40:0.20;
    let ref=Math.max(1,Math.round(ed*refPct));
    if(isBoss) ref=Math.min(ref,Math.max(0,enemy.hp-1));
    reflectDmg+=ref; enemy.hp=Math.max(isBoss?1:0,enemy.hp-ref);
    if(ref>0) passives.push({icon:'🏔️',text:`reflect ${ref} (${Math.round(refPct*100)}%)`});
  }
  // Enemy lifesteal & reflect (post-damage)
  // AEGIS heal: post-damage so it can't save from a killing blow
  if(ep.includes('S+M') && bs.aegisLowHp && enemy.hp>0) {
    const rg=Math.round(enemy.maxHp*0.05);
    enemy.hp=Math.min(enemy.maxHp,enemy.hp+rg);
    enemyHeal+=rg;
    passives.push({icon:'🏰',text:`AEGIS Heal +${rg}`});
  }
  // IRONJAW lifesteal (post-damage)
  if(ep.includes('FFS') && bs.ironjawEd>0 && enemy.hp>0) {
    const steal=Math.max(1,Math.round(bs.ironjawEd*0.25));
    enemy.hp=Math.min(enemy.maxHp,enemy.hp+steal); enemyHeal+=steal;
    passives.push({icon:'🩸',text:`IRONJAW Lifesteal+${steal}`});
  }
  // RAGNAROK lifesteal (post-damage)
  if(ep.includes('F+F') && edApplied && ed>0 && enemy.hp>0) {
    const ls=Math.max(1,Math.round(ed*(enemy.hp<enemy.maxHp*0.5?0.35:0.15)));
    enemy.hp=Math.min(enemy.maxHp,enemy.hp+ls); enemyHeal+=ls;
    passives.push({icon:'🩸',text:`RAGNAROK Lifesteal+${ls}`});
  }
  // SOVEREIGN drain (post-damage)
  if(ep.includes('M+M') && edApplied && enemy.hp>0) {
    const dr=0.03*(1+(bs.eSovereignStack||0));
    const ls=Math.max(1,Math.round(ed*dr));
    enemy.hp=Math.min(enemy.maxHp,enemy.hp+ls); enemyHeal+=ls;
    passives.push({icon:'👑',text:`SOVEREIGN Drain+${ls}`});
  }
  if(ep.includes('lifesteal') && edApplied && ed>0 && enemy.hp>0) {
    const steal=Math.max(1,Math.round(ed*0.15));
    enemy.hp=Math.min(enemy.maxHp,enemy.hp+steal);
    enemyHeal+=steal;
    passives.push({icon:'🩸',text:T(`ศัตรูดูดเลือด +${steal}`,`Enemy Lifesteal +${steal}`)});
  }
  if(ep.includes('reflect') && pdApplied && pd>0) {
    const ref=Math.max(1,Math.round(pd*0.15));
    creature.hp=Math.max(0,creature.hp-ref);
    eReflectDmg+=ref;
    passives.push({icon:'🔄',text:T(`ศัตรูสะท้อน ${ref} dmg`,`Enemy Reflect ${ref} dmg`)});
  }
  // enemy lifesteal / regen artifacts (post-damage)
  const eHasA2 = k => eArtId===k || eArtId2===k;
  if(eHasA2('crimson_fang') && edApplied && ed>0 && enemy.hp>0)
    { const h=Math.round(ed*0.05); enemy.hp=Math.min(enemy.maxHp,enemy.hp+h); enemyHeal+=h; passives.push({icon:'🩸',text:`[E] Crimson Fang +${h}`}); }
  if(eHasA2('blood_pact') && edApplied && ed>0 && enemy.hp>0)
    { const h=Math.round(ed*0.15); enemy.hp=Math.min(enemy.maxHp,enemy.hp+h); enemyHeal+=h; passives.push({icon:'🔴',text:`[E] Blood Pact +${h}`}); }
  if(eHasA2('soul_reaper') && edApplied && ed>0 && enemy.hp>0)
    { const h=Math.round(ed*0.25); enemy.hp=Math.min(enemy.maxHp,enemy.hp+h); enemyHeal+=h; passives.push({icon:'☠️',text:`[E] Soul Reaper +${h}`}); }
  if(eHasA2('drain_aura') && edApplied && ed>0 && enemy.hp>0) {
    const eas2 = bs.eArtStacks || (bs.eArtStacks = {});
    if(cmp==='win') eas2.drainAuraStack=Math.min(2,(eas2.drainAuraStack||0)+1);
    if((eas2.drainAuraStack||0)>0) { pd=Math.round(pd*(1-0.10*eas2.drainAuraStack)); passives.push({icon:'🌑',text:`[E] Drain Aura -${10*eas2.drainAuraStack}% pd →${pd}`}); }
  }
  if(eHasA2('life_seed')) { const h=Math.max(1,Math.round(enemy.maxHp*0.05)); enemy.hp=Math.min(enemy.maxHp,enemy.hp+h); enemyHeal+=h; passives.push({icon:'🌱',text:`[E] Life Seed +${h}`}); }
  if(eHasA2('moon_veil')) { const h=Math.max(1,Math.round(enemy.maxHp*0.08)); enemy.hp=Math.min(enemy.maxHp,enemy.hp+h); enemyHeal+=h; passives.push({icon:'🌙',text:`[E] Moon Veil +${h}`}); }
  if(eHasA2('crit_core') && enemyCrit && enemy.hp>0) { const h=Math.max(1,Math.round(enemy.maxHp*0.05)); enemy.hp=Math.min(enemy.maxHp,enemy.hp+h); enemyHeal+=h; passives.push({icon:'🎯',text:`[E] Crit Core +${h}`}); }

  // สะสม overdrive charge เมื่อ LOSE (เฉพาะ final form)
  if(cmp==='lose' && creature.phase==='final' && overdriveCharge < MAX_OVERDRIVE) {
    overdriveCharge++;
    saveGame();
  }

  const turnNum = battleState.turn;
  battleState.lastCmp = cmp;
  battleState.lastResult = { pm, em, cmp, crit, enemyCrit, pd, ed, playerFirst, passives, playerHeal, enemyHeal, reflectDmg, eReflectDmg, enemyStunned, playerStunned, pdHits, extraHits };
  battleState.turn++;
  battleState.log.push(
    `T${turnNum} ${pm.name} vs ${em.name}`+(cmp==='win'?' ▶WIN':cmp==='lose'?' ◀LOSE':''),
    `  you -${ed}${enemyCrit?' CRIT':''}  foe -${pd}${crit?' CRIT':''}`
  );
  if(passives.length) passives.forEach(p => battleState.log.push(`  ${p.icon} ${p.text}`));

  const finish = () => {
    if(enemy.hp<=0 || creature.hp<=0) {
      // keep animPhase so last-hit damage numbers show on the result screen
      endBattle(enemy.hp<=0);
    } else {
      battleState.animPhase = null;
      render();
    }
  };

  // Phase 1: first attacker — play move sound
  const _playMoveSound = (isPlayer) => {
    if(isPlayer) {
      // ผู้เล่นโจมตีออก
      if(pd === 0)  SFX.miss();
      else if(crit) SFX.crit();
      else          SFX.hit();
    } else {
      // ศัตรูโจมตีมา
      if(pm.name==='GUARD' && cmp==='win') SFX.block(); // บล็อกสำเร็จ
      else if(ed === 0)                    SFX.dodge(); // หลบได้
      else                                 SFX.hit();   // โดนตี
    }
  };
  battleState.animPhase = playerFirst ? 'p-atk' : 'e-atk';
  battleState.waiting = true;
  battleState.preAnimCleared = false;
  _playMoveSound(playerFirst);
  render();
  // Phase 1 impact: drop HP bar mid-animation (350ms into 750ms anim)
  setTimeout(() => { if(battleState) { battleState.preAnimCleared = true; render(); } }, 350);
  setTimeout(() => {
    // Skip phase 2 only if the phase-1 attacker already killed the defender
    const phase1DefenderDead = playerFirst ? enemy.hp <= 0 : creature.hp <= 0;
    if(phase1DefenderDead) {
      battleState.waiting = false;
      finish();
      return;
    }
    // Phase 2: always play when phase-1 defender survived (shows killing-blow damage if applicable)
    battleState.animPhase = playerFirst ? 'e-atk' : 'p-atk';
    battleState.preAnimCleared = false;
    _playMoveSound(!playerFirst);
    render();
    // Phase 2 impact: drop HP bar mid-animation
    setTimeout(() => { if(battleState) { battleState.preAnimCleared = true; render(); } }, 350);
    setTimeout(() => {
      battleState.waiting = false;
      finish();
    }, 750);
  }, 750);
}

function endBattle(won) {
  if(won) { SFX.victory(); } else { SFX.death(); setTimeout(()=>SFX.defeat(), 600); }
  battleState.won = won;

  // ===== DUEL BATTLE RESULT =====
  if(battleState.isDuelBattle) {
    // Save round log
    const _roundEnemy = battleState.enemy;
    duelBattleLogs.push({
      myName: creature.name, enemyName: _roundEnemy.name,
      won, log: [...battleState.log]
    });
    if(won) {
      duelMyWins++;
    } else {
      duelEnemyWins++;
      // try switch to next my pet
      const myPets = duelMyTeam.map(t => t.from==='party' ? pets[t.idx] : storage[t.idx]).filter(p=>p&&p.hp>0&&p!==creature);
      if(myPets.length > 0) {
        battleState.pendingPetSwitch = true;
        battleState.won = null;
        state = 'battle'; render(); return;
      }
    }
    // check if duel over
    const maxWins = duelMode==='1v1' ? 1 : 2;
    if(duelMyWins >= maxWins || duelEnemyWins >= maxWins) {
      duelWon = duelMyWins >= maxWins;
      pets.forEach((p,i) => { if(duelHpSnapshot[i]!==undefined) p.hp=duelHpSnapshot[i]; });
      saveGame(); state='duel_result'; render(); return;
    }
    // next enemy pet
    duelEnemyIdx++;
    if(duelEnemyIdx < duelEnemyTeam.length) {
      setTimeout(()=>{ startDuelBattle(duelEnemyIdx); }, 800);
      return;
    }
    duelWon = true;
    pets.forEach((p,i) => { if(duelHpSnapshot[i]!==undefined) p.hp=duelHpSnapshot[i]; });
    saveGame(); state='duel_result'; render(); return;
  }

  // ===== VS BATTLE RESULT =====
  if(battleState.isVsBattle) {
    if(!won) {
      vsPlayerDeaths++;
      const aliveOthers = pets.filter(p => p !== creature && p.phase !== 'egg' && p.hp > 0);
      if(aliveOthers.length > 0) {
        battleState.pendingPetSwitch = true;
        battleState.won = null;
        state = 'battle';
        render();
        return;
      }
      vsWon = false;
      vsRewards = { gold: 0, stagesCleared: vsCurrentStage, artifactBox: false };
      pets.forEach((p,i)=>{ if(vsHpSnapshot[i]!==undefined) p.hp=vsHpSnapshot[i]; });
      saveGame(); state = 'vs_result'; render();
      return;
    }
    vsEnemyIdx++;
    if(vsEnemyIdx < vsEnemies.length) {
      setTimeout(()=>{ startVsBattle(vsEnemyIdx); }, 800);
      return;
    }
    // All 4 cleared — give rewards and advance stage
    const stageGold = Math.round(vsCurrentStage * 500 + 1000);
    gold += stageGold;
    const ess = ['perm_atk','perm_spd','perm_def'];
    addItemToInventory(ess[Math.floor(Math.random()*3)]);
    if(vsCurrentStage % 5 === 0) addItemToInventory(ess[Math.floor(Math.random()*3)]);
    const gotBox = Math.random() < 0.25 + Math.min(vsCurrentStage*0.005, 0.25);
    if(gotBox) addItemToInventory('artifact_box');
    vsRewards = { gold: stageGold, stagesCleared: vsCurrentStage, artifactBox: gotBox };
    vsCurrentStage++;
    vsEnemies = generateVsEnemies();
    vsEnemyIdx = 0; vsPlayerDeaths = 0; vsWon = true;
    saveGame(); state = 'vs_result'; render();
    return;
  }

  // ===== TOWER BATTLE RESULT =====
  if(battleState.isTowerBattle) {
    if(!won) {
      const aliveOthers = pets.filter(p => p !== creature && p.phase !== 'egg' && p.hp > 0 && !p.resting);
      if(aliveOthers.length > 0) {
        battleState.pendingPetSwitch = true;
        battleState.won = null;
        state = 'battle';
        render();
        return;
      }
    }
    if(won) {
      towerFloor++;
      towerHighest = Math.max(towerHighest, towerFloor);
      towerPendingGold += Math.round(towerFloor * 8);
      if(towerFloor % 10 === 0) { towerPendingArtifacts.push('box'); }
      if(towerFloor % 10 === 0 && !towerFirstClears.has(towerFloor)) {
        towerFirstClears.add(towerFloor);
        const fcFloor = towerFloor;
        const _addShinyPet = () => { const sp=newPet(); sp.shiny=true; applyShinyStats(sp); if(pets.length<MAX_PETS){ pets.push(sp); syncCreature(); } else storage.push(sp); };
        const fcToasts = {'10':'💰 +1,000G','20':'✨ Essence ×10','30':'💰✨ +5,000G + Essence ×10','40':'📦 Rare Box','50':'✨🥚 Shiny Egg!','60':'📦 Epic Box','70':'💰🔮 +50,000G + Rebirth Stone ×5','80':'📦 Epic Box','90':'✨🥚 Shiny Egg!','100':'✨🥚 Shiny Egg + Epic Box'};
        if(fcFloor===10)  { gold+=1000; }
        else if(fcFloor===20) { for(let i=0;i<10;i++) addItemToInventory(['perm_atk','perm_spd','perm_def'][Math.floor(Math.random()*3)]); }
        else if(fcFloor===30) { gold+=5000; for(let i=0;i<10;i++) addItemToInventory(['perm_atk','perm_spd','perm_def'][Math.floor(Math.random()*3)]); }
        else if(fcFloor===40) { addItemToInventory('box_R'); }
        else if(fcFloor===50) { addItemToInventory('shiny_egg'); }
        else if(fcFloor===60) { addItemToInventory('box_E'); }
        else if(fcFloor===70) { gold+=50000; for(let i=0;i<5;i++) addItemToInventory('rebirth_stone'); }
        else if(fcFloor===80) { addItemToInventory('box_E'); }
        else if(fcFloor===90) { addItemToInventory('shiny_egg'); }
        else if(fcFloor===100) { addItemToInventory('shiny_egg'); addItemToInventory('box_E'); }
        towerPendingArtifacts.push(`🏆first_${fcFloor}`);
        scoutToast = `🏆 FIRST CLEAR! Floor ${fcFloor} — ${fcToasts[String(fcFloor)]||''}`;
      }
      if(towerFloor % 10 === 0) {
        towerCheckpoint = towerFloor;
        pets.forEach(p => { if(p.phase!=='egg') p.hp = p.maxHp; });
      }
      saveGame();
      state = 'tower'; render();
    } else {
      towerHighest = Math.max(towerHighest, towerFloor);
      towerRunSummary = { floor: towerFloor, gold: towerPendingGold, artifacts: [...towerPendingArtifacts] };
      towerFloor = 0; towerCheckpoint = 0; towerPendingGold = 0; towerPendingArtifacts = [];
      towerActive = false;
      saveGame();
      state = 'tower'; render();
    }
    return;
  }

  if(won && pendingBattleCell) {
    scoutGrid[idx(pendingBattleCell.x, pendingBattleCell.y)].type = 'empty';
  }
  pendingBattleCell = null;

  let rewards = [];
  if(won) {
    // Gold drop — use effective stage/difficulty (replay-aware)
    const isEffHardGold = replayStage > 0 ? replayHard : (hardMode || hellMode);
    const effectiveHardStageGold = replayStage > 0 ? replayStage : hellMode ? hellStage : hardStage;
    const effectiveNormalStageGold = replayStage > 0 ? replayStage : stage;
    const goldMult = hellMode ? 4 : isEffHardGold ? 2 : 1;
    const gs = hellMode ? 40+hellStage : isEffHardGold ? 20+effectiveHardStageGold : effectiveNormalStageGold;
    const hasLuckyCharm = creature.artifact==='lucky_charm' || creature.artifact2==='lucky_charm';
    const luckyProc = hasLuckyCharm && Math.random()<0.50;
    if(!battleState.isMini) {
      let goldGain = (battleState.isBoss
        ? 20 + gs*10 + Math.floor(Math.random()*(gs*5))
        : 5 + gs*3  + Math.floor(Math.random()*6)) * goldMult;
      if(luckyProc) { goldGain *= 2; }
      gold += goldGain;
      if(luckyProc) { rewards.push(`🍀 Lucky! Gold ×2 → 💰+${goldGain}G`); }
      else { rewards.push(`💰 +${goldGain}G`); }
      if(luckyProc) battleState.log.push(`🍀 Lucky Charm! Gold ×2 → +${goldGain}G`);
    }

    if(battleState.isBoss) {
      // Capture replay state BEFORE resetting (must be before replayStage=0)
      const isReplay = replayStage > 0;
      const wasReplayHard = replayHard;
      if(isReplay) {
        rewards.push(`🔄 REPLAY ${wasReplayHard?'HARD ':''}STAGE ${replayStage} CLEARED!`);
        genScoutGrid(); scoutPos = {x:0, y:0};
        rewards.push(`🗺️ MAP REFRESHED`);
      } else if(!hardMode && !hellMode) {
        const clearedNormal = stage;
        battleState.clearedStageLabel = `STAGE ${clearedNormal}`;
        stage++;
        if(stage > 20) { hardMode=true; hardStage=1; stage=20; rewards.push(`⭐ STAGE ${clearedNormal} CLEARED!`); rewards.push(T('🔥 HARD MODE UNLOCKED! ศัตรูแข็งแกร่งขึ้น 2×','🔥 HARD MODE UNLOCKED! Enemies grow stronger!')); }
        else { rewards.push(`⭐ STAGE ${clearedNormal} CLEARED!`); }
        if(clearedNormal === 20 && !scoutFirstClears.has('normal_20')) {
          scoutFirstClears.add('normal_20');
          for(let i=0;i<5;i++) addItemToInventory('box_R');
          rewards.push(T('🎁 FIRST CLEAR! 📦💜 ×5 Artifact Rare Box!','🎁 FIRST CLEAR! 📦💜 ×5 Artifact Rare Box!'));
        }
      } else if(hardMode && !hellMode) {
        const clearedStage = hardStage;
        battleState.clearedStageLabel = `HARD ${clearedStage}`;
        if(hardStage < 20) {
          hardStage++;
          rewards.push(`🔥 HARD STAGE ${clearedStage} CLEARED!`);
        } else {
          rewards.push(`🔥 HARD STAGE ${clearedStage} CLEARED!`);
          if(!scoutFirstClears.has('hard_20')) {
            scoutFirstClears.add('hard_20');
            addItemToInventory('box_E');
            rewards.push(T('🎁 FIRST CLEAR! 📦✨ Artifact Epic Box!','🎁 FIRST CLEAR! 📦✨ Artifact Epic Box!'));
          }
          hardMode=false; hellMode=true; hellStage=1;
          rewards.push(T('💀 HELL MODE UNLOCKED! ศัตรูโหดสุดขีด!','💀 HELL MODE UNLOCKED! Enemies are merciless!'));
        }
      } else {
        const clearedStage = hellStage;
        battleState.clearedStageLabel = `HELL ${clearedStage}`;
        if(hellStage < 20) {
          hellStage++;
          rewards.push(`💀 HELL STAGE ${clearedStage} CLEARED!`);
        } else {
          rewards.push(`💀 HELL STAGE ${clearedStage} CLEARED!`);
          if(!scoutFirstClears.has('hell_20')) {
            scoutFirstClears.add('hell_20');
            for(let i=0;i<3;i++) addItemToInventory('box_E');
            rewards.push(T('🎁 FIRST CLEAR! 📦✨ ×3 Artifact Epic Box!','🎁 FIRST CLEAR! 📦✨ ×3 Artifact Epic Box!'));
          }
          rewards.push(T('🏆 HELL 20 CLEARED! คุณคือผู้พิชิตนรก!','🏆 HELL 20 CLEARED! You have conquered HELL!'));
        }
      }
      if(!isReplay) {
        genScoutGrid();
        scoutPos = {x:0, y:0};
        rewards.push(hellMode ? `➡ HELL STAGE ${hellStage}! MAP REFRESHED!` : hardMode ? `➡ HARD STAGE ${hardStage}! MAP REFRESHED!` : `➡ STAGE ${stage}! MAP REFRESHED!`);
      }
      // Boss: drops (replay mode = ลด drop rate)
      const isEffHard = isReplay ? wasReplayHard : (hardMode || hellMode);
      // Boss: Symbol 100%
      const symKey = ['sym_F','sym_W','sym_S'][Math.floor(Math.random()*3)];
      addItemToInventory(symKey); rewards.push(`${ITEMS[symKey].icon} ${ITEMS[symKey].name}`);
      // Boss: Revive 25% Normal / 50% Hard
      if(Math.random() < (isEffHard?0.50:0.25)) { addItemToInventory('revive'); rewards.push(`${ITEMS.revive.icon} ${ITEMS.revive.name}`); }
      // Boss: Fusion Stone 10% Normal / 25% Hard
      if(Math.random() < (isEffHard?0.25:0.10)) { addItemToInventory('fusion_stone'); rewards.push(`${ITEMS.fusion_stone.icon} Fusion Stone!`); }
      // Boss: Essence 10% Normal / 50% Hard
      if(Math.random() < (isEffHard?0.50:0.10)) { const ek=dropEssence(); addItemToInventory(ek); rewards.push(`${ITEMS[ek].icon} ${ITEMS[ek].name}!`); }
      // Boss: Artifact Box ❌ Normal / 10% Hard / 10% Hard + 5% box_R Hell
      if(isEffHard && Math.random() < 0.10) { addItemToInventory('artifact_box'); rewards.push(`📦 Artifact Box!`); }
      if(hellMode && Math.random() < 0.05) { addItemToInventory('box_R'); rewards.push(`📦💜 Artifact Rare Box!`); }
      // Boss: Rebirth Stone 5% Normal / 25% Hard
      if(Math.random() < (isEffHard?0.25:0.05)) { addItemToInventory('rebirth_stone'); rewards.push(`🔮 Rebirth Stone!`); }
      // Boss: Mystery Egg
      const eggChance = !firstBossKilled ? 1.0 : isEffHard ? 0.20 : stage<=4?0.10 : stage<=7?0.15 : 0.20;
      if(Math.random() < eggChance) {
        if(pets.length < MAX_PETS) { const bp=newPet(); if(Math.random()<0.03) { bp.shiny=true; applyShinyStats(bp); } pets.push(bp); syncCreature(); rewards.push(bp.shiny?T(`✨ Shiny Mystery Egg — สัตว์เลี้ยงหายากเข้าปาร์ตี้!`,`✨ Shiny Mystery Egg — Rare beast joined party!`):T(`🥚 Mystery Egg — สัตว์เลี้ยงใหม่เข้าปาร์ตี้!`,`🥚 Mystery Egg — New beast joined party!`)); }
        else { addItemToInventory('mystery_egg'); rewards.push(T(`${ITEMS.mystery_egg.icon} Mystery Egg (เก็บใน Inventory)`,`${ITEMS.mystery_egg.icon} Mystery Egg (stored in Inventory)`)); }
      }
      firstBossKilled = true;
    } else if(battleState.isMimic) {
      // Mimic: ×5 gold (Normal) / ×5×1.5 (Hard, scale by hardStage)
      const mimicGs = hellMode ? 40+hellStage : hardMode ? 20+hardStage : gs;
      const mimicMult = isEffHardGold ? 1.5 : 1;
      const mimicGold = Math.round((15 + mimicGs*8 + Math.floor(Math.random()*mimicGs*5)) * 5 * mimicMult);
      gold += mimicGold;
      rewards.push(`💰 +${mimicGold}G (MIMIC LOOT!)`);
      // Fusion Stone 15%
      if(Math.random() < 0.15) { addItemToInventory('fusion_stone'); rewards.push(`${ITEMS.fusion_stone.icon} Fusion Stone!`); }
      // Rare item 35%
      if(Math.random() < 0.35) {
        const rarePool = ['max_potion','power_shard','speed_shard','guard_shard','revive'];
        const r = rarePool[Math.floor(Math.random()*rarePool.length)];
        addItemToInventory(r); rewards.push(`${ITEMS[r].icon} ${ITEMS[r].name}`);
      }
    } else if(battleState.isMini) {
      // Mini-boss gold bonus
      let mgold = (10 + gs*5 + Math.floor(Math.random()*gs*3)) * goldMult;
      if(luckyProc) { mgold *= 2; }
      gold += mgold;
      if(luckyProc) { rewards.push(`🍀 Lucky! Gold ×2 → 💰+${mgold}G`); } else { rewards.push(`💰 +${mgold}G`); }
      // Fusion Stone: 25% Normal / 50% Hard
      if(Math.random() < (isEffHardGold?0.50:0.25)) { addItemToInventory('fusion_stone'); rewards.push(`${ITEMS.fusion_stone.icon} Fusion Stone!`); }
      // Essence: ❌ Normal / 50% Hard
      if(isEffHardGold && Math.random() < 0.50) { const ek=dropEssence(); addItemToInventory(ek); rewards.push(`${ITEMS[ek].icon} ${ITEMS[ek].name}!`); }
      // Rebirth Stone: 5% Normal / 20% Hard
      if(Math.random() < (isEffHardGold?0.20:0.05)) { addItemToInventory('rebirth_stone'); rewards.push(`🔮 Rebirth Stone!`); }
    } else {
      // Monster: Symbol 5%
      if(Math.random() < 0.05) { const sk=['sym_F','sym_W','sym_S'][Math.floor(Math.random()*3)]; addItemToInventory(sk); rewards.push(`${ITEMS[sk].icon} ${ITEMS[sk].name}`); }
      // Monster: Map Scroll 5%
      if(Math.random() < 0.05) { addItemToInventory('map_scroll'); rewards.push(`${ITEMS.map_scroll.icon} ${ITEMS.map_scroll.name}`); }
      // Monster: Essence ❌ Normal / 20% Hard
      if(isEffHardGold && Math.random() < 0.20) { const ek=dropEssence(); addItemToInventory(ek); rewards.push(`${ITEMS[ek].icon} ${ITEMS[ek].name}!`); }
      // Monster: Rebirth Stone ❌ Normal / 1% Hard
      if(isEffHardGold && Math.random() < 0.01) { addItemToInventory('rebirth_stone'); rewards.push(`🔮 Rebirth Stone!`); }
    }
    // Item drop with count
    {
      const h = isEffHardGold;
      let dropChance, cntMin, cntMax;
      if(battleState.isBoss)       { dropChance=0.80; cntMin=h?3:2; cntMax=h?6:5; }
      else if(battleState.isMimic) { dropChance=h?0.50:0.20; cntMin=2; cntMax=5; }
      else if(battleState.isMini)  { dropChance=0.80; cntMin=h?3:2; cntMax=h?5:4; }
      else                         { dropChance=h?0.40:0.20; cntMin=h?2:1; cntMax=h?4:3; }
      if(Math.random() < dropChance) {
        const cnt = cntMin + Math.floor(Math.random()*(cntMax-cntMin+1));
        const pool = h
          ? ['super_potion','super_potion','max_potion','max_potion','power_shard','speed_shard','guard_shard','revive']
          : ['hp_potion','hp_potion','hp_potion','max_potion','power_shard','speed_shard','guard_shard','revive'];
        for(let i=0;i<cnt;i++) { const it=pool[Math.floor(Math.random()*pool.length)]; addItemToInventory(it); rewards.push(`${ITEMS[it].icon} ${ITEMS[it].name}`); }
      }
    }
  }
  battleState.reward = rewards.length ? rewards.join('  ') : null;
  battleItemPicker = false;
  saveGame();
  if(won && battleState.isBoss) {
    SFX.stageClear();
    state = 'stageclear';
    render();
    _scDone = false;
    _scTimer = setTimeout(() => {
      if(_scDone) return;
      _scDone = true;
      const ov = document.querySelector('.sc-overlay');
      if(ov) ov.classList.add('sc-fadeout');
      setTimeout(() => { state = 'result'; render(); }, 500);
    }, 2500);
    document.getElementById('scOverlay')?.addEventListener('click', () => {
      if(_scDone) return;
      _scDone = true;
      clearTimeout(_scTimer); _scTimer = null;
      state = 'result'; render();
    }, { once: true });
  } else {
    state = 'result';
    render();
  }
}

function getFormKey() {
  const order = {F:0, W:1, S:2};
  return [...creature.symbols].sort((a,b)=>(order[a]??9)-(order[b]??9)).join('');
}

function discardSymbol(idx) {
  if(idx < 0 || idx >= creature.symbols.length) return;
  const sym = creature.symbols[idx];
  creature.symbols.splice(idx, 1);
  scoutToast = T(`${SYMS[sym].icon} ${SYMS[sym].name} ถูกทิ้งแล้ว`,`${SYMS[sym].icon} ${SYMS[sym].name} discarded`);
  saveGame(); render();
}

function applyEvolution() {
  const key = getFormKey();
  const form = FORMS[key];
  if(!form) return;
  const oldSvg = buildPetSvg(creature, 90); // แคปร่างเดิมก่อน
  SFX.evolve();
  creature.formKey = key;
  creature.phase = 'evolved';
  seenEvolved.add(key);
  creature.name = form.name;
  const bonusHp  = Math.floor(creature.maxHp * 0.25);
  const bonusAtk = Math.floor(creature.atk   * 0.25);
  const bonusSpd = Math.floor(creature.spd   * 0.25);
  const bonusDef = Math.floor(creature.def   * 0.25);
  creature.maxHp = form.hp  + bonusHp;
  creature.hp    = creature.maxHp;
  creature.atk   = form.atk + bonusAtk;
  creature.spd   = form.spd + bonusSpd;
  creature.def   = form.def + bonusDef;
  if(creature.shiny) applyShinyStats(creature);
  creature.symbols = []; creature.trainCount = 0; creature.trainBonuses = {hp:0,atk:0,spd:0,def:0};
  saveGame();
  state='menu';
  render();
  showEvoAnimation({
    type: 'evolve',
    oldSvg,
    petSvg: buildPetSvg(creature, 160),
    name: form.name,
    color: form.color || '#c0a0ff',
    passive: form.passive,
    passiveIcon: form.passiveIcon,
  }, () => {});
}

function buildEggSvg(progress) {
  const cracks = Math.min(5, Math.floor(progress*6));
  const crackPaths = [
    'M32,18 L28,32 L34,42', 'M48,22 L52,38',
    'M22,38 L30,52',        'M42,48 L38,62',
    'M54,32 L48,48 L52,58'
  ].slice(0,cracks);
  const shake = progress>0.85?'anim-shake':'';
  const glowC = progress>0.7 ? `<ellipse cx="40" cy="55" rx="28" ry="35" fill="none" stroke="#c060ff" stroke-width="2" opacity="${0.3+(progress-0.7)*1.5}"/>` : '';
  return `<svg viewBox="0 0 80 100" width="80" height="100" class="${shake}" xmlns="http://www.w3.org/2000/svg">
    <defs><radialGradient id="eggG" cx="40%" cy="35%">
      <stop offset="0%" stop-color="#3a2a7a"/><stop offset="100%" stop-color="#1a0a3a"/>
    </radialGradient></defs>
    <ellipse cx="40" cy="55" rx="28" ry="35" fill="url(#eggG)" stroke="#5040a0" stroke-width="2"/>
    <ellipse cx="30" cy="40" rx="7" ry="10" fill="rgba(180,140,255,0.12)" transform="rotate(-10,30,40)"/>
    ${crackPaths.map(d=>`<path d="${d}" stroke="#c080ff" stroke-width="1.5" fill="none"/>`).join('')}
    ${glowC}
  </svg>`;
}

function buildLarvaSvg(size=80, glow=false, shiny=false) {
  const glowStyle = glow ? `filter:drop-shadow(0 0 4px #9b59b6);` : '';
  return `<img src="LARVA.png" width="${size}" height="${size}" class="anim-bob" style="image-rendering:pixelated;object-fit:contain;${glowStyle}">`;
}

function buildEvolvedSvg(formKey, size=80, glow=false, shiny=false) {
  const form = FORMS[formKey] || FINAL_FORMS[formKey];
  const name = form ? form.name : formKey;
  const color = form ? form.color : '#a0a0ff';
  const glowStyle = glow ? `filter:drop-shadow(0 0 4px ${color});` : '';
  return `<img src="${name}.png" width="${size}" height="${size}" class="anim-bob" style="image-rendering:pixelated;object-fit:contain;object-position:bottom center;display:block;${glowStyle}">`;
}

function playShinySound() {
  try {
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    const notes = [2093,2637,3136,2637,3520];
    notes.forEach((freq,i) => {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type = 'sine';
      o.frequency.setValueAtTime(freq, ctx.currentTime + i*0.07);
      g.gain.setValueAtTime(0, ctx.currentTime + i*0.07);
      g.gain.linearRampToValueAtTime(0.15, ctx.currentTime + i*0.07 + 0.015);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i*0.07 + 0.35);
      o.start(ctx.currentTime + i*0.07);
      o.stop(ctx.currentTime + i*0.07 + 0.38);
    });
    setTimeout(()=>ctx.close(), 2000);
  } catch(e){}
}
function buildShinySparkles(count=8, radius=60) {
  const colors = ['#ffd700','#ffe066','#ffffff','#ffee99','#ffc200','#fff4aa','#ffdd44'];
  let html = '';
  // Inner layer: twinkling stars that pulse in place
  for(let i = 0; i < 7; i++) {
    const a = (i/7)*Math.PI*2 + 0.3;
    const r = radius * 0.45;
    const x = Math.cos(a)*r, y = Math.sin(a)*r*0.6;
    const sz = 8 + (i%2)*5;
    const dur = (0.5 + i*0.12).toFixed(2);
    const del = -(i*0.07).toFixed(2);
    const col = colors[i%colors.length];
    html += `<div style="position:absolute;left:calc(50% + ${x.toFixed(0)}px);top:calc(50% + ${y.toFixed(0)}px);width:${sz}px;height:${sz}px;margin-left:-${sz/2}px;margin-top:-${sz/2}px;pointer-events:none;animation:sparkle-twinkle ${dur}s ${del}s ease-in-out infinite">
      <svg viewBox="0 0 10 10" width="${sz}" height="${sz}"><polygon points="5,0 6,4 10,5 6,6 5,10 4,6 0,5 4,4" fill="${col}"/></svg>
    </div>`;
  }
  // Outer layer: stars floating outward
  for(let i = 0; i < count; i++) {
    const a = (i/count)*Math.PI*2;
    const r1 = radius + Math.sin(i*7)*12;
    const r2 = r1 + 28;
    const sx = Math.cos(a)*r1, sy = Math.sin(a)*r1*0.65;
    const ex = Math.cos(a+0.4)*r2, ey = Math.sin(a+0.4)*r2*0.65;
    const dur = (1.4 + (i%3)*0.3).toFixed(2);
    const del = -(i/count*Number(dur)).toFixed(2);
    const sz = 10 + (i%4)*3;
    const col = colors[i%colors.length];
    html += `<div style="position:absolute;left:50%;top:50%;width:${sz}px;height:${sz}px;margin-left:-${sz/2}px;margin-top:-${sz/2}px;pointer-events:none;--sx:${sx.toFixed(0)}px;--sy:${sy.toFixed(0)}px;--ex:${ex.toFixed(0)}px;--ey:${ey.toFixed(0)}px;animation:sparkle-float ${dur}s ${del}s ease-in-out infinite">
      <svg viewBox="0 0 10 10" width="${sz}" height="${sz}"><polygon points="5,0 6,4 10,5 6,6 5,10 4,6 0,5 4,4" fill="${col}"/></svg>
    </div>`;
  }
  return html;
}

function buildPetSvg(pet, size=80, glow=false) {
  if(pet.phase==='egg') return buildEggSvg(pet.tapCount/pet.tapTarget);
  if(pet.phase==='larva') return buildLarvaSvg(size, glow, pet.shiny);
  if(pet.phase==='final') return buildEvolvedSvg(pet.finalKey, size, glow, pet.shiny);
  return buildEvolvedSvg(pet.formKey, size, glow, pet.shiny);
}
// final phase reuses buildEvolvedSvg — finalKey = fusion result key (e.g. 'F+W')
function buildCreatureSvg(size=240) {
  const s = creature.phase==='final' ? Math.round(size*1.4) : size;
  return buildPetSvg(creature, s, true);
}

function buildMonsterSvg(isBoss, typeKey, spriteFile) {
  const size = isBoss ? 200 : 160;
  if(spriteFile) {
    return `<img src="${spriteFile}" width="${size}" height="${size}" class="anim-bob" style="image-rendering:pixelated;object-fit:contain" onerror="this.style.display='none'">`;
  }
  // fallback SVG (ใช้ถ้าไม่มีไฟล์)
  const t = typeKey || 'F';
  const colors = {F:'#cc3300', W:'#00ccaa', S:'#3366cc'};
  const c = colors[t]||colors.F;
  return `<svg viewBox="0 0 80 80" width="${size}" height="${size}" class="anim-bob" xmlns="http://www.w3.org/2000/svg">
    <circle cx="40" cy="36" r="20" fill="${c}" opacity="0.8"/>
    <text x="40" y="42" text-anchor="middle" font-size="20" fill="white">${isBoss?'👑':t}</text>
  </svg>`;
}
