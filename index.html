const TRAIN_TYPES = [
  { type:'atk', icon:'💪', label:'POWER',     stat:'atk', gain:2,  desc:'ATK +2',      color:'#ff6b35' },
  { type:'spd', icon:'💨', label:'AGILITY',   stat:'spd', gain:2,  desc:'SPD +2',      color:'#4ecdc4' },
  { type:'def', icon:'🛡', label:'ENDURANCE', stat:'def', gain:2,  desc:'DEF +2',      color:'#45b7d1' },
  { type:'hp',  icon:'❤️', label:'VITALITY',  stat:'hp',  gain:10, desc:'MAX HP +10',  color:'#2ecc71' },
];

let trainPetIdx = 0;

function getTrainPet() { return pets[trainPetIdx] || creature; }

function doTrain(type) {
  const t = TRAIN_TYPES.find(x=>x.type===type);
  if(!t) return;
  const pet = getTrainPet();
  const cost = Math.floor(getTrainCount(pet) / 10 + 1) * 25;
  const left = Math.max(0, trainCap() - getTrainCount(pet));
  if(gold < cost) { scoutToast = T(`💰 Gold ไม่พอ! ต้องการ ${cost}G`,`💰 Not enough Gold! Need ${cost}G`); render(); return; }
  if(left <= 0) { scoutToast = T(`⛔ Train ครบ ${trainCap()} ครั้งแล้ว ชนะบอสเพื่อ Train เพิ่ม`,`⛔ Train limit ${trainCap()} reached! Beat the boss for more`); render(); return; }
  gold -= cost;
  pet.trainCount = getTrainCount(pet) + 1;
  if(!pet.trainBonuses) pet.trainBonuses = {hp:0,atk:0,spd:0,def:0};
  if(type==='hp') {
    pet.maxHp += t.gain;
    pet.hp = Math.min(pet.hp + t.gain, pet.maxHp);
    pet.trainBonuses.hp += t.gain;
  } else {
    pet[t.stat] += t.gain;
    pet.trainBonuses[t.stat] = (pet.trainBonuses[t.stat]||0) + t.gain;
  }
  scoutToast = `${t.icon} ${t.desc}! (-${cost}G)`;
  saveGame(); render();
}

function generateVsEnemy(vsStage) {
  const lv = vsStage; // 1-60 direct mapping
  const baseHp  = Math.round(40+lv*9+lv*lv*0.4);
  const typeKeys = ['F','W','S'];
  const typeKey = typeKeys[Math.floor(Math.random()*3)];
  const extraPassives = vsStage > 40 ? 2 : vsStage > 20 ? 1 : 0;
  const useFusion = vsStage > 60 ? true : vsStage > 40 ? true : vsStage > 20 ? Math.random() < 0.5 : false;
  if(useFusion) {
    const fkeys = Object.keys(FINAL_FORMS);
    const key = fkeys[Math.floor(Math.random()*fkeys.length)];
    const ff = FINAL_FORMS[key];
    const sc = baseHp / 135;
    return { name:ff.name, typeKey, isBoss:false, isMini:false, isMimic:false, spriteFile:null,
             isFusionEnemy:true, fusionKey:key,
             maxHp:Math.round(ff.hp*sc*1.1), hp:Math.round(ff.hp*sc*1.1),
             atk:Math.round(ff.atk*sc*1.5), def:Math.round(ff.def*sc),
             spd:Math.round((7+lv*1.2)*sc),
             passives:[key, ...pickEnemyPassives(typeKey, extraPassives)],
             ownPassiveDesc:ff.passive, ownPassiveIcon:ff.passiveIcon };
  } else {
    const ekeys = Object.keys(FORMS);
    const key = ekeys[Math.floor(Math.random()*ekeys.length)];
    const ef = FORMS[key];
    const sc = baseHp / 75;
    return { name:ef.name, typeKey, isBoss:false, isMini:false, isMimic:false, spriteFile:null,
             isEvolvedEnemy:true, evolvedKey:key,
             maxHp:Math.round(ef.hp*sc), hp:Math.round(ef.hp*sc),
             atk:Math.round(ef.atk*sc*1.4), def:Math.round(ef.def*sc),
             spd:Math.round((7+lv*1.2)*sc),
             passives:[key, ...pickEnemyPassives(typeKey, extraPassives)],
             ownPassiveDesc:ef.passive, ownPassiveIcon:ef.passiveIcon };
  }
}
function generateVsEnemies() {
  return Array.from({length:4}, (_,i) => generateVsEnemy(vsCurrentStage + i));

function encodeDuelTeam(teamPets) {
  const data = teamPets.map(p => {
    const isFusion = p.phase==='final';
    const isEvolved = p.phase==='evolved';
    const form = isEvolved ? FORMS[p.formKey] : isFusion ? FINAL_FORMS[p.finalKey] : null;
    return {
      name: p.name, phase: p.phase,
      isEvolvedEnemy: isEvolved, evolvedKey: p.formKey||null,
      isFusionEnemy: isFusion, fusionKey: p.finalKey||null,
      hp: p.maxHp, maxHp: p.maxHp, atk: p.atk, spd: p.spd, def: p.def,
      shiny: p.shiny||false,
      artifact: p.artifact||null,
      artifact2: p.artifact2||null,
      passives: p.formKey ? [p.formKey] : p.finalKey ? [p.finalKey] : [],
      ownPassiveDesc: form?.passive||null,
      ownPassiveIcon: form?.passiveIcon||null,
      typeKey: 'F',
    };
  });
  const b64 = btoa(unescape(encodeURIComponent(JSON.stringify({mode:duelMode, team:data}))));
  return b64.replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}

function decodeDuelB64(str) {
  str = str.replace(/-/g,'+').replace(/_/g,'/');
  while(str.length%4) str+='=';
  return JSON.parse(decodeURIComponent(escape(atob(str))));
}

function buildDuelShareUrl(teamPets) {
  return `${location.origin}${location.pathname}?duel=${encodeDuelTeam(teamPets)}`;
}

function parseDuelUrl() {
  try {
    const raw = new URLSearchParams(location.search).get('duel');
    if(!raw) return null;
    return decodeDuelB64(raw);
  } catch(e) { return null; }
}

let _scanInterval = null;

function stopScanCamera() {
  if(_scanInterval) { clearInterval(_scanInterval); _scanInterval = null; }
  if(_scanStream) { _scanStream.getTracks().forEach(t=>t.stop()); _scanStream=null; }
}

function startScanCamera() {
  if(!navigator.mediaDevices) {
    const el = document.getElementById('duelScanStatus');
    if(el) el.textContent = T('กล้องไม่รองรับบนเบราว์เซอร์นี้','Camera not supported');
    return;
  }
  navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:1280},height:{ideal:720}}})
    .then(stream => {
      _scanStream = stream;
      const video = document.getElementById('duelScanVideo');
      if(video) { video.srcObject = stream; video.play().catch(()=>{}); }
      const st = document.getElementById('duelScanStatus');
      if(st) st.textContent = T('🔍 กำลังสแกน...','🔍 Scanning...');
      if(_scanInterval) clearInterval(_scanInterval);
      _scanInterval = setInterval(scanFrame, 200);
    })
    .catch(() => {
      const el = document.getElementById('duelScanStatus');
      if(el) el.textContent = T('ไม่สามารถเปิดกล้องได้','Cannot access camera');
    });
}

function scanFrame() {
  if(!duelScanOpen) { stopScanCamera(); return; }
  const video = document.getElementById('duelScanVideo');
  const canvas = document.getElementById('duelScanCanvas');
  if(!video || !canvas) return;
  if(_scanStream && !video.srcObject) {
    video.srcObject = _scanStream;
    video.play().catch(()=>{});
    return;
  }
  if(video.videoWidth > 0 && video.videoHeight > 0) {
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(video, 0, 0);
    const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
    if(typeof jsQR !== 'undefined') {
      const code = jsQR(img.data, img.width, img.height, {inversionAttempts:'dontInvert'});
      if(code && code.data.includes('duel=')) {
        stopScanCamera();
        duelScanOpen = false;
        loadDuelFromUrl(code.data);
        return;
      }
    }
  }
}

function loadDuelFromUrl(url) {
  try {
    const param = new URL(url).searchParams.get('duel');
    const parsed = decodeDuelB64(param);
    duelUrlData = parsed;
    duelMode = parsed.mode;
    duelEnemyTeam = parsed.team.map(p=>({...p,hp:p.maxHp}));
    duelMyTeam = [];
    duelSelectStep = 'team';
    scoutToast = T('✅ โหลดทีมศัตรูแล้ว! เลือก pet ของคุณ','✅ Enemy team loaded! Select your pets');
    render();
  } catch(e) {
    scoutToast = T('❌ Link ไม่ถูกต้อง','❌ Invalid link');
    render();
  }
}

        ${(()=>{
          const consumables = ['hp_potion','super_potion','max_potion','power_shard','speed_shard','guard_shard','revive'];
          const avail = consumables.filter(k=>{ const s=inventory.find(x=>x.type===k); return s&&s.qty>0; });
          if(!avail.length) return `<div style="font-size:10px;color:#2a2a4a;font-family:Orbitron,monospace">${T('ไม่มีไอเทม','NO ITEMS')}</div>`;

            ${avail.map(k=>{
              const it=ITEMS[k];
              const qty=inventory.find(x=>x.type===k)?.qty||0;
              return `<div data-tower-useitem="${k}" title="${N(it)}" style="position:relative;width:36px;height:36px;border-radius:8px;border:1px solid #1a1a3a;background:#08080f;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0">
                <span style="font-size:20px;display:flex;align-items:center;justify-content:center">${it.icon}</span>
                <span style="position:absolute;bottom:1px;right:3px;font-size:9px;color:${it.color};font-family:Orbitron,monospace;line-height:1">${qty}</span>
              </div>`;
            }).join('')}
          </div>`;
        })()}
        ${towerToast?`<div style="font-size:11px;color:#80ee80;margin-top:4px">${towerToast}</div>`:''}
      </div>
      ${towerPendingGold>0||towerPendingArtifacts.length>0?`
      <div style="padding:8px 12px;border-radius:10px;background:#0a0a0f;border:1px solid #2a2a3a;display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        <div style="font-family:Orbitron,monospace;font-size:11px;color:#8878b8">${T('สะสมอยู่','Pending')}</div>
        <div style="font-size:12px;color:#ffcc44">💰 ${towerPendingGold.toLocaleString()} G</div>
        ${towerPendingArtifacts.filter(a=>a==='box').map(()=>`<span style="font-size:16px;color:#c0a0ff">📦</span>`).join('')}
        ${towerPendingArtifacts.filter(a=>a.startsWith('🏆')).map(a=>{
          const fl=a.replace('🏆first_','');
          const labels={'10':'💰 First Clear Bonus! +1,000G','20':'✨ First Clear Bonus! Essence ×10','30':'💰✨ First Clear Bonus! +5,000G + Essence ×10','40':'📦 First Clear Bonus! Rare Box','50':'✨ First Clear Bonus! Shiny Egg!','60':'📦 First Clear Bonus! Epic Box','70':'💰🔮 First Clear Bonus! +50,000G + Rebirth Stone ×5','80':'📦 First Clear Bonus! Epic Box','90':'✨ First Clear Bonus! Shiny Egg!','100':'✨📦 First Clear Bonus! Shiny Egg + Epic Box'};
          return `<div style="font-size:11px;color:#ffd700;background:#1a1400;border:1px solid #ffd700;border-radius:6px;padding:2px 8px">🏆 Floor ${fl} ${labels[fl]||''}</div>`;
        }).join('')}
      </div>`:''}
      ${towerFloor>0?`
        <div style="font-size:11px;color:#6858a0;text-align:center">${T('ตายแล้วเริ่มใหม่จากชั้น 1','If you die, run restarts from Floor 1')}</div>
        <div style="font-size:11px;text-align:center;color:${towerFloor===towerCheckpoint?'#44cc88':'#aa6622'}">
          ${towerFloor===towerCheckpoint
            ? T(`✅ Checkpoint ชั้น ${towerCheckpoint} — ออกได้เลย HP เต็ม`,`✅ Checkpoint Floor ${towerCheckpoint} — safe to exit, HP full`)
            : T(`⚠ ออกกลางทางจะย้อนกลับ Checkpoint ชั้น ${towerCheckpoint}`,`⚠ Exiting will reset to Checkpoint Floor ${towerCheckpoint}`)}
        </div>
      `:''}

      <div style="margin-top:auto;display:flex;flex-direction:column;gap:6px">
        ${(()=>{
          const blocked = pets.filter(p=>p.phase!=='egg').find(p=>(p.resting&&p.hp<p.maxHp)||p.expedition);
          if(blocked) {
            const reason = blocked.resting ? T(`${blocked.name} กำลัง Rest`,`${blocked.name} is Resting`) : T(`${blocked.name} อยู่ใน Expedition`,`${blocked.name} is on Expedition`);
            return `<div style="padding:12px;border-radius:12px;background:#1a1008;border:2px solid #555522;font-family:Orbitron,monospace;font-size:13px;color:#888844;text-align:center">
              ${T('🚫 เข้าไม่ได้','🚫 Cannot enter')}<br><span style="font-size:11px;color:#666633">${reason}</span>

      </div>
    </div>`;
}

function startTowerBattle() {
  if(creature.hp <= 0) { towerToast = T('💀 ตัวนี้ HP=0 เปลี่ยนตัวก่อน!','💀 HP=0 — swap to another beast first!'); render(); return; }
  if(creature.resting) { towerToast = T('🛌 กำลัง Rest อยู่ — หยุด Rest ก่อน!','🛌 Resting — stop Rest first!'); render(); return; }
  const floor = towerFloor + 1;
  const isBossFloor = floor % 10 === 0;
  const types = ['F','W','S'];
  const typeKey = types[Math.floor(Math.random()*3)];
  const et = ENEMY_TYPES[typeKey];

  const scale = floor>=91?1.2:floor>=61?1.0:floor>=31?0.9:0.8;
  const lv = floor;
  const slv = Math.min(lv, 60);

  const baseHp  = Math.round(40+slv*9+slv*slv*0.4);
  const baseAtk = Math.round(8+slv*2.5+slv*slv*0.10);
  const baseDef = Math.round(2+slv*1.5+slv*slv*0.05);
  const baseSpd = Math.round(7+slv*1.2);

  // Tower passive counts by floor tier
  const monPassiveCount = floor>=50?2:floor>=20?1:0;
  const bossPassiveCount = floor>=90?3:floor>=50?2:floor>=20?1:0;

  // Decide enemy pool: normal / evolved / fusion
  const useEvolved = floor>=20 && floor<90;
  const useFusion  = floor>=50;
  const allFusion  = floor>=90;

  const evoScale = baseHp / 75;
  const fusScale = baseHp / 135;

  // Try to pick Evolved or Fusion form as enemy (50% chance when available)
  let evolvedEnemy = null;
  if((useEvolved || useFusion || allFusion) && Math.random() < 0.5) {
    if(allFusion) {
      const fkeys = Object.keys(FINAL_FORMS);
      const fk = fkeys[Math.floor(Math.random()*fkeys.length)];
      const ff = FINAL_FORMS[fk];
      const ownPassive = fk;
      const extraCount = isBossFloor ? bossPassiveCount-1 : monPassiveCount-1;
      const extraPassives = extraCount>0 ? pickEnemyPassives(['F','W','S'][Math.floor(Math.random()*3)], extraCount) : [];
      const bm = isBossFloor?2.0:1, am = isBossFloor?1.5:1;
      evolvedEnemy = {
        name: `${ff.name} Lv.${floor}`, typeKey,
        isBoss:isBossFloor, isMini:false, isMimic:false,
        spriteFile: null, isFusionEnemy:true, fusionKey:fk,
        maxHp: Math.round(ff.hp * fusScale * bm),
        hp:    Math.round(ff.hp * fusScale * bm),
        atk:   Math.round(ff.atk * fusScale * am),
        def:   Math.round(ff.def * fusScale),
        spd:   Math.round(ff.spd * fusScale),
        passives: [ownPassive, ...extraPassives],
        ownPassiveDesc: ff.passive, ownPassiveIcon: ff.passiveIcon,
      };
    } else if(useFusion && Math.random()<0.5) {
      const fkeys = Object.keys(FINAL_FORMS);
      const fk = fkeys[Math.floor(Math.random()*fkeys.length)];
      const ff = FINAL_FORMS[fk];
      const extraCount = isBossFloor ? bossPassiveCount-1 : monPassiveCount-1;
      const extraPassives = extraCount>0 ? pickEnemyPassives(['F','W','S'][Math.floor(Math.random()*3)], extraCount) : [];
      const bm = isBossFloor?2.0:1, am = isBossFloor?1.5:1;
      evolvedEnemy = {
        name: `${ff.name} Lv.${floor}`, typeKey,
        isBoss:isBossFloor, isMini:false, isMimic:false,
        spriteFile: null, isFusionEnemy:true, fusionKey:fk,
        maxHp: Math.round(ff.hp * fusScale * bm),
        hp:    Math.round(ff.hp * fusScale * bm),
        atk:   Math.round(ff.atk * fusScale * am),
        def:   Math.round(ff.def * fusScale),
        spd:   Math.round(ff.spd * fusScale),
        passives: [fk, ...extraPassives],
        ownPassiveDesc: ff.passive, ownPassiveIcon: ff.passiveIcon,
      };
    } else {
      const ekeys = Object.keys(FORMS);
      const ek = ekeys[Math.floor(Math.random()*ekeys.length)];
      const ef = FORMS[ek];
      const extraCount = isBossFloor ? bossPassiveCount-1 : monPassiveCount-1;
      const extraPassives = extraCount>0 ? pickEnemyPassives(['F','W','S'][Math.floor(Math.random()*3)], extraCount) : [];
      const bm = isBossFloor?2.0:1, am = isBossFloor?1.5:1;
      evolvedEnemy = {
        name: `${ef.name} Lv.${floor}`, typeKey,
        isBoss:isBossFloor, isMini:false, isMimic:false,
        spriteFile: null, isEvolvedEnemy:true, evolvedKey:ek,
        maxHp: Math.round(ef.hp * evoScale * bm),
        hp:    Math.round(ef.hp * evoScale * bm),
        atk:   Math.round(ef.atk * evoScale * am),
        def:   Math.round(ef.def * evoScale),
        spd:   Math.round(ef.spd * evoScale * 0.7),
        passives: [ek, ...extraPassives],
        ownPassiveDesc: ef.passive, ownPassiveIcon: ef.passiveIcon,
      };
    }
  }

  const TOWER_BOSS_SPRITES = { F:['monster & boss/F-werewolf-boss.png','monster & boss/F-werewolf2-boss.png'], W:['monster & boss/W-griffon-boss.png'], S:['monster & boss/S-slime-boss.png'] };
  const TOWER_MON_SPRITES  = {
    F:['monster & boss/F-wolf-mon.png','monster & boss/F-werewolf2-miniboss.png','monster & boss/F-Slime-Mon.png','monster & boss/F-Bear-Mon.png','monster & boss/F-scropion-mon.png'],
    W:['monster & boss/W-chicken-mon.png','monster & boss/W-griffon-miniboss.png','monster & boss/W-slime-mon.png','monster & boss/W-cat-mon.png','monster & boss/W-bat-mon.png'],
    S:['monster & boss/S-goblin-mon.png','monster & boss/S-slime-miniboss.png','monster & boss/S-slime-mon.png','monster & boss/S-Skeleton-mon.png','monster & boss/S-golem-mon.png'],
  };
  // Mimic floor: 5% chance on non-boss floors (floor 5+)
  const isMimicFloor = !isBossFloor && floor>=5 && Math.random()<0.05;
  const spritePool = isMimicFloor ? ['monster & boss/mimic-mon.png'] : isBossFloor ? (TOWER_BOSS_SPRITES[typeKey]||TOWER_BOSS_SPRITES.F) : (TOWER_MON_SPRITES[typeKey]||TOWER_MON_SPRITES.F);
  const spriteFile = spritePool[Math.floor(Math.random()*spritePool.length)];

  const enemy = evolvedEnemy || {
    name: isBossFloor ? `${et.bossName} Lv.${floor}` : `${SPRITE_NAMES[spriteFile] || et.names[Math.min(2,Math.floor(floor/20))]} Lv.${floor}`,
    typeKey, isBoss:isBossFloor, isMini:false, isMimic:false, spriteFile,
    maxHp:  Math.round(baseHp  * et.hp  * scale * (isBossFloor?2.0:1)),
    hp:     Math.round(baseHp  * et.hp  * scale * (isBossFloor?2.0:1)),
    atk:    Math.round(baseAtk * et.atk * scale * (isBossFloor?1.5:1)),
    def:    Math.round(baseDef * et.def * scale),
    spd:    Math.round(baseSpd * et.spd * scale),
    passives: pickEnemyPassives(typeKey, isBossFloor ? bossPassiveCount : monPassiveCount),
  };

  battleState = {
    enemy, isBoss:isBossFloor,
    turn:1, log:[], passivesLog:[], lastResult:null,
    animPhase:null, waiting:false,
    phantasmStack:0, vanguardStack:0, sovereignStack:0,
    warlordConsec:0, ironcladStack:0, stormfangStun:false,
    wraithDodged:false, colossusHits:0, colossusBoost:false,
    overdriveUsed:false, odBuff:null, enemyStunTurns:0,
    isTowerBattle:true,
    artifactStacks: {},
  };
  state = 'battle';
  render();
}

function renderTrain() {
  labelStrip.textContent = 'TRAINING';
  const trainable = pets.filter(p => p.phase !== 'egg' && !p.expedition);
  if(!trainable.find(p=>p===pets[trainPetIdx])) trainPetIdx = pets.indexOf(trainable[0]);
  const pet = getTrainPet();
  const petCost = Math.floor(getTrainCount(pet) / 10 + 1) * 25;
  const petLeft = Math.max(0, trainCap() - getTrainCount(pet));

  const petSelectorHtml = trainable.map(p => {
    const idx = pets.indexOf(p);
    const isSelected = idx === trainPetIdx;
    const f = p.phase==='final' ? FINAL_FORMS[p.finalKey] : p.phase==='evolved' ? FORMS[p.formKey] : null;
    const col = f?.color || '#6060a0';
    return `<div data-trainpet="${idx}" style="
      display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 6px;
      border-radius:8px;border:2px solid ${isSelected ? col : '#2a2a4a'};
      background:${isSelected ? 'rgba(80,40,120,0.3)' : '#08080f'};cursor:pointer;flex-shrink:0">
      <div style="width:36px;height:36px;display:flex;align-items:center;justify-content:center">
        ${buildPetSvg(p, 34, true)}
      </div>
      <div style="font-family:Orbitron,monospace;font-size:8px;color:${isSelected?col:'#3a3a6a'};white-space:nowrap;max-width:44px;overflow:hidden;text-overflow:ellipsis">${petName(p)}</div>
    </div>`;
  }).join('');

  const cardsHtml = TRAIN_TYPES.map(t => {
    const canAfford = gold >= petCost;
    const canTrain = petLeft > 0 && canAfford;
    const borderColor = canTrain ? t.color+'55' : '#2a2a3a';
    const labelColor = canTrain ? t.color : '#4a4a6a';
    const statVal = t.type==='hp' ? pet.maxHp : pet[t.stat];
    return `
    <div class="train-btn" data-type="${t.type}" style="
      padding:8px 14px; border-radius:12px; cursor:${canTrain?'pointer':'default'}; user-select:none;
      background:#0e0e22; border:2px solid ${borderColor};
      display:flex; align-items:center; gap:12px; transition:all 0.15s; opacity:${canTrain?1:0.55};
    ">
      <div style="font-size:22px">${t.icon}</div>
      <div style="flex:1">
        <div style="font-family:Orbitron,monospace;font-size:13px;color:${labelColor};font-weight:700">${t.label}</div>
        <div style="font-size:11px;color:#8878b8;margin-top:1px">${t.desc}</div>
      </div>
      <div style="text-align:right">
        <div style="font-family:Orbitron,monospace;font-size:13px;color:${labelColor}">${statVal}</div>
        <div style="font-size:11px;color:${canAfford?'#f0c040':'#aa3333'};margin-top:2px">💰${petCost}G</div>
      </div>
    </div>`;
  }).join('');

  const f = pet.phase==='final' ? FINAL_FORMS[pet.finalKey] : pet.phase==='evolved' ? FORMS[pet.formKey] : null;
  const petCol = f?.color || '#8080c0';

  screenContent.innerHTML = `
    <div style="width:100%;height:100%;display:flex;flex-direction:column;gap:6px;padding:4px 0">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div style="font-family:Orbitron,monospace;font-size:11px;color:#8878b8;letter-spacing:1px">TRAINING</div>
        <div style="font-family:Orbitron,monospace;font-size:11px;color:#f0c040">💰${gold}G &nbsp;<span style="color:${petLeft>0?'#8080c0':'#aa3333'}">${petLeft}/${trainCap()} ${T('ครั้ง','')}</span></div>
      </div>
      <div style="display:flex;gap:6px;overflow-x:auto;padding-bottom:2px">${petSelectorHtml}</div>
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4px 0">
        <div style="font-family:Orbitron,monospace;font-size:13px;color:${pet.shiny?'#ffd700':petCol};margin-bottom:4px${pet.shiny?';animation:shiny-glow 1.5s ease-in-out infinite':''}"> ${pet.shiny?'✨ ':''}${petName(pet)}</div>
        <div style="position:relative;display:inline-flex;align-items:center;justify-content:center">
          ${buildPetSvg(pet, pet.phase==='final'?240:200, true)}
          ${pet.shiny ? buildShinySparkles(10, pet.phase==='final'?90:75) : ''}
        </div>
        <div style="font-size:10px;color:#8878b8;margin-top:4px">HP ${pet.hp}/${pet.maxHp} ● ATK ${pet.atk} ● SPD ${pet.spd} ● DEF ${pet.def}</div>
      </div>
      <div style="display:flex;flex-direction:column;gap:5px;overflow-y:auto;flex:1">
        ${cardsHtml}
      </div>
    </div>`;
}

  screenContent.innerHTML = `
    <div class="menu-screen">
      <div class="creature-panel">
        <div style="display:flex;align-items:center;justify-content:center;gap:6px">
          <div class="creature-name" style="color:${creature.shiny?'#ffd700':f?f.color:'#c0a0ff'}">${creature.shiny?'✨ ':''}${petName(creature)}</div>
          ${creature.resting?(()=>{const _w=creature.hp<=0&&creature.deadRestUntil>Date.now();return _w?`<span style="background:#2a0808;border:1px solid #803030;border-radius:8px;padding:1px 6px;font-size:12px;color:#ff8080">💀 <span data-countdown="${creature.deadRestUntil}">${fmtTime(Math.max(0,creature.deadRestUntil-Date.now()))}</span></span>`:`<span style="background:#1a3a1a;border:1px solid #40a040;border-radius:8px;padding:1px 6px;font-size:12px">🛌 REST</span>`;})():''}
        </div>
        ${phaseLine}
        <div style="position:relative;display:inline-flex;align-items:center;justify-content:center">
          ${buildCreatureSvg()}
          ${creature.shiny ? buildShinySparkles(8, 70) : ''}

function renderScout() {
  labelStrip.textContent = replayStage>0 ? `🔄 REPLAY STAGE ${replayStage} ✦ ${BIOMES[currentBiome].label}` : hellMode ? `💀 HELL MODE ✦ STAGE ${hellStage}/20 ✦ ${BIOMES[currentBiome].label}` : hardMode ? `🔥 HARD MODE ✦ STAGE ${hardStage}/20 ✦ ${BIOMES[currentBiome].label}` : `SCOUT ✦ STAGE ${stage} ✦ ${BIOMES[currentBiome].label}`;
  let cellsHtml = '';
  for(let y=0;y<GRID;y++) for(let x=0;x<GRID;x++) {
    const cell = scoutGrid[idx(x,y)];
    const isPlayer = x===scoutPos.x && y===scoutPos.y;
    const dx=Math.abs(x-scoutPos.x), dy=Math.abs(y-scoutPos.y);
    const isAdj = !isPlayer && dx+dy===1;
    if(!cell.vis && !isPlayer) { cellsHtml+=`<div class="scout-cell fog"></div>`; continue; }
    const t = cell.type;
    const icons = {monster:'👾',boss:'💀',mini_boss:'👹',secret_shop:'🏪',heal:'💚',treasure:'🎁',gold_chest:'💰',rest:'🏕',empty:'·'};
    const cls = `scout-cell visible ${isPlayer?'player':''} ${isAdj?'adjacent':''} ${!isPlayer?t:''}`;
    const icon = isPlayer ? '◉' : (icons[t]||'·');
    const iconStyle = (!isPlayer && t!=='empty') ? 'style="font-size:15px;filter:drop-shadow(0 0 3px rgba(0,0,0,0.9)) drop-shadow(0 1px 2px rgba(0,0,0,1))"' : '';
    cellsHtml += `<div class="${cls}" data-x="${x}" data-y="${y}"><span ${iconStyle}>${icon}</span></div>`;
  }

  const symHtml = [0,1,2].map(i=>{
    const s = creature.symbols[i];
    return s ? `<span style="color:${SYMS[s].color};display:inline-flex;align-items:center">${(s==='W'||s==='S')?symSvg(s,16):SYMS[s].icon}</span>` : `<span style="color:#5a50a0">○</span>`;
  }).join(' ');

  // Pet switcher bar
  const petBarHtml = pets.map((p,i)=>{
    const isActive = i===activePetIdx;
    const onExp = !!p.expedition;
    const f = p.formKey ? FORMS[p.formKey] : null;
    const hpPct = Math.round(p.hp/p.maxHp*100);
    const nameColor = isActive ? (f?f.color:'#c0a0ff') : '#4040a0';
    const border = isActive ? '#8060d0' : onExp ? '#554400' : '#1a1a3a';
    const bg = isActive ? 'rgba(100,60,200,0.15)' : '#08080f';
    const opacity = onExp ? '0.45' : '1';
    return `
      <div data-switchpet="${i}" style="flex:1;padding:4px 6px;border-radius:8px;border:1px solid ${border};
        background:${bg};cursor:${onExp?'default':'pointer'};opacity:${opacity};min-width:0">
        <div style="font-family:Orbitron,monospace;font-size:10px;color:${p.shiny?'#ffd700':nameColor};
          white-space:nowrap;overflow:hidden;text-overflow:ellipsis">
          ${isActive?'▶ ':''}${p.shiny?'✨ ':''}${petName(p)}
        </div>
        <div style="display:flex;align-items:center;gap:3px;margin-top:2px">
          <div style="flex:1;height:3px;background:#0a0a20;border-radius:2px;overflow:hidden">
            <div style="width:${hpPct}%;height:100%;background:${hpPct>50?'#2ecc71':hpPct>25?'#f39c12':'#e74c3c'};border-radius:2px"></div>
          </div>
          <span style="font-size:9px;color:#6858a0">${p.hp}</span>
        </div>
        ${onExp?`<div style="font-size:8px;color:#554400;font-family:Orbitron,monospace">🌑 EXP</div>`:''}
        ${(!onExp && p.phase!=='egg' && (p.hp<p.maxHp||p.resting)) ? (()=>{ const waiting=p.resting&&p.hp<=0&&p.deadRestUntil>Date.now(); const waitSec=waiting?Math.ceil((p.deadRestUntil-Date.now())/1000):0; return `<div onclick="event.stopPropagation();toggleRest(${i});render();" style="font-size:11px;font-family:Orbitron,monospace;margin-top:3px;padding:3px 0;border-radius:4px;text-align:center;cursor:pointer;${p.resting?(waiting?'background:#2a0808;color:#ff8080;border:1px solid #803030':'background:#2a0a50;color:#c0a0ff;border:1px solid #8060d0'):'background:#0f0f20;color:#9080b8;border:1px solid #2a2a5a'}">${p.resting?(waiting?`💀 <span data-countdown="${p.deadRestUntil}">${fmtTime(waitSec*1000)}</span>`:'😴 RESTING'):'🛌 REST'}</div>`; })():''}
      </div>`;
  }).join('');

  // Item quick-use bar — compact icon grid
  const itemBarHtml = inventory.length ? inventory.map(slot=>{
    const it = ITEMS[slot.type];
    if(!it) return '';
    return `
      <div data-quickitem="${slot.type}" title="${N(it)}" style="position:relative;width:36px;height:36px;

        <div style="font-family:Orbitron,monospace;font-size:13px;color:#8080c0;text-align:center">USE ITEM</div>
        <div style="flex:1;display:flex;flex-direction:column;gap:6px;overflow-y:auto">${itemHtml}</div>
        <div id="cancelItem" style="padding:8px;border-radius:8px;background:#0e0e22;border:1px solid #2a2a5a;font-family:Orbitron,monospace;font-size:12px;color:#8878b8;text-align:center;cursor:pointer">✕ CANCEL</div>
      </div>`;
    return;
  }

  const isAnimating = !!battleState.animPhase;
  const moveBtns = MOVES.map((m, i) => `
    <div data-moveidx="${i}" style="
      padding:10px 4px; border-radius:10px; cursor:${isAnimating?'default':'pointer'}; user-select:none;
      background:#0e0e22; border:2px solid #2a2a5a; text-align:center; flex:1;
      opacity:${isAnimating?0.4:1}; transition:all 0.1s; pointer-events:${isAnimating?'none':'auto'};
    ">
      <div style="font-size:22px">${m.icon}</div>
      <div style="font-family:Orbitron,monospace;font-size:11px;color:#c0a0ff;font-weight:700;margin-top:3px">${m.name}</div>
      <div style="font-size:10px;color:#6858a0;margin-top:2px">${m.desc}</div>
    </div>`).join('');

  const hasHealItem = inventory.some(s=>['hp_potion','max_potion'].includes(s.type));
  const isFinal = creature.phase==='final';
  const bs = battleState;
  const odInfo = isFinal ? OVERDRIVE_INFO[creature.finalKey] : null;
  const odReady = isFinal && overdriveCharge>=MAX_OVERDRIVE && !bs.overdriveUsed;
  const odUsed  = isFinal && bs.overdriveUsed;
  const odBuff  = bs.odBuff;

  function buildOdCircle() {
    if(!isFinal) return '';
    const cx=32,cy=32,r=26,size=64;
    const segs=MAX_OVERDRIVE, segDeg=56, gapDeg=16;
    let arcs='';
    for(let i=0;i<segs;i++){
      const s=-90+i*(segDeg+gapDeg), e=s+segDeg;
      const sr=s*Math.PI/180, er=e*Math.PI/180;
      const x1=(cx+r*Math.cos(sr)).toFixed(2), y1=(cy+r*Math.sin(sr)).toFixed(2);
      const x2=(cx+r*Math.cos(er)).toFixed(2), y2=(cy+r*Math.sin(er)).toFixed(2);
      const filled = odUsed ? false : i<overdriveCharge;
      const col = filled ? (odReady?'#ff6600':'#ff9900') : '#1e1e3a';
      const glow = filled&&odReady ? 'filter:drop-shadow(0 0 3px #ff6600)' : '';
      arcs+=`<path d="M${x1} ${y1} A${r} ${r} 0 0 1 ${x2} ${y2}" fill="none" stroke="${col}" stroke-width="5" stroke-linecap="round" style="${glow}"/>`;
    }
    const bgCol = odBuff?'#001a10':odReady?'#120800':odUsed?'#0a0a0a':'#08080f';
    const rimCol = odBuff?'#00cc66':odReady?'#ff9900':odUsed?'#333333':'#1a1a3a';
    const icon   = odBuff?(odInfo?.icon||'🔥'):odReady?'⚡':odUsed?'—':'⚡';
    const iconCol= odBuff?'#00ff88':odReady?'#ffcc00':odUsed?'#333333':'#333344';
    const label  = odBuff?`${odBuff.turnsLeft}T`:odReady?'USE!':odUsed?'USED':'OD';
    const readyAnim = odReady?'animation:odFire 0.8s ease-in-out infinite alternate;':'';
    const title  = odInfo ? `${odInfo.icon} ${odInfo.name}${odBuff?` (${odBuff.turnsLeft} turns left)`:odUsed?' — USED':''}` : '';
    return `
      <div id="overdriveBtn" style="position:relative;width:${size}px;height:${size}px;cursor:${odReady&&!isAnimating?'pointer':'default'};user-select:none;flex-shrink:0;${readyAnim}" title="${title}">
        <svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="position:absolute;inset:0">
          <circle cx="${cx}" cy="${cy}" r="${r-3}" fill="${bgCol}" stroke="${rimCol}" stroke-width="1.5"/>
          ${arcs}
        </svg>
        <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none">
          <span style="font-size:20px;line-height:1">${icon}</span>
          <span style="font-family:Orbitron,monospace;font-size:8px;color:${iconCol};margin-top:2px;letter-spacing:0.5px">${label}</span>
        </div>
      </div>`;
  }

  screenContent.innerHTML = `
    <div style="width:100%;height:100%;display:flex;flex-direction:column;gap:5px;overflow:hidden">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
        <div style="flex:1">
          <div style="font-family:Orbitron,monospace;font-size:11px;color:#c0a0ff">${petName(creature)}</div>
          <div style="font-size:10px;color:#8878b8">HP ${displayPlayerHp}/${creature.maxHp}</div>
          <div style="height:6px;background:#0a0a20;border-radius:3px;overflow:hidden;margin-top:3px;border:1px solid #1a1a3a">
            <div style="width:${pHpPct}%;height:100%;background:linear-gradient(90deg,${pHpPct<=20?'#ff3333,#cc0000':pHpPct<=30?'#ff8800,#cc5500':'#2ecc71,#27ae60'});border-radius:3px;transition:width 0.4s"></div>
          </div>
          ${(()=>{
            const a1=creature.artifact, a2=creature.artifact2;
            const hp=creature.hp, mhp=creature.maxHp;
            const stacks1=battleState.artifactStacks||{}, stacks2=battleState.artifactStacks2||{};
            const iwS = a1==='iron_will'?stacks1 : a2==='iron_will'?stacks2 : null;
            const badges=[];
            const badge=(txt,col,bg,sec)=>`<span style="font-size:10px;font-family:Orbitron,monospace;color:${col};background:${bg};border:1px solid ${col};border-radius:4px;padding:1px 5px;animation:pulseRed ${sec}s ease-in-out infinite alternate">${txt}</span>`;
            if((a1==='execution'||a2==='execution') && hp<mhp*0.20)
              badges.push(badge('☠ EXECUTION','#ff2222','rgba(80,0,0,0.7)','0.7'));
            if((a1==='death_mark'||a2==='death_mark') && hp<mhp*0.30)
              badges.push(badge('💀 DEATH MARK','#ff6600','rgba(60,20,0,0.7)','0.9'));
            if((a1==='stone_skin'||a2==='stone_skin') && hp>mhp*0.70)
              badges.push(badge('🪨 STONE SKIN','#aaaaaa','rgba(30,30,30,0.7)','1.2'));
            if(iwS) {
              if(iwS.ironWillBoostReady)
                badges.push(badge('💎 ATK×4 NEXT','#ffd700','rgba(60,50,0,0.7)','0.6'));
              else if(!iwS.ironWillUsed)
                badges.push(badge('💎 IRON WILL','#8888ff','rgba(10,10,50,0.7)','1.5'));
            }
            return badges.length?`<div style="display:flex;gap:4px;margin-top:3px;flex-wrap:wrap">${badges.join('')}</div>`:'';
          })()}
        </div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:3px;padding:0 4px">
          ${battleState.isVsBattle ? `<div style="display:flex;gap:4px">${vsEnemies.map((e,i)=>{
            const dead=e.hp<=0, isActive=i===vsEnemyIdx;
            return `<div style="width:9px;height:9px;border-radius:50%;background:${dead?'#2a2a2a':isActive?'#e0d0ff':'#7060a0'};border:1px solid ${dead?'#3a3a3a':isActive?'#c0a0ff':'#5040a0'};box-shadow:${isActive?'0 0 5px #c0a0ff':'none'};transition:all 0.3s"></div>`;
          }).join('')}</div>` : ''}
          <div style="font-family:Orbitron,monospace;font-size:10px;color:#6858a0">T${turn}</div>
        </div>
        <div style="flex:1;text-align:right">
          <div style="display:flex;align-items:center;justify-content:flex-end;gap:4px">
            <span style="font-size:12px" title="${et.desc}">${et.icon}</span>
            <div style="font-family:Orbitron,monospace;font-size:11px;color:${enemy.shiny?'#ffd700':eColor}${enemy.shiny?';animation:shiny-glow 1.5s ease-in-out infinite':''}">${enemy.shiny?'✨ ':''}${enemy.name}</div>
          </div>
          <div style="font-size:10px;color:#8878b8;text-align:right">HP ${displayEnemyHp}/${enemy.maxHp}</div>
          ${(()=>{
            const ep = enemy.passives||[];
            const ebadges=[];
            const ebadge=(txt,col,bg,sec)=>`<span style="font-size:10px;font-family:Orbitron,monospace;color:${col};background:${bg};border:1px solid ${col};border-radius:4px;padding:1px 5px;animation:pulseRed ${sec}s ease-in-out infinite alternate">${txt}</span>`;
            // passive badges
            if(ep.includes('dmg_reduce') && enemy.hp > enemy.maxHp*0.50)
              ebadges.push(ebadge('⬛ IRON BODY','#aaaaaa','rgba(20,20,20,0.8)','1.2'));
            if(ep.includes('barrier') && turn%3===0)
              ebadges.push(ebadge('🔰 BARRIER','#44ccff','rgba(0,40,60,0.8)','0.8'));
            if(ep.includes('enrage') && enemy.hp < enemy.maxHp*0.50)
              ebadges.push(ebadge('⚔️ ENRAGE','#ff8800','rgba(60,20,0,0.7)','0.9'));
            if(ep.includes('last_dance') && enemy.hp < enemy.maxHp*0.10)
              ebadges.push(ebadge('💥 LAST DANCE','#ff2222','rgba(80,0,0,0.7)','0.7'));
            if(ep.includes('berserker') && battleState.eBerserkerStacks>0)
              ebadges.push(ebadge(`🔺 ATK+${battleState.eBerserkerStacks*10}%`,'#ff6600','rgba(60,20,0,0.7)','1.2'));
            // artifact badges (mirror player side)
            const ea1=enemy.artifact, ea2=enemy.artifact2;
            const eas=battleState.eArtStacks||{};
            const eHp=enemy.hp, eMhp=enemy.maxHp;
            const eHasArt=k=>ea1===k||ea2===k;
            if(battleState.eIronWillBoostReady)
              ebadges.push(ebadge('💎 ATK×4 NEXT','#ffd700','rgba(60,50,0,0.7)','0.6'));
            else if(eHasArt('iron_will') && !battleState.eIronWillUsed)
              ebadges.push(ebadge('💎 IRON WILL','#8888ff','rgba(10,10,50,0.7)','1.5'));
            if(eHasArt('execution') && eHp < eMhp*0.20)
              ebadges.push(ebadge('☠ EXECUTION','#ff2222','rgba(80,0,0,0.7)','0.7'));
            if(eHasArt('death_mark') && eHp < eMhp*0.30)
              ebadges.push(ebadge('💀 DEATH MARK','#ff6600','rgba(60,20,0,0.7)','0.9'));
            if(eHasArt('stone_skin') && eHp > eMhp*0.70)
              ebadges.push(ebadge('🪨 STONE SKIN','#aaaaaa','rgba(30,30,30,0.7)','1.2'));
            if(eHasArt('life_seed'))
              ebadges.push(ebadge('🌱 REGEN','#44ff88','rgba(0,40,20,0.7)','1.5'));
            if(eHasArt('moon_veil'))
              ebadges.push(ebadge('🌙 REGEN','#aaaaff','rgba(10,10,40,0.7)','1.5'));
            if(eHasArt('rage_core') && (eas.rageCoreStack||0)>0)
              ebadges.push(ebadge(`🔥 RAGE ×${eas.rageCoreStack}`,'#ff6600','rgba(60,20,0,0.7)','1.0'));
            if(eHasArt('victory_chain') && (eas.victoryStack||0)>0)
              ebadges.push(ebadge(`⛓ WIN×${eas.victoryStack}`,'#ffcc44','rgba(50,40,0,0.7)','1.2'));
            if(eHasArt('chain_strike') && (eas.chainStreak||0)>0)
              ebadges.push(ebadge(`💥 CHAIN×${eas.chainStreak}`,'#ff4488','rgba(60,0,30,0.7)','0.9'));
            if(eHasArt('tide_breaker') && battleState.lastCmp==='win')
              ebadges.push(ebadge('🌊 TIDE','#44ccff','rgba(0,30,50,0.7)','0.8'));
            return ebadges.length?`<div style="display:flex;gap:4px;margin-top:3px;justify-content:flex-end;flex-wrap:wrap">${ebadges.join('')}</div>`:'';
          })()}
          ${(enemy.passives||[]).length ? `<div style="display:flex;gap:3px;justify-content:flex-end;margin-top:2px">${(enemy.passives).map(id=>{
            const ep=ENEMY_PASSIVES.find(x=>x.id===id);
            if(ep) return `<span title="${ep.desc}" style="font-size:11px;background:rgba(80,20,20,0.5);border:1px solid #5a2a2a;border-radius:4px;padding:1px 4px">${ep.icon}</span>`;
            const ff=FINAL_FORMS[id]; if(ff) return `<span title="${P(ff)}" style="font-size:11px;background:rgba(80,20,80,0.5);border:1px solid #5a2a5a;border-radius:4px;padding:1px 4px">${ff.passiveIcon}</span>`;
            const ef=FORMS[id]; if(ef) return `<span title="${P(ef)}" style="font-size:11px;background:rgba(40,40,80,0.5);border:1px solid #3a3a6a;border-radius:4px;padding:1px 4px">${ef.passiveIcon}</span>`;
            return '';
          }).join('')}</div>` : ''}
          ${(()=>{
            const ea1=enemy.artifact?ARTIFACTS[enemy.artifact]:null;
            const ea2=enemy.artifact2?ARTIFACTS[enemy.artifact2]:null;
            if(!ea1&&!ea2) return '';
            return `<div style="display:flex;gap:3px;justify-content:flex-end;margin-top:2px">${[ea1,ea2].filter(Boolean).map(a=>`<span title="${a.name}: ${a.desc}" style="font-size:11px;background:rgba(80,60,20,0.5);border:1px solid #6a5a2a;border-radius:4px;padding:1px 4px">${a.icon}</span>`).join('')}</div>`;
          })()}
          <div style="height:6px;background:#0a0a20;border-radius:3px;overflow:hidden;margin-top:3px;border:1px solid #1a1a3a">
            <div style="width:${eHpPct}%;height:100%;background:linear-gradient(90deg,#e74c3c,#c0392b);border-radius:3px;transition:width 0.4s"></div>
          </div>
        </div>
      </div>

      ${(()=>{
        const ap = battleState.animPhase;
        const lr = lastResult;
        // player anim: atk-r when player attacks, hit+flash when enemy attacks
        const playerCls = ap==='p-atk' ? 'atk-r' : ap==='e-atk' ? 'hit flash' : (lr?(lr.cmp==='win'?'atk-r':lr.cmp==='lose'?'hit flash':''):'');
        // enemy anim: atk-l when enemy attacks, hit+flash when player attacks
        const enemyCls  = ap==='e-atk' ? 'atk-l' : ap==='p-atk' ? 'hit flash' : (lr?(lr.cmp==='lose'?'atk-l':lr.cmp==='win'?'hit flash':''):'');

        // Damage numbers
        let dmgNums = '';
        if(lr) {
          if(ap==='p-atk') {
            const hits = lr.pdHits&&lr.pdHits.length>1 ? lr.pdHits : (lr.pd>0?[lr.pd]:[]);
            if(hits.length===0) {
              dmgNums += `<div class="dmg-num enemy-hit">MISS</div>`;
            } else {
              hits.forEach((h,i)=>{ dmgNums += `<div class="dmg-num enemy-hit" style="animation-delay:${i*0.22}s;top:${30-i*11}%">-${h}</div>`; });
            }
            if(lr.extraHits&&lr.extraHits.length>0) lr.extraHits.forEach((h,i)=>{ dmgNums += `<div class="dmg-num enemy-hit" style="animation-delay:${(hits.length+i)*0.22}s;top:${30-(hits.length+i)*11}%;color:#ffaa44">+${h}</div>`; });
            if(lr.crit) dmgNums += `<div class="dmg-num crit-tag">⚡CRIT!</div>`;
            if(lr.playerHeal>0) dmgNums += `<div class="dmg-num heal">🩸+${lr.playerHeal}</div>`;
            if(lr.eReflectDmg>0) dmgNums += `<div class="dmg-num player-hit" style="color:#ff88ff;animation-delay:0.3s;top:50%">🔄-${lr.eReflectDmg}</div>`;
          } else if(ap==='e-atk') {
            dmgNums += `<div class="dmg-num player-hit ${lr.ed===0?'miss-tag':''}">${lr.ed>0?'-'+lr.ed:'DODGE!'}</div>`;
            if(lr.enemyCrit) dmgNums += `<div class="dmg-num miss-tag" style="color:#ff4444;left:8%;right:auto;top:48%;font-size:13px">💢CRIT!</div>`;
            if(lr.enemyHeal>0) dmgNums += `<div class="dmg-num enemy-heal">🩸+${lr.enemyHeal}</div>`;
            if(lr.reflectDmg>0) dmgNums += `<div class="dmg-num enemy-hit" style="color:#00ffcc;font-size:18px;top:50%;animation-delay:0.3s;text-shadow:0 0 8px #00ffcc">🛡🔄-${lr.reflectDmg}</div>`;
          }
        }
        return `
        <div style="display:flex;justify-content:space-around;align-items:flex-end;flex:1;min-height:130px;border-radius:10px;overflow:hidden;background-image:url('${getBattleBg()}');background-size:cover;background-position:center bottom;position:relative">
          <div class="${playerCls}" style="position:relative;z-index:1;${lr&&lr.playerStunned&&ap==='p-atk'?'filter:brightness(1.4) saturate(0.3);':''}${odBuff?`filter:drop-shadow(0 0 8px #ff6600) drop-shadow(0 0 16px #ff440066);animation:odFire 0.6s ease-in-out infinite alternate`:''}">
            ${lr&&lr.playerStunned&&ap==='p-atk'?`<div style="position:absolute;top:-28px;left:50%;transform:translateX(-50%);display:flex;gap:2px;z-index:10;pointer-events:none">${['⚡','💫','⚡'].map((s,i)=>`<span style="font-size:18px;animation:stun-float 0.8s ease-out ${i*0.15}s both">${s}</span>`).join('')}</div>`:''}
            ${buildPetSvg(creature, creature.phase==='final'?180:130, true)}
          </div>
          ${dmgNums}
          <div class="${enemyCls}" style="position:relative;z-index:1;${lr&&lr.enemyStunned&&ap==='e-atk'?'filter:brightness(1.4) saturate(0.3);':(!bs.isDuelBattle&&(enemy.isFusionEnemy||enemy.isEvolvedEnemy))?`filter:hue-rotate(${enemy.isFusionEnemy?'180deg':'0deg'}) brightness(0.85) saturate(1.4) drop-shadow(0 0 8px ${(enemy.isFusionEnemy?FINAL_FORMS[enemy.fusionKey]:FORMS[enemy.evolvedKey])?.color||'#aa44ff'})`:``}">
            ${lr&&lr.enemyStunned&&ap==='e-atk'?`<div style="position:absolute;top:-28px;left:50%;transform:translateX(-50%);display:flex;gap:2px;z-index:10;pointer-events:none">${['⚡','💫','⚡'].map((s,i)=>`<span style="font-size:18px;animation:stun-float 0.8s ease-out ${i*0.15}s both">${s}</span>`).join('')}</div>`:''}
            <div style="position:relative;display:inline-flex;align-items:center;justify-content:center;${(enemy.isFusionEnemy||enemy.isEvolvedEnemy)?'transform:scaleX(-1)':''}">
              ${enemy.isFusionEnemy ? buildPetSvg({phase:'final',finalKey:enemy.fusionKey,shiny:enemy.shiny||false,symbols:[]},isBoss?200:180,false)
                : enemy.isEvolvedEnemy ? buildPetSvg({phase:'evolved',formKey:enemy.evolvedKey,shiny:enemy.shiny||false,symbols:[]},isBoss?170:130,false)
                : buildMonsterSvg(isBoss, enemy.typeKey, enemy.spriteFile)}
              ${(enemy.shiny&&(enemy.isFusionEnemy||enemy.isEvolvedEnemy)) ? buildShinySparkles(8, isBoss?90:70) : ''}
            </div>
          </div>
        </div>`;
      })()}

      <div style="background:#08080f;border-radius:8px;padding:6px 8px;border:1px solid #1a1a3a;min-height:50px;max-height:130px;overflow-y:auto;display:flex;flex-direction:column;justify-content:center;flex-shrink:0">
        ${resultBox}
      </div>
      <div style="background:#05050c;border-radius:8px;padding:4px 8px;border:1px solid #111128;max-height:72px;overflow-y:auto;display:flex;flex-direction:column-reverse;gap:1px">
        ${battleState.log.length ? [...battleState.log].reverse().slice(0,14).map((line,i)=>`
          <div style="font-family:monospace;font-size:10px;color:${i<=1?'#6060c0':line.trimStart().startsWith('you')||line.trimStart().startsWith('foe')?'#3a3a6a':line.match(/^\s+[^\s]/)?'#7050a0':'#2a2a4a'};white-space:pre">${line}</div>`).join('')
        : `<div style="font-size:10px;color:#1a1a3a;text-align:center">— log —</div>`}
      </div>


      ${(battleState.isTowerBattle || battleState.isVsBattle) ? `
      <div style="display:flex;gap:4px;padding:4px 0">
        ${pets.filter(p=>p.phase!=='egg').map((p,i)=>{
          const realIdx = pets.indexOf(p);
          const isActive = p === creature;
          const isDead = p.hp <= 0;
          const col = isDead?'#3a1a1a':isActive?'#ffaa00':'#2a2a4a';
          return `<div data-tower-switch="${realIdx}" style="flex:1;text-align:center;padding:3px;border-radius:6px;border:1px solid ${col};background:${isActive?'#1a0e00':isDead?'#100808':'#0a0a1a'};cursor:${isDead||isActive?'default':'pointer'};opacity:${isDead?0.4:1}">
            <div style="width:28px;height:28px;margin:0 auto;display:flex;align-items:center;justify-content:center;${isDead?'filter:grayscale(1)':''}">${buildPetSvg(p,26,false)}</div>
            <div style="height:3px;background:#0a0a20;border-radius:2px;margin-top:2px;overflow:hidden"><div style="width:${Math.max(0,Math.round(p.hp/p.maxHp*100))}%;height:100%;background:${isDead?'#3a1a1a':'#2ecc71'}"></div></div>
          </div>`;
        }).join('')}
      </div>` : ''}

      <div style="display:flex;gap:4px;align-items:flex-end">
        <div style="flex:1;display:flex;gap:3px">${moveBtns}</div>
        <div style="display:flex;flex-direction:column;gap:4px;align-items:center">
          ${battleState.isVsBattle ? `<div style="padding:5px 6px;border-radius:8px;background:#080808;border:1px solid #1a1a1a;text-align:center;width:44px;opacity:0.3">
            <div style="font-size:16px">🧪</div>
            <div style="font-size:8px;color:#2a2a2a;font-family:Orbitron,monospace">NO ITEM</div>
          </div>` : `<div id="battleItemBtn" style="padding:5px 6px;border-radius:8px;cursor:pointer;user-select:none;background:${hasHealItem?'#0e2218':'#080810'};border:1px solid ${hasHealItem?'#2ecc71':'#1a1a2a'};text-align:center;width:44px">
            <div style="font-size:16px">🧪</div>
            <div style="font-size:8px;color:${hasHealItem?'#2ecc71':'#2a2a4a'};font-family:Orbitron,monospace">ITEM</div>
          </div>`}
          ${buildOdCircle()}
        </div>
      </div>
    </div>`;
}

function renderStageClear() {
  const isBoss = battleState.isBoss;
  const sl = replayStage>0 ? `REPLAY ${replayHard?'HARD ':''}${replayStage}` : (battleState.clearedStageLabel || (hellMode ? `HELL ${hellStage}` : hardMode ? `HARD ${hardStage}` : `STAGE ${stage}`));
  const subText = isBoss ? `${sl} CLEAR!` : 'MINI-BOSS DEFEATED!';
  const starEmojis = ['⭐','✨','💫','🌟','⚡'];
  const starsHtml = Array.from({length:18}, (_,i) => {
    const x = 5 + Math.random()*90;
    const delay = (Math.random()*1.5).toFixed(2);
    const dur   = (1.2 + Math.random()*1.0).toFixed(2);
    const em = starEmojis[i % starEmojis.length];
    return `<div class="sc-star" style="left:${x}%;bottom:${10+Math.random()*30}%;animation-duration:${dur}s;animation-delay:${delay}s">${em}</div>`;
  }).join('');
  labelStrip.textContent = '★ STAGE CLEAR ★';
  screenContent.innerHTML = `
    <div class="sc-overlay" id="scOverlay">
      <div class="sc-stars">${starsHtml}</div>
      <div class="sc-banner">STAGE CLEAR</div>
      <div class="sc-sub">${subText}</div>
      <div style="position:absolute;bottom:24px;font-family:Orbitron,monospace;font-size:10px;color:#6040a0;letter-spacing:2px;animation:scBannerIn 0.4s ease 1.5s both">TAP TO CONTINUE</div>
    </div>`;
  // click handler managed in resolveBattle to avoid double-render
}

function renderResult() {
  const {won, log, reward, enemy, passivesLog} = battleState;
  labelStrip.textContent = won ? '★ VICTORY ★' : '✕ DEFEATED';
  const symHtml = [0,1,2].map(i=>{
    const s = creature.symbols[i];
    return s ? `<span style="color:${SYMS[s].color};display:inline-flex;align-items:center;gap:2px">${(s==='W'||s==='S')?symSvg(s,14):SYMS[s].icon}${SYMS[s].name}</span>` : '';
  }).filter(Boolean).join(' ');

  const passiveSummaryHtml = '';

  screenContent.innerHTML = `
    <div class="result-screen">
      <div class="result-title ${won?'win':'lose'}">${won?'VICTORY':'DEFEAT'}</div>
      ${buildCreatureSvg()}
      ${reward?`<div class="result-reward">${reward}</div>`:''}
      <div class="result-log">${log.join('\n').replace(/\n/g,'<br>')}</div>
      ${creature.phase==='larva'&&creature.symbols.length>0?`<div style="font-size:12px;color:#9080b8">SYMBOLS: ${symHtml}</div>`:''}
      ${passiveSummaryHtml}
    </div>`;
}

function renderEvolve() {
  const key = getFormKey();
  const form = key ? FORMS[key] : null;
  labelStrip.textContent = '🧬 EVOLUTION';

  const symHtml = creature.symbols.length
    ? creature.symbols.map((s, i) => `
        <div style="display:flex;flex-direction:column;align-items:center;gap:3px">
          <div class="sym-slot ${s}" style="position:relative">${(s==='W'||s==='S')?symSvg(s,20):SYMS[s].icon}</div>
          <div data-discard="${i}" style="font-size:10px;color:#5a2a2a;cursor:pointer;font-family:Orbitron,monospace;
            background:#1a0a0a;border:1px solid #3a1a1a;border-radius:4px;padding:1px 6px;">✕</div>
        </div>`).join('')
    : `<div style="font-size:12px;color:#6858a0">${T('— ยังไม่มี symbol —','— no symbols yet —')}</div>`;

  const bonusHp  = Math.floor(creature.maxHp  * 0.25);
  const bonusAtk = Math.floor(creature.atk    * 0.25);
  const bonusSpd = Math.floor(creature.spd    * 0.25);
  const bonusDef = Math.floor(creature.def    * 0.25);
  const hasBonuses = bonusHp||bonusAtk||bonusSpd||bonusDef;
  const bonusTag = (val) => val > 0 ? `<span style="color:#88ff88;font-size:10px"> +${val}</span>` : '';
  const formCard = form ? `
    ${buildEvolvedSvg(key, 80, true)}
    <div class="form-card" style="border-color:${form.color}">
      <div class="form-card-name" style="color:${form.color}">${form.name}</div>
      <div class="form-card-desc">${form.desc}</div>
      <div class="form-card-stats">HP ${form.hp+bonusHp} ● ATK ${form.atk+bonusAtk} ● SPD ${form.spd+bonusSpd} ● DEF ${form.def+bonusDef}</div>
      ${hasBonuses ? `<div style="font-size:10px;color:#66cc66;margin-top:4px">✨ รวม Train bonus แล้ว</div>` : ''}
    </div>
    <div style="font-size:12px;color:#8878b8;font-family:Orbitron,monospace">OK = EVOLVE ● ✕ = ${T('ทิ้ง','Discard')} symbol</div>` : `
    <div style="font-size:12px;color:#7060aa;text-align:center">${T('เก็บ symbol ให้ครบ 3 อัน','Collect 3 symbols to evolve')}</div>`;

  screenContent.innerHTML = `
    <div class="evolve-screen">
      <div class="evolve-title">${form ? 'EVOLUTION READY' : 'SYMBOLS'}</div>
      <div class="evolve-syms" style="gap:12px">${symHtml}</div>
      ${formCard}
    </div>`;
}

document.getElementById('btnOk').addEventListener('click', ()=>{ SFX.click();
  if(state==='stageclear') { if(_scDone) return; _scDone=true; clearTimeout(_scTimer); _scTimer=null; state='result'; render(); return; }
  if(state==='menu') { enterScout(); }
  else if(state==='scout') { state='menu'; render(); }
  else if(state==='result') {
    state = creature.phase==='egg' ? 'egg' : 'scout';
    if(!scoutGrid.length) genScoutGrid();
    render();
  }
  else if(state==='evolve') {
    const key = getFormKey();
    scoutToast = `syms:${JSON.stringify(creature.symbols)} key:${key} form:${!!FORMS[key]}`;
    showToast(scoutToast); scoutToast='';
    if(creature.symbols.length === 3) applyEvolution();
  }
});

screenContent.addEventListener('click', e=>{
  const el = e.target;

  if(state==='shop') {
    const shopBuy = el.closest('[data-shopbuy]');
    if(shopBuy) {
      SFX.click();
      const type = shopBuy.dataset.shopbuy;
      const price = Number(shopBuy.dataset.shopprice);
      if(gold < price) return;
      gold -= price;
      addItemToInventory(type);
      saveGame(); render(); return;
    }
    return;
  }

  if(state==='tower') {
    if(el.closest('[data-tower-start]')) {
      SFX.click();
      if(stage < 10 && !hardMode) { towerToast=T('🔒 ต้องผ่าน Scout Stage 10 ก่อน!','🔒 Clear Scout Stage 10 first!'); render(); return; }
      if(towerFloor === 0) {
        if(stamina < 10) { towerToast=T('⚡ Stamina ไม่พอ! ต้องการ 10 AP','⚡ Not enough Stamina! Need 10 AP'); render(); return; }
        stamina -= 10; saveGame();
      }
      startTowerBattle(); return;
    }
    if(el.closest('[data-tower-swap]')) {
      const idx = Number(el.closest('[data-tower-swap]').dataset.towerSwap);
      const p = pets[idx];
      if(p && p.phase!=='egg' && !p.resting && !p.expedition && p.hp > 0) {
        activePetIdx = idx; syncCreature(); saveGame(); render();
      }
      return;
    }
    if(el.closest('[data-tower-revive]')) {
      const idx = Number(el.closest('[data-tower-revive]').dataset.towerRevive);
      const ok = useItem('revive', idx);
      if(ok !== false) towerToast = scoutToast;
      scoutToast = ''; saveGame(); render(); return;
    }
    if(el.closest('[data-tower-useitem]')) {
      const type = el.closest('[data-tower-useitem]').dataset.towerUseitem;
      const ok = useItem(type, activePetIdx);
      if(ok !== false) towerToast = scoutToast;
      scoutToast = '';
      saveGame(); render(); return;
    }
    if(el.closest('[data-tower-abandon]')) {
      SFX.click();
      towerHighest = Math.max(towerHighest, towerFloor);
      towerRunSummary = { floor: towerFloor, gold: towerPendingGold, artifacts: [...towerPendingArtifacts] };
      towerFloor = 0; towerCheckpoint = 0; towerPendingGold = 0; towerPendingArtifacts = [];
      towerActive = false;
      saveGame(); render(); return;
    }
    if(el.closest('[data-tower-claim]')) {
      SFX.click();
      if(towerRunSummary) {
        const claimedGold = towerRunSummary.gold;
        const claimedBoxes = towerRunSummary.artifacts.filter(a=>a==='box').length;
        gold += claimedGold;
        towerRunSummary.artifacts.filter(a=>a==='box').forEach(() => addItemToInventory('artifact_box'));
        towerRunSummary = null;
        const parts = [];
        if(claimedGold > 0) parts.push(`💰 +${claimedGold.toLocaleString()} G`);
        if(claimedBoxes > 0) parts.push(`📦 ×${claimedBoxes} Artifact Box`);
        scoutToast = parts.length ? `✅ Tower Run Rewards: ${parts.join('  ')}` : '✅ Tower Run Rewards Collected!';
      }
      saveGame(); state='menu'; render(); return;
    }
    const equipEl = el.closest('[data-equip-artifact]');
    if(equipEl) {
      SFX.click();
      const idx = parseInt(equipEl.dataset.equipArtifact);
      const prevArt = pets[idx].artifact;
      if(prevArt === 'vitality_core') {
        pets[idx].maxHp = Math.round(pets[idx].maxHp / 1.2);
        pets[idx].hp = Math.min(pets[idx].hp, pets[idx].maxHp);
      }
      saveGame(); render(); return;
    }
    return;
  }

  if(state==='egg') {
    creature.tapCount++;
    if(creature.tapCount >= creature.tapTarget) {
      creature.phase='larva'; creature.name='LARVA';
      if(Math.random() < 0.03) { creature.shiny=true; applyShinyStats(creature); }
      const _hatchShiny = creature.shiny;
      state='menu';
      saveGame(); render();
      showHatchAnimation(_hatchShiny, () => {
        scoutToast = _hatchShiny ? T('✨ SHINY HATCHED! สัตว์เลี้ยงหายากมาก!','✨ SHINY HATCHED! Ultra-rare beast!') : '🥚 HATCHED! Collect 3 symbols to evolve!';
        render();
      });
    } else {
      // Update just the counter and progress bar for performance
      const pct = Math.min(100, Math.round(creature.tapCount/creature.tapTarget*100));
      const fill = document.querySelector('.progress-fill');
      const counter = document.querySelector('.tap-counter');
      const eggSvg = document.querySelector('.egg-screen svg');
      if(fill) fill.style.width = pct+'%';
      if(counter) counter.textContent = `${creature.tapCount.toLocaleString()} / ${creature.tapTarget.toLocaleString()}`;
      // Re-render egg SVG every 500 taps for crack updates
      if(creature.tapCount % 500 === 0) {
        if(creature.tapCount % 2000 === 0) saveGame();
        render();
      }
    }
    return;
  }

  if(state==='title') {
    const delBtn = el.closest('[data-deleteslot]');
    if(delBtn) {
      const n = Number(delBtn.dataset.deleteslot);
      slotDeleteConfirm = n; render();
      return;
    }
    if(el.closest('#slotDelCancel'))  { slotDeleteConfirm=null; render(); return; }
    if(el.closest('#slotDelConfirm')) {
      localStorage.removeItem(SLOT_KEY(slotDeleteConfirm));
      slotDeleteConfirm=null; render(); return;
    }
    const loadBtn = el.closest('[data-loadslot]');
    if(loadBtn) {
      const n = Number(loadBtn.dataset.loadslot);
      currentSlot = n;
      const loaded = loadGame(n);
      if(!loaded) {
        pets = [newPet()]; activePetIdx = 0; inventory = []; gold = 500;
        stage = 1; scoutGrid = []; scoutPos = {x:0,y:0};
        syncCreature(); saveGame();
      }
      if(!pets.length) { pets.push(newPet()); syncCreature(); }
      checkDailyScrolls();
      SFX.titleStart();
      const nextState = creature.phase === 'egg' ? 'egg' : 'menu';
      fadeToState(() => { state = nextState; _bgmCurrent = null; render(); });
      return;
    }
    return;
  }

  if(state==='menu') {
    if(el.closest('#settingsBtn'))   { SFX.click(); settingsOpen=true; render(); return; }
    if(el.closest('#settingsClose')) { SFX.click(); settingsOpen=false; render(); return; }
    if(el.closest('#helpBtn'))       { SFX.click(); helpOpen=true; render(); return; }
    if(el.closest('#helpClose'))     { SFX.click(); helpOpen=false; render(); return; }
    if(el.closest('#exportSaveBtn')) { SFX.click(); exportSave(); return; }
    if(el.closest('#exitBtn'))      { SFX.click(); exitConfirm=true; render(); return; }
    if(el.closest('#exitConfirmYes')){ SFX.click(); exitConfirm=false; state='title'; render(); return; }
    if(el.closest('#exitConfirmNo')) { SFX.click(); exitConfirm=false; render(); return; }
    if(el.closest('#bgmToggle')) {
      _bgmOn = !_bgmOn;
      if(_bgmAudio) { if(_bgmOn) { _bgmAudio.play().catch(()=>{}); _bgmAudio.volume=_bgmVol; } else _bgmAudio.pause(); }
      render(); return;
    }
    if(el.closest('#sfxToggle')) { _sfxOn=!_sfxOn; render(); return; }
    const slider = el.closest('#bgmVolSlider');
    if(slider) return; // handled by input event
    const icon = el.closest('.menu-icon') || el.closest('[data-action]');
    if(!icon) return;
    SFX.click();
    const action = icon.dataset.action;
    if(action==='action-menu') { actionMenuOpen=true; render(); return; }
    if(action==='scout')     { actionMenuOpen=false; enterScout(); return; }
    if(el.closest('[data-action-menu-close]') && !el.closest('.menu-icon')) { actionMenuOpen=false; render(); return; }
    else if(action==='train')     { state='train'; render(); }
    else if(action==='party')     { partyExpSelect=null; state='party'; render(); }
    else if(action==='inventory') { state='inventory'; render(); }
    else if(action==='evolve' || action==='symbols') { state='evolve'; render(); }
    else if(action==='rest') { state='rest'; render(); }
    else if(action==='expedition') { actionMenuOpen=false; state='expedition'; render(); }
    else if(action==='train')      { actionMenuOpen=false; state='train'; render(); }
    else if(action==='shop')       { state='shop'; render(); }
    else if(action==='vs')         { actionMenuOpen=false; enterVs(); return; }
    else if(action==='duel')       { actionMenuOpen=false; enterDuel(); return; }
    else if(action==='tower')      { actionMenuOpen=false;
      if(towerFloor > towerCheckpoint) {
        towerFloor = towerCheckpoint;
        pets.forEach(p => { if(p.phase!=='egg') p.hp = p.maxHp; });
        saveGame();
      }
      state='tower'; render();
    }
  }

  if(state==='party') {
    const selPet = el.closest('[data-selectpet]');
    if(selPet) {
      const i = Number(selPet.dataset.selectpet);
      if(pets[i]) { partyDetailIdx = i; if(pets[i].shiny) playShinySound(); render(); }
      return;
    }
    if(el.closest('[data-setactive]')) {
      const i = Number(el.closest('[data-setactive]').dataset.setactive);
      if(pets[i] && i!==activePetIdx && !pets[i].expedition) {
        setActivePet(i); scoutToast=T(`${petName(creature)} เป็น active pet!`,`${petName(creature)} is now active!`); saveGame();
      }
      partyDetailIdx = null; render(); return;
    }
    if(el.closest('[data-party-evolve]')) {
      if(partyDetailIdx !== null && partyDetailIdx !== activePetIdx && !pets[partyDetailIdx]?.expedition) {
        setActivePet(partyDetailIdx);
      }
      partyDetailIdx = null;
      if(creature.symbols.length === 3) { applyEvolution(); }
      else { state='evolve'; render(); }
      return;
    }
    if(el.closest('[data-party-symbols]')) {
      partyDetailIdx = null; state='evolve'; render(); return;
    }
    if(el.closest('[data-party-back]')) {
      partyDetailIdx = null; partyArtPicker = false; partyArtPicker2 = false; render(); return;
    }
    const removeArt = el.closest('[data-remove-artifact]');
    if(removeArt) {
      SFX.click();
      const i = parseInt(removeArt.dataset.removeArtifact);
      const removedArt = pets[i].artifact;
      if(removedArt === 'vitality_core') { pets[i].maxHp=Math.round(pets[i].maxHp/1.2); pets[i].hp=Math.min(pets[i].hp,pets[i].maxHp); }
      applyArtifactStat(pets[i], removedArt, true);
      pets[i].artifact = null;
      if(removedArt) addItemToInventory('artifact_'+removedArt, 1);
      saveGame(); render(); return;
    }
    const removeArt2 = el.closest('[data-remove-artifact2]');
    if(!removeArt2 && el.closest('[data-party-artifact]') && !el.closest('[data-party-artifact2]') && partyDetailIdx !== null) {
      SFX.click();
      partyArtPicker = true; partyArtPicker2 = false; render(); return;
    }
    if(!removeArt2 && el.closest('[data-party-artifact2]') && partyDetailIdx !== null) {
      SFX.click();
      partyArtPicker2 = true; partyArtPicker = false; render(); return;
    }
    if(el.closest('#partyArtCancel')) { partyArtPicker=false; partyArtPicker2=false; render(); return; }
    if(removeArt2) {
      SFX.click();
      const i = parseInt(removeArt2.dataset.removeArtifact2);
      const removedArt2 = pets[i].artifact2;
      if(removedArt2 === 'vitality_core') { pets[i].maxHp=Math.round(pets[i].maxHp/1.2); pets[i].hp=Math.min(pets[i].hp,pets[i].maxHp); }
      applyArtifactStat(pets[i], removedArt2, true);
      pets[i].artifact2 = null;
      if(removedArt2) addArtifactToBag(removedArt2);
      saveGame(); render(); return;
    }
    const partyArtPick = el.closest('[data-party-art-pick]');
    if(partyArtPick && partyDetailIdx !== null) {
      SFX.click();
      const artKey = partyArtPick.dataset.partyArtPick;
      const pet = pets[partyDetailIdx];
      if(partyArtPicker2) {
        // equip slot 2
        if(pet.artifact === artKey) { render(); return; } // ห้ามซ้ำ
        if(pet.artifact2 === 'vitality_core') { pet.maxHp=Math.round(pet.maxHp/1.2); pet.hp=Math.min(pet.hp,pet.maxHp); }
        applyArtifactStat(pet, pet.artifact2, true);
        if(pet.artifact2) addArtifactToBag(pet.artifact2);
        pet.artifact2 = artKey;
        if(artKey === 'vitality_core') { pet.maxHp=Math.round(pet.maxHp*1.2); pet.hp=Math.min(pet.hp+Math.round(pet.maxHp*0.2),pet.maxHp); }
        applyArtifactStat(pet, artKey);
        removeArtifactFromBag(artKey);
        partyArtPicker2 = false;
      } else {
        // equip slot 1
        if(pet.artifact2 === artKey) { render(); return; } // ห้ามซ้ำ
        if(pet.artifact === 'vitality_core') { pet.maxHp=Math.round(pet.maxHp/1.2); pet.hp=Math.min(pet.hp,pet.maxHp); }
        applyArtifactStat(pet, pet.artifact, true);
        if(pet.artifact) addArtifactToBag(pet.artifact);
        pet.artifact = artKey;
        if(artKey === 'vitality_core') { pet.maxHp=Math.round(pet.maxHp*1.2); pet.hp=Math.min(pet.hp+Math.round(pet.maxHp*0.2),pet.maxHp); }
        applyArtifactStat(pet, artKey);
        removeArtifactFromBag(artKey);
        partyArtPicker = false;
      }
      saveGame(); render(); return;
    }
    const renameBtn = el.closest('[data-rename]');
    if(renameBtn) {
      const i = Number(renameBtn.dataset.rename);
      renamePetPopup = { idx: i, value: pets[i]?.nickname || '' };
      render();
      setTimeout(() => { document.getElementById('renameInput')?.focus(); }, 50);
      return;
    }
    if(el.closest('#renameCancelBtn')) { renamePetPopup=null; render(); return; }
    if(el.closest('#renameClearBtn'))  { if(pets[renamePetPopup?.idx]) { pets[renamePetPopup.idx].nickname=''; saveGame(); } renamePetPopup=null; render(); return; }
    if(el.closest('#renameConfirmBtn')) {
      const val = document.getElementById('renameInput')?.value?.trim() || '';
      if(renamePetPopup!==null && pets[renamePetPopup.idx]) {
        pets[renamePetPopup.idx].nickname = val;
        saveGame();
      }
      renamePetPopup=null; render(); return;
    }
    const toggleLock = el.closest('[data-togglelock]');
    if(toggleLock) {
      const p = pets[Number(toggleLock.dataset.togglelock)];

      const bonusSpd=Math.round(((Math.max(0,bPet.spd-fb.spd)+Math.max(0,sPet.spd-fs.spd))/2)*0.5);

      // แปลง bPet (object reference) เป็น final form ก่อน
      bPet.phase='final'; bPet.finalKey=fk; bPet.formKey=null; seenFinal.add(fk);
      bPet.name=ff.name; bPet.maxHp=ff.hp+bonusHp; bPet.hp=ff.hp+bonusHp;
      bPet.atk=ff.atk+bonusAtk; bPet.spd=ff.spd+bonusSpd; bPet.def=ff.def+bonusDef;
      bPet.shiny=resultShiny; if(resultShiny) applyShinyStats(bPet);
      bPet.symbols=[]; bPet.trainCount=0;
      // ลบ sacrifice ออก (bPet ref ยังอยู่ในอาร์เรย์ครบ)
      if(s.from==='party') { pets.splice(s.idx,1); if(activePetIdx>=pets.length) activePetIdx=Math.max(0,pets.length-1); }

      activePetIdx = parseInt(switchDead.dataset.switchDead);
      syncCreature();
      battleState.artifactStacks = {};
      battleState.pendingPetSwitch = false;
      battleState.animPhase = null;
      battleState.waiting = false;
      battleState.lastResult = null;
      render();
      return;
    }
    const switchEl = el.closest('[data-tower-switch]');
    if(switchEl && (battleState?.isTowerBattle || battleState?.isVsBattle || battleState?.isDuelBattle) && !battleState.waiting) {
      const idx = parseInt(switchEl.dataset.towerSwitch);
      const target = pets[idx];
      if(target && target !== creature && target.phase !== 'egg' && target.hp > 0) {
        SFX.click();
        activePetIdx = idx;
        syncCreature();
        battleState.artifactStacks = {};
        doEnemyOnlyTurn();
      }
      return;
    }
    if(el.closest('#battleItemBtn')) { battleItemPicker=true; render(); return; }
    if(el.closest('#cancelItem'))    { battleItemPicker=false; render(); return; }
    if(el.closest('#overdriveBtn')) {
      if(overdriveCharge>=MAX_OVERDRIVE && !battleState.overdriveUsed && creature.phase==='final' && !battleState.waiting)
        doOverdriveTurn();
      return;
    }
    if(battleItemPicker) {
      const useBtn = el.closest('[data-useitem]');
      if(useBtn) {
        useItem(useBtn.dataset.useitem);
        battleItemPicker = false;
        doEnemyOnlyTurn();
      }
      return;
    }
    const btn = el.closest('[data-moveidx]');
    if(btn) doTurn(Number(btn.dataset.moveidx));
  }

  if(el.closest('#vsStartBtn'))      { SFX.vsStart(); startVsBattle(0); return; }
  if(el.closest('#vsNextBtn'))       { SFX.click(); state='vs_lobby'; render(); return; }
  if(el.closest('#vsResultBackBtn')) { SFX.click(); state='menu'; render(); return; }

  // ── DUEL ──
  const vsTabEl = el.closest('[data-vstab]');
  if(vsTabEl) { SFX.click(); vsTab=vsTabEl.dataset.vstab; if(vsTab==='duel'){duelSelectStep='mode';duelUrlData=null;duelMyTeam=[];duelMode=null;} render(); return; }

  if(el.closest('#duel1v1Btn')) { SFX.click(); duelMode='1v1'; duelSelectStep='team'; render(); return; }
  if(el.closest('#duel3v3Btn')) { SFX.click(); duelMode='3v3'; duelSelectStep='team'; render(); return; }
  if(el.closest('#duelScanBtn')) { SFX.click(); duelScanOpen=true; render(); setTimeout(startScanCamera,100); return; }
  if(el.closest('#duelPasteBtn')) { SFX.click(); duelPasteOpen=true; render(); return; }
  if(el.closest('#duelScanCloseBtn')) { SFX.click(); stopScanCamera(); duelScanOpen=false; render(); return; }
  if(el.closest('#duelPasteCloseBtn')) { SFX.click(); duelPasteOpen=false; render(); return; }
  if(el.closest('#duelPasteGoBtn')) {
    SFX.click();
    const inp = document.getElementById('duelLinkInput');
    if(inp) { duelPasteOpen=false; loadDuelFromUrl(inp.value.trim()); }
    return;
  }
  if(el.closest('#duelQrCloseBtn')) { SFX.click(); duelQrOpen=false; render(); return; }
  if(el.closest('#duelCopyLinkBtn')) {
    SFX.click();
    const myPets = duelMyTeam.map(t=>t.from==='party'?pets[t.idx]:storage[t.idx]);
    navigator.clipboard.writeText(buildDuelShareUrl(myPets)).catch(()=>{});
    scoutToast = T('✅ คัดลอก Link แล้ว!','✅ Link copied!');
    render(); return;
  }
  if(el.closest('#duelBackBtn')) { SFX.click(); if(duelSelectStep==='lobby'){duelSelectStep='team';}else if(duelSelectStep==='team'&&!duelUrlData){duelSelectStep='mode';}else{vsTab='ladder';} render(); return; }
  if(el.closest('#duelFightBtn')) { SFX.vsStart(); startDuelFight(); return; }
  if(el.closest('#duelRetryBtn')) { SFX.click();
    duelEnemyTeam = duelUrlData?duelUrlData.team.map(p=>({...p,hp:p.maxHp})):duelEnemyTeam.map(p=>({...p,hp:p.maxHp}));
    duelMyTeam=[]; duelSelectStep='team'; vsTab='duel'; state='vs_lobby'; render(); return; }
  if(el.closest('#duelResultBackBtn')) { SFX.click(); vsTab='duel'; duelSelectStep='mode'; duelUrlData=null; duelMyTeam=[]; duelMode=null; state='vs_lobby'; render(); return; }
  if(el.closest('#duelShareBtn')) {
    SFX.click(); duelQrOpen=true; render();
    setTimeout(()=>{
      const canvas = document.getElementById('duelQrCanvas');
      if(canvas && typeof QRCode !== 'undefined') {
        const myPets = duelMyTeam.map(t=>t.from==='party'?pets[t.idx]:storage[t.idx]);
        QRCode.toCanvas(canvas, buildDuelShareUrl(myPets), {width:200,margin:1}, ()=>{});
      }
    }, 100);
    return;
  }
  const duelSelEl = el.closest('[data-duelsel]');
  if(duelSelEl && state==='vs_lobby') {
    SFX.click();
    const [from,idxStr] = duelSelEl.dataset.duelsel.split(':');
    const idx = parseInt(idxStr);
    const maxSel = duelMode==='1v1'?1:3;
    const existing = duelMyTeam.findIndex(t=>t.idx===idx&&t.from===from);
    if(existing >= 0) { duelMyTeam.splice(existing,1); }
    else if(duelMyTeam.length < maxSel) { duelMyTeam.push({idx,from}); }
    // if challenger (has enemy data) and team full → go to lobby
    if(duelUrlData && duelMyTeam.length===maxSel) { duelSelectStep='lobby'; }
    render(); return;
  }

  if(state==='scout') {
    if(el.closest('#itemUseCancel')) { itemUseConfirm=null; render(); return; }
    if(el.closest('#itemUsePrev')) { itemUseTargetIdx=(itemUseTargetIdx-1+pets.length)%pets.length; render(); return; }
    if(el.closest('#itemUseNext')) { itemUseTargetIdx=(itemUseTargetIdx+1)%pets.length; render(); return; }
    const confirmUseScout = el.closest('#itemUseConfirmBtn');
    if(confirmUseScout) { const t=confirmUseScout.dataset.usetype; itemUseConfirm=null; useItem(t, itemUseTargetIdx); return; }
    if(el.closest('#secretShopClose')) { secretShopOpen=false; render(); return; }
    const secretBuy = el.closest('[data-secretbuy]');
    if(secretBuy) {
      const type = secretBuy.dataset.secretbuy;
      const price = Number(secretBuy.dataset.secretprice);
      const limit = Number(secretBuy.dataset.secretlimit);
      const bought = secretShopBought[type] || 0;
      if(bought >= limit) { scoutToast='🚫 SOLD OUT!'; render(); return; }
      if(gold < price) { scoutToast=T('💰 Gold ไม่พอ!','💰 Not enough Gold!'); render(); return; }
      gold -= price;
      secretShopBought[type] = bought + 1;
      addItemToInventory(type);
      scoutToast=T(`✅ ซื้อ ${ITEMS[type]?.icon||''} ${ITEMS[type]?.name||type} สำเร็จ!`,`✅ Bought ${ITEMS[type]?.icon||''} ${ITEMS[type]?.name||type}!`);
      saveGame(); render(); return;
    }
    const shopBuy = el.closest('[data-shopbuy]');
    if(shopBuy) {
      const type = shopBuy.dataset.shopbuy;
      const price = Number(shopBuy.dataset.shopprice);
      if(gold < price) { scoutToast=T('💰 Gold ไม่พอ!','💰 Not enough Gold!'); render(); return; }
      gold -= price;
      addItemToInventory(type);
      scoutToast=T(`✅ ซื้อ ${ITEMS[type]?.icon||''} ${ITEMS[type]?.name||type} สำเร็จ!`,`✅ Bought ${ITEMS[type]?.icon||''} ${ITEMS[type]?.name||type}!`);
      saveGame(); render(); return;
    }
    if(el.closest('#stageSelectBtn')) { stageSelectOpen=true; render(); return; }
    if(el.closest('#stageSelectClose')) { stageSelectOpen=false; render(); return; }
    const selStage = el.closest('[data-sel-stage]');
    if(selStage) {
      const s = parseInt(selStage.dataset.selStage);
      const hard = selStage.dataset.selHard==='1';
      stageSelectOpen=false;
      if(s===0) { replayStage=0; replayHard=false; }
      else {
        const scrollSlot = inventory.find(sl=>sl.type==='map_scroll');
        if(!scrollSlot) { scoutToast=T('🗺️ ต้องใช้ Map Scroll เพื่อ Replay ด่านเก่า!','🗺️ Need a Map Scroll to replay old stages!'); render(); return; }
        scrollSlot.qty--; if(scrollSlot.qty<=0) inventory.splice(inventory.indexOf(scrollSlot),1);
        replayStage=s; replayHard=hard; genScoutGrid(); scoutPos={x:0,y:0}; saveGame();
      }
      render(); return;
    }
    if(el.closest('#rerollBtn')) {
      const scrollSlot = inventory.find(s=>s.type==='map_scroll');
      if(!scrollSlot) return;
      scrollSlot.qty--;
      if(scrollSlot.qty<=0) inventory.splice(inventory.indexOf(scrollSlot),1);
      genScoutGrid(); scoutPos={x:0,y:0};
      scoutToast='🗺️ Map Rerolled!'; saveGame(); render(); return;
    }
    const switchBtn = el.closest('[data-switchpet]');
    if(switchBtn) {
      const i = Number(switchBtn.dataset.switchpet);
      if(i !== activePetIdx && !pets[i]?.expedition) {
        setActivePet(i); scoutToast=`▶ ${petName(creature)}`; saveGame(); render();
      }
      return;
    }
    const quickItem = el.closest('[data-quickitem]');
    if(quickItem) {
      const qt = quickItem.dataset.quickitem;
      if(qt==='energy_drink'||qt==='map_scroll'||qt==='artifact_box'||qt==='box_R'||qt==='box_E'||qt==='mystery_egg'||qt==='shiny_egg'||qt==='fusion_stone'||qt==='power_shard'||qt==='speed_shard'||qt==='guard_shard') {
        useItem(qt); scoutToast = scoutToast||''; render(); return;
      }
      itemUseConfirm = {type: qt, fromScout: true}; itemUseTargetIdx=activePetIdx; render(); return;
    }
    const cell = el.closest('.scout-cell');
    if(!cell||cell.classList.contains('fog')) return;
    const tx=Number(cell.dataset.x), ty=Number(cell.dataset.y);
    const dx=tx-scoutPos.x, dy=ty-scoutPos.y;
    if(Math.abs(dx)+Math.abs(dy)===1) moveScout(dx,dy);
  }

  if(state==='train') {
    const petBtn = el.closest('[data-trainpet]');
    if(petBtn) { trainPetIdx = parseInt(petBtn.dataset.trainpet); render(); return; }
    const btn = el.closest('.train-btn');
    if(btn) doTrain(btn.dataset.type);
  }

});

function showRebirthEffect(pet) {
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;z-index:9999;pointer-events:none;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;background:rgba(10,0,20,0.82)';

  // pet sprite with purple aura
  const spriteWrap = document.createElement('div');
  spriteWrap.style.cssText = 'display:flex;align-items:center;justify-content:center;animation:rebirthAura 0.5s ease-in-out infinite alternate';
  spriteWrap.innerHTML = buildPetSvg(pet, 220, false);
  overlay.appendChild(spriteWrap);

  // rank text
  const rank = pet.rebirthRank || 0;
  const rankTxt = document.createElement('div');
  rankTxt.style.cssText = 'font-family:Orbitron,monospace;font-size:22px;color:#cc88ff;letter-spacing:4px;margin-top:12px;text-shadow:0 0 16px #9933ff,0 0 32px #cc88ff;animation:rebirth-flash 2s ease-out 0.2s forwards;opacity:0';
  rankTxt.textContent = '✦'.repeat(rank) + ' REINCARNATED ' + '✦'.repeat(rank);
  overlay.appendChild(rankTxt);

  // expanding ring
  const ring = document.createElement('div');
  ring.style.cssText = 'position:absolute;width:160px;height:160px;border-radius:50%;border:2px solid #cc88ff88;box-shadow:0 0 20px #cc88ff,0 0 50px #9933ff44;animation:rebirth-ring 1.0s ease-out 0.1s forwards;opacity:1';
  overlay.appendChild(ring);
  const ring2 = document.createElement('div');
  ring2.style.cssText = 'position:absolute;width:200px;height:200px;border-radius:50%;border:1px solid #9933ff44;animation:rebirth-ring 1.2s ease-out 0.4s forwards;opacity:1';
  overlay.appendChild(ring2);

  document.body.appendChild(overlay);
  setTimeout(() => overlay.remove(), 2400);
}

function switchPartyDetail(delta) {
  const newIdx = partyDetailIdx + delta;
  if(newIdx < 0 || newIdx >= pets.length) return;
  // Swap video src before changing index — keeps video alive during renderParty
  const p = pets[newIdx];
  const f = FORMS[p.formKey] || FINAL_FORMS[p.finalKey||''];
  const n = f ? f.name : p.name;
  const v = document.getElementById('pet-detail-video');
  if(v) {
    const src = v.querySelector('source');
    if(src) { src.src = n + '.webm'; v.load(); v.play().catch(()=>{}); }
  }
  partyDetailIdx = newIdx;
  renderParty();
}

  labelStrip.textContent = '🐾 PARTY';
  const now = Date.now();
  // Preload all pet videos so switching is instant
  pets.concat(storage).forEach(p => {
    const f = FORMS[p.formKey] || FINAL_FORMS[p.finalKey||''];
    const n = f ? f.name : p.name;
    if(!window._preloadedVideos) window._preloadedVideos = {};
    if(!window._preloadedVideos[n]) {
      const v = document.createElement('video');
      v.preload = 'auto'; v.muted = true;
      const s = document.createElement('source');

            <div id="pet-sprite-box" style="position:relative;flex:1;display:flex;justify-content:center;align-items:center;background:#000;border-radius:12px;overflow:hidden">
