                : (()=>{const _n=(FORMS[pet.formKey]||FINAL_FORMS[pet.finalKey||''])?.name||pet.name; return `<div style="position:relative;width:100%">
                    <video id="pet-detail-video" autoplay loop muted playsinline class="anim-bob" style="width:100%;height:auto;image-rendering:pixelated;object-fit:contain;">
                      <source src="${_n}.webm" type="video/webm" onerror="const v=this.parentElement;v.outerHTML='<img src=\\'${_n}.png\\' class=\\'anim-bob\\' style=\\'width:100%;height:auto;image-rendering:pixelated;object-fit:contain\\'>'">
                    </video>
                    ${pet.shiny?buildShinySparkles(10,90):''}
                  </div>`;})()
            }
            </div>
            ${partyDetailIdx<pets.length-1?`<div onclick="switchPartyDetail(1)" style="flex-shrink:0;width:32px;height:64px;display:flex;align-items:center;justify-content:center;font-size:20px;color:#8060d0;cursor:pointer;user-select:none;background:#0a0a20;border-radius:8px;border:1px solid #2a2a4a">▶</div>`:'<div style="flex-shrink:0;width:32px"></div>'}
          </div>
          <div style="display:flex;align-items:center;justify-content:center;gap:6px">
            <div style="font-family:Orbitron,monospace;font-size:15px;font-weight:700;color:${pet.shiny?'#ffd700':nameColor};text-align:center;${pet.shiny?'animation:shiny-glow 1.5s ease-in-out infinite':''}">${pet.shiny?'✨ ':''}${petName(pet)}</div>
            <div data-rename="${partyDetailIdx}" style="font-size:14px;cursor:pointer;opacity:0.6;user-select:none" title="เปลี่ยนชื่อ">✏️</div>
          </div>
          ${pet.nickname?`<div style="font-size:10px;color:#5a4a8a;font-family:monospace">(${pet.name})</div>`:''}
          ${isActive?`<span style="font-family:Orbitron,monospace;font-size:10px;color:#8060d0">▶ ACTIVE</span>`:''}
          <div style="font-size:11px;color:#8878b8">ATK ${pet.atk} ● SPD ${pet.spd} ● DEF ${pet.def}</div>
          <div style="display:flex;align-items:center;gap:6px;width:100%;margin-top:2px">
            <div style="flex:1;height:5px;background:#0a0a20;border-radius:3px;overflow:hidden">
              <div style="width:${hpPct}%;height:100%;background:linear-gradient(90deg,#2ecc71,#27ae60);border-radius:3px"></div>
            </div>
            <span style="font-size:10px;color:#8878b8">${pet.hp}/${pet.maxHp}</span>
          </div>
          ${pet.phase!=='egg'?(()=>{
            const a  = pet.artifact  ? ARTIFACTS[pet.artifact]  : null;
            const a2 = pet.artifact2 ? ARTIFACTS[pet.artifact2] : null;
            const ac  = a  ? (a.grade==='E'?'#ff9944':a.grade==='R'?'#4488ff':'#b0b0c0')  : '#3a3a5a';
            const ac2 = a2 ? (a2.grade==='E'?'#ff9944':a2.grade==='R'?'#4488ff':'#b0b0c0') : '#3a3a5a';
            return `<div data-party-artifact style="display:flex;align-items:center;gap:8px;width:100%;padding:6px 8px;border-radius:8px;border:1px solid ${ac};background:#0a0a18;cursor:pointer;margin-top:2px">
              <span style="font-size:16px">${a?a.icon:'➕'}</span>
              <div style="flex:1">
                <div style="font-family:Orbitron,monospace;font-size:10px;color:${ac}">${a?a.name:'SLOT 1 — ว่างอยู่'}</div>
                ${a?`<div style="font-size:10px;color:#6858a0">${D(a)}</div>`:''}
              </div>
              ${a?`<div data-remove-artifact="${partyDetailIdx}" style="font-size:11px;color:#664444;cursor:pointer">✕</div>`:''}
            </div>
            <div data-party-artifact2 style="display:flex;align-items:center;gap:8px;width:100%;padding:6px 8px;border-radius:8px;border:1px solid ${ac2};background:#0a0a18;cursor:pointer;margin-top:4px">
              <span style="font-size:16px">${a2?a2.icon:'➕'}</span>
              <div style="flex:1">
                <div style="font-family:Orbitron,monospace;font-size:10px;color:${ac2}">${a2?a2.name:'SLOT 2 — ว่างอยู่'}</div>
                ${a2?`<div style="font-size:10px;color:#6858a0">${D(a2)}</div>`:''}
              </div>
              ${a2?`<div data-remove-artifact2="${partyDetailIdx}" style="font-size:11px;color:#664444;cursor:pointer">✕</div>`:''}
            </div>`;
          })():''}
        </div>
        ${pet.phase!=='egg' && pet.phase !== 'final' ? `<div style="padding:6px 8px;background:#0a0a1a;border-radius:8px;border:1px solid #2a2a5a">
          <div style="font-size:11px;color:#8878b8;font-family:Orbitron,monospace;margin-bottom:6px">SYMBOLS ${pet.phase==='evolved'?`<span style="color:#8040c0">— RECIPE 🔒</span>`:pet.symbols.length+'/3'}</div>
          <div style="display:flex;gap:6px;flex-wrap:wrap">
            ${(pet.phase==='evolved' ? (pet.formKey||'').split('') : pet.symbols).map((s,si)=>`
            <div style="position:relative;display:inline-flex">
              <span style="background:#1a1a3a;border:1px solid ${pet.phase==='evolved'?'#5a2a9a':'#3a3a6a'};border-radius:8px;padding:4px 10px;font-size:16px">${{F:'✊',W:'🪶',S:'🛡'}[s]||s}</span>
              ${pet.phase!=='evolved'?`<span data-discardsym="${si}" style="position:absolute;top:-6px;right:-6px;background:#3a1a1a;border:1px solid #aa3333;border-radius:50%;width:14px;height:14px;font-size:11px;color:#ff6666;display:flex;align-items:center;justify-content:center;cursor:pointer;line-height:1">✕</span>`:''}
            </div>`).join('')}
            ${pet.phase!=='evolved' && pet.symbols.length<3 ? (()=>{
              const symItems = ['sym_F','sym_W','sym_S'].filter(k=>inventory.some(s=>s.type===k));
              return symItems.length ? symItems.map(k=>`<span data-usesym="${k}" style="background:#1a2a1a;border:1px dashed #40a040;border-radius:8px;padding:4px 10px;font-size:16px;cursor:pointer" title="${N(ITEMS[k])}">${ITEMS[k].icon}</span>`).join('') : `<span style="font-size:11px;color:#6858a0;padding:4px">${T('ไม่มี Symbol ใน Bag','No Symbols in Bag')}</span>`;
            })() : ''}
          </div>
        </div>` : ''}
        ${passiveInfo}
        <div style="display:flex;flex-direction:column;gap:6px;margin-top:auto">
          ${canEvolve?`<div onclick="setActivePet(${partyDetailIdx});partyDetailIdx=null;state='menu';render();" style="padding:10px;border-radius:10px;background:linear-gradient(135deg,#3a1a6a,#5a2a9a);border:2px solid #8040c0;font-family:Orbitron,monospace;font-size:13px;color:#e0c0ff;text-align:center;cursor:pointer;letter-spacing:1px;animation:pulse 1.2s infinite">🧬 EVOLVE NOW</div>`
          :(hasSyms&&pet.phase==='larva')?`<div data-party-symbols style="padding:10px;border-radius:10px;background:#0e0e22;border:1px solid #3a3a6a;font-family:Orbitron,monospace;font-size:13px;color:#8080c0;text-align:center;cursor:pointer">🔮 VIEW SYMBOLS</div>`:''}
          ${!isActive&&!onExp?`<div data-setactive="${partyDetailIdx}" style="padding:10px;border-radius:10px;background:#0e0e22;border:1px solid #3a3a6a;font-family:Orbitron,monospace;font-size:13px;color:#c0a0ff;text-align:center;cursor:pointer">▶ SET ACTIVE</div>`:''}
          ${onExp?`<div style="padding:10px;border-radius:10px;background:#0e0e22;border:1px solid #ffaa00;font-family:Orbitron,monospace;font-size:12px;color:#ffaa00;text-align:center">🌑 ON EXPEDITION</div>`:''}
          ${!onExp&&pet.hp<pet.maxHp?pet.resting
            ?`<div data-stopresting="${partyDetailIdx}" style="padding:10px;border-radius:10px;background:#1a1a0a;border:1px solid #aaaa00;font-family:Orbitron,monospace;font-size:13px;color:#eeee44;text-align:center;cursor:pointer">⏹ STOP REST</div>`
            :`<div data-startrest="${partyDetailIdx}" style="padding:10px;border-radius:10px;background:#0a1a0a;border:1px solid #40a040;font-family:Orbitron,monospace;font-size:13px;color:#80ee80;text-align:center;cursor:pointer">🛌 REST</div>`
          :''}
          <div style="display:flex;gap:6px">
            <div data-togglelock="${partyDetailIdx}" style="flex:1;padding:8px;border-radius:10px;background:#080810;border:1px solid ${pet.locked?'#f39c12':'#2a2a4a'};font-family:Orbitron,monospace;font-size:12px;color:${pet.locked?'#f39c12':'#4a4a8a'};text-align:center;cursor:pointer">${pet.locked?'🔒 LOCKED':'🔓 LOCK'}</div>
            ${!onExp&&!pet.locked&&pets.length>1?`<div data-deletepet="${partyDetailIdx}" style="padding:8px 12px;border-radius:10px;background:#3a0808;border:2px solid #ff3333;font-family:Orbitron,monospace;font-size:14px;color:#ff5555;text-align:center;cursor:pointer;box-shadow:0 0 6px #ff333344">🗑</div>`:''}
          </div>
          ${!isActive&&!onExp?`<div data-tostorage="${partyDetailIdx}" style="padding:8px;border-radius:10px;background:#0a1a0a;border:1px solid #408040;font-family:Orbitron,monospace;font-size:12px;color:#80cc80;text-align:center;cursor:pointer">📦 ${storage.length<MAX_STORAGE?T('ย้ายไป STORAGE','Move to STORAGE'):T('⇄ SWAP กับ STORAGE','⇄ SWAP with STORAGE')}</div>`:''}
          ${pet.phase==='evolved'?`<div onclick="partyDetailIdx=null;partyViewTab='fusion';render();" style="padding:8px;border-radius:10px;background:#0a0a22;border:2px solid #ff6600;font-family:Orbitron,monospace;font-size:13px;color:#ff9944;text-align:center;cursor:pointer">${T('🔥 ไปหน้า FUSION','🔥 Go to FUSION')}</div>`:''}
          <div data-party-back style="padding:8px;border-radius:10px;background:#080810;border:1px solid #2a2a4a;font-family:Orbitron,monospace;font-size:12px;color:#4a4a8a;text-align:center;cursor:pointer">← BACK</div>
        </div>
      </div>
      ${renamePetPopup!==null ? `
        <div style="position:absolute;inset:0;background:rgba(0,0,0,0.88);display:flex;align-items:center;justify-content:center;z-index:30;border-radius:16px">
          <div style="background:#10101e;border:2px solid #5a3a9a;border-radius:14px;padding:18px 16px;width:82%;display:flex;flex-direction:column;gap:12px">
            <div style="font-family:Orbitron,monospace;font-size:13px;color:#c0a0ff;text-align:center">✏️ เปลี่ยนชื่อ</div>
            <input id="renameInput" maxlength="20" value="${renamePetPopup.value.replace(/"/g,'&quot;')}"
              style="background:#0a0a1a;border:1px solid #5a3a9a;border-radius:8px;padding:8px 12px;color:#e0d0ff;font-family:Orbitron,monospace;font-size:14px;text-align:center;width:100%;box-sizing:border-box;outline:none"/>
            <div style="font-size:10px;color:#5a4a8a;text-align:center">ชื่อจริง: ${pets[renamePetPopup.idx]?.name||''}</div>
            <div style="display:flex;gap:8px">
              <button id="renameCancelBtn" style="flex:1;padding:8px;background:#1a1a2e;border:1px solid #4a3a6a;border-radius:8px;color:#8878b8;font-family:Orbitron,monospace;font-size:11px;cursor:pointer">ยกเลิก</button>
              <button id="renameConfirmBtn" style="flex:2;padding:8px;background:linear-gradient(135deg,#4a2a8a,#6a3ab0);border:none;border-radius:8px;color:#fff;font-family:Orbitron,monospace;font-size:11px;cursor:pointer;font-weight:700">✓ บันทึก</button>
              ${pets[renamePetPopup.idx]?.nickname?`<button id="renameClearBtn" style="flex:1;padding:8px;background:#1a0a0a;border:1px solid #6a2a2a;border-radius:8px;color:#ff6666;font-family:Orbitron,monospace;font-size:11px;cursor:pointer">ล้างชื่อ</button>`:''}
            </div>
          </div>
        </div>` : ''}
      ${(partyArtPicker||partyArtPicker2) ? (()=>{
        const isSlot2 = partyArtPicker2;
        const otherArt = isSlot2 ? pet.artifact : pet.artifact2;
        const filtered = artifactBag.filter(s => s.key !== otherArt)
          .sort((a,b)=>{ const ga=ARTIFACTS[a.key]?.grade,gb=ARTIFACTS[b.key]?.grade; return ({E:0,R:1,N:2}[ga]??9)-({E:0,R:1,N:2}[gb]??9); });
        const hasBag = filtered.length > 0;
        return `<div style="position:absolute;inset:0;background:rgba(0,0,0,0.88);display:flex;align-items:flex-end;justify-content:center;z-index:20;border-radius:16px">
          <div style="width:100%;background:#0a0a18;border-radius:16px 16px 0 0;border-top:2px solid ${isSlot2?'#c06040':'#6040c0'};padding:12px;display:flex;flex-direction:column;gap:8px;max-height:70vh">
            <div style="font-family:Orbitron,monospace;font-size:12px;color:#8878b8;text-align:center">${isSlot2?'SLOT 2':'SLOT 1'} — ${T('เลือก Artifact ให้','Equip Artifact to')} ${pet.name}</div>
            <div style="overflow-y:scroll;display:flex;flex-direction:column;gap:6px;max-height:55vh">
              ${hasBag ? filtered.map(s=>{
                const a = ARTIFACTS[s.key]; if(!a) return '';
                const gc = a.grade==='E'?'#ff9944':a.grade==='R'?'#4488ff':'#b0b0c0';
                const gb = a.grade==='E'?'#cc6600':a.grade==='R'?'#2255cc':'#4a4a6a';
                return `<div data-party-art-pick="${s.key}" style="display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;background:#0e0e22;border:1px solid ${gb};cursor:pointer">
                  <span style="font-size:22px">${a.icon}</span>
                  <div style="flex:1">
                    <div style="font-family:Orbitron,monospace;font-size:12px;color:${gc}">${a.name} <span style="font-size:10px">[${a.grade}]</span>${s.qty>1?` <span style="color:#6858a0">×${s.qty}</span>`:''}</div>
                    <div style="font-size:10px;color:#6858a0;margin-top:2px">${D(a)}</div>
                  </div>
                </div>`;
              }).join('') : `<div style="text-align:center;color:#6858a0;font-size:12px;padding:16px">${T('ไม่มี Artifact ใน Bag','No Artifacts in Bag')}</div>`}
            </div>
            <div id="partyArtCancel" style="padding:8px;border-radius:8px;background:#0e0e1a;border:1px solid #2a2a4a;font-family:Orbitron,monospace;font-size:11px;color:#5050a0;text-align:center;cursor:pointer">${T('ยกเลิก','CANCEL')}</div>
          </div>
        </div>`;
      })() : ''}`;
    return;
  }

  const slots = Array(MAX_PETS).fill(null).map((_,i) => pets[i] || null);

  const slotHtml = slots.map((pet, i) => {
    if(!pet) {
      const hasEgg = inventory.some(s=>s.type==='mystery_egg'||s.type==='shiny_egg');
      const hasShinyEggSlot = inventory.some(s=>s.type==='shiny_egg');
      const hasStorage = storage.length > 0;
      const canAdd = hasEgg || hasStorage;
      const hint = hasShinyEggSlot ? T('✨🥚 Shiny Egg พร้อมฟัก!','✨🥚 Shiny Egg ready to hatch!')
                 : hasEgg && hasStorage ? T('🥚 ฟักไข่ / 📦 จาก Storage','🥚 Hatch / 📦 From Storage')
                 : hasEgg ? T('🥚 ใช้ Mystery Egg ฟักเลย!','🥚 Use Mystery Egg to hatch now!')
                 : hasStorage ? T('📦 เลือก Pet จาก Storage','📦 Pick Pet from Storage')
                 : T('— ว่าง —','— empty —');
      return `
      <div data-addpet="${i}" style="padding:14px;border-radius:12px;border:2px dashed ${hasShinyEggSlot?'#ffd700':canAdd?'#6050a0':'#2a2a5a'};display:flex;align-items:center;justify-content:center;gap:8px;cursor:${canAdd?'pointer':'default'};min-height:70px;opacity:${canAdd?1:0.4}">
        <span style="font-size:20px">${hasShinyEggSlot?'✨🥚':hasEgg?'🥚':hasStorage?'📦':'⬜'}</span>
        <div style="font-family:Orbitron,monospace;font-size:11px;color:${canAdd?'#9080c0':'#2a2a5a'}">${hint}</div>
      </div>`;
    }

    const isActive = i === activePetIdx;
    const onExp = !!pet.expedition;
    const hpPct = Math.round(pet.hp/pet.maxHp*100);
    const f = pet.formKey ? FORMS[pet.formKey] : null;
    const nameColor = f ? f.color : '#c0a0ff';
    const isResting = !!pet.resting;
    const border = isActive ? '#8060d0' : onExp ? '#ffaa00' : isResting ? '#40a040' : '#2a2a5a';
    const bg = isActive ? 'rgba(100,60,200,0.1)' : isResting ? 'rgba(20,40,20,0.4)' : '#0a0a1a';

    let statusLine = '';
    if(isActive) statusLine = `<span style="color:#8060d0;font-size:10px;font-family:Orbitron,monospace">▶ ACTIVE</span>`;
    else if(isResting) {
      const waiting = pet.hp<=0 && pet.deadRestUntil>now;
      const waitSec = waiting ? Math.ceil((pet.deadRestUntil-now)/1000) : 0;
      statusLine = `<span style="color:${waiting?'#ff6060':'#80ee80'};font-size:10px;font-family:Orbitron,monospace">${waiting?`💀 รอ <span data-countdown="${pet.deadRestUntil}">${fmtTime(waitSec*1000)}</span> ก่อน regen`:`🛌 RESTING — ${pet.hp}/${pet.maxHp} HP`}</span>`;
    }
    else if(onExp) {
      const rem = pet.expedition.endTime - now;
      const expLbl = EXPEDITIONS.find(e=>e.type===pet.expedition.type)?.label||'';
      if(pet.expedition.ready)
        statusLine = `<span style="color:#00ffaa;font-size:10px;font-family:Orbitron,monospace;animation:shiny-pulse 1s ease-in-out infinite">✅ ${expLbl} ${T('— กลับแล้ว! กด COLLECT','— returned! Press COLLECT')}</span>`;
      else
        statusLine = `<span data-countdown-status="${pet.expedition.endTime}" data-label="${expLbl}" style="color:#ffaa00;font-size:10px;font-family:Orbitron,monospace">🌑 ${expLbl} — ${fmtTime(rem)}</span>`;
    } else statusLine = `<span style="font-size:10px;color:#7060aa">TAP = SET ACTIVE</span>`;

    const inSwapMode = swapStorageIdx !== null;
    const canSwap = inSwapMode && !isActive && !onExp;
    const swapBorder = canSwap ? '#00ffaa' : border;
    const swapBg = canSwap ? 'rgba(0,80,40,0.2)' : bg;

    return `
      <div ${inSwapMode ? (canSwap ? `data-swapparty="${i}"` : '') : `data-selectpet="${i}"`}
        style="padding:10px 12px;border-radius:12px;border:2px solid ${swapBorder};background:${swapBg};cursor:${canSwap?'pointer':inSwapMode?'default':'pointer'}">
        <div style="display:flex;align-items:center;gap:10px">
          <div style="position:relative;width:52px;height:52px;flex-shrink:0;overflow:visible;display:flex;align-items:center;justify-content:center">
            ${buildPetSvg(pet, 52, true)}
            ${isResting?`<div style="position:absolute;top:-4px;right:-4px;background:#1a3a1a;border:1px solid #40a040;border-radius:8px;padding:1px 4px;font-size:11px;line-height:1.4">🛌</div>`:''}
            ${pet.locked?`<div style="position:absolute;top:-4px;left:-4px;background:#1a1200;border:1px solid #f39c12;border-radius:8px;padding:1px 4px;font-size:11px;line-height:1.4">🔒</div>`:''}
          </div>
          <div style="flex:1">
            <div style="font-family:Orbitron,monospace;font-size:14px;font-weight:700;color:${pet.shiny?'#ffd700':nameColor}">${pet.shiny?'✨ ':''}${petName(pet)}${pet.rebirthRank?` <span style="font-size:10px;color:#cc88ff;letter-spacing:1px">${'✦'.repeat(pet.rebirthRank)}</span>`:''}</div>
            <div style="display:flex;align-items:center;gap:6px;margin-top:3px">
              <div style="flex:1;height:5px;background:#0a0a20;border-radius:3px;overflow:hidden">
                <div style="width:${hpPct}%;height:100%;background:linear-gradient(90deg,#2ecc71,#27ae60);border-radius:3px"></div>
              </div>
              <span style="font-size:10px;color:#8878b8">${pet.hp}/${pet.maxHp}</span>
            </div>
            ${inSwapMode
              ? `<span style="font-size:10px;font-family:Orbitron,monospace;color:${canSwap?'#00ffaa':'#4a4a7a'}">${canSwap?T('⇄ แตะเพื่อสลับ','⇄ Tap to swap'):isActive?T('▶ ACTIVE — ไม่สลับ',"▶ ACTIVE — can't swap"):'🌑 ON EXP'}</span>`
              : statusLine}
          </div>
          <div style="flex-shrink:0;display:flex;flex-direction:column;gap:4px">
            ${!inSwapMode && (onExp && pet.expedition.ready) ? `<div onclick="event.stopPropagation();state='expedition';render();" style="padding:6px 10px;border-radius:8px;font-family:Orbitron,monospace;font-size:11px;text-align:center;cursor:pointer;background:#003322;color:#00ffaa;border:2px solid #00ffaa;animation:shiny-pulse 1s ease-in-out infinite">✅<br>COLLECT</div>` : ''}
            ${!inSwapMode && (!isActive && !onExp && pet.phase!=='egg') ? `<div onclick="event.stopPropagation();setActivePet(${i});render();" style="padding:6px 10px;border-radius:8px;font-family:Orbitron,monospace;font-size:11px;text-align:center;cursor:pointer;background:#0a0a1a;color:#c0a0ff;border:1px solid #6040a0">▶<br>ACTIVE</div>` : ''}
            ${!inSwapMode && (!onExp && pet.phase!=='egg' && (pet.hp<pet.maxHp||isResting)) ? `<div onclick="event.stopPropagation();toggleRest(${i});render();" style="padding:6px 10px;border-radius:8px;font-family:Orbitron,monospace;font-size:11px;text-align:center;cursor:pointer;${isResting?'background:#1a0a30;color:#c0a0ff;border:1px solid #8060d0':'background:#0a0a1a;color:#4a4a7a;border:1px solid #2a2a5a'}">${isResting?'😴<br>STOP':'🛌<br>REST'}</div>` : ''}
          </div>
        </div>
      </div>`;
  }).join('');

  // Storage view
  const inPartySwapMode = swapPartyIdx !== null;
  const storageHtml = storage.length ? storage.map((pet,si)=>{

  const allEvolved = [

  let fusionHtml = '';
  if(allEvolved.length < 2) {
    fusionHtml = `<div style="text-align:center;color:#6858a0;font-size:13px;padding:30px 0;line-height:2">${T('ต้องมี Evolved Pet อย่างน้อย 2 ตัว','Need at least 2 Evolved Pets')}<br><span style="font-size:11px">${T('จาก Party หรือ Storage','from Party or Storage')}</span></div>`;
  } else {
    const b = fusionBaseSource;
    const s = fusionSacSource;
    const bPet = b ? (b.from==='party'?pets[b.idx]:storage[b.idx]) : null;
    const sPet = s ? (s.from==='party'?pets[s.idx]:storage[s.idx]) : null;

    let previewHtml = '';
    if(bPet && sPet) {
      const gB = FORM_GROUP[bPet.formKey], gS = FORM_GROUP[sPet.formKey];
      const fk = gB && gS ? getFusionKey(gB,gS) : null;
      const ff = fk ? FINAL_FORMS[fk] : null;
      const stoneOk = hasFusionStone;
      const goldOk  = gold >= FUSION_GOLD_COST;
      const fb = ff ? FORMS[bPet.formKey]||{hp:60,atk:12,spd:10,def:4} : null;
      const fs = ff ? FORMS[sPet.formKey]||{hp:60,atk:12,spd:10,def:4} : null;
      const bHp  = ff ? Math.round(((Math.max(0,bPet.maxHp-fb.hp)+Math.max(0,sPet.maxHp-fs.hp))/2)*0.5) : 0;
      const bAtk = ff ? Math.round(((Math.max(0,bPet.atk-fb.atk)+Math.max(0,sPet.atk-fs.atk))/2)*0.5) : 0;
      const bSpd = ff ? Math.round(((Math.max(0,bPet.spd-fb.spd)+Math.max(0,sPet.spd-fs.spd))/2)*0.5) : 0;
      const bDef = ff ? Math.round(((Math.max(0,bPet.def-fb.def)+Math.max(0,sPet.def-fs.def))/2)*0.5) : 0;
      const bothShiny = bPet.shiny && sPet.shiny;
      const oneShiny  = bPet.shiny !== sPet.shiny;
      const shinyNote = bothShiny ? ' ✨ SHINY!' : oneShiny ? ' (50% Shiny)' : ' (2% Shiny)';
      const sm = bothShiny ? 1.2 : 1;
      const pHp  = ff ? Math.round((ff.hp +bHp)*sm) : 0;
      const pAtk = ff ? Math.round((ff.atk+bAtk)*sm) : 0;
      const pSpd = ff ? Math.round((ff.spd+bSpd)*sm) : 0;
      const pDef = ff ? Math.round((ff.def+bDef)*sm) : 0;
      const hasBonus = bHp||bAtk||bSpd||bDef;
      previewHtml = ff ? `
        <div style="padding:10px;border-radius:10px;background:#0a0014;border:2px solid ${ff.color};margin-bottom:4px">

          <div style="font-family:Orbitron,monospace;font-size:16px;font-weight:900;color:${ff.color};text-align:center">${ff.name}</div>

          <div style="font-size:10px;color:#a090d0;text-align:center;margin-top:3px">${ff.passiveIcon} ${P(ff)}</div>

      <div style="flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:6px;background:#09091e;border-radius:0 0 16px 16px;border-top:2px solid ${col}">
        <div style="font-family:Orbitron,monospace;font-size:15px;font-weight:700;color:${p.shiny?'#ffd700':col};text-align:center">${p.shiny?'✨ ':''}${petName(p)}</div>
        <div style="font-size:11px;color:#8878b8;text-align:center">${f?f.name:p.phase==='larva'?'LARVA':'EGG'}</div>
        <div style="display:flex;align-items:center;gap:6px">
          <div style="flex:1;height:5px;background:#0a0a20;border-radius:3px;overflow:hidden"><div style="width:${hpPct}%;height:100%;background:linear-gradient(90deg,#2ecc71,#27ae60);border-radius:3px"></div></div>
          <span style="font-size:10px;color:#8878b8">${p.hp}/${p.maxHp}</span>
        </div>
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:4px;text-align:center;padding:6px;background:#08080f;border-radius:8px">
          <div><div style="font-size:16px;font-weight:700;color:#e0e0ff">${p.maxHp}</div><div style="font-size:9px;color:#4a4a7a">HP</div></div>
          <div><div style="font-size:16px;font-weight:700;color:#ff8888">${p.atk}</div><div style="font-size:9px;color:#4a4a7a">ATK</div></div>
          <div><div style="font-size:16px;font-weight:700;color:#88ffcc">${p.spd}</div><div style="font-size:9px;color:#4a4a7a">SPD</div></div>
          <div><div style="font-size:16px;font-weight:700;color:#8888ff">${p.def}</div><div style="font-size:9px;color:#4a4a7a">DEF</div></div>
        </div>
        <div style="padding:6px 10px;border-radius:8px;background:#08080f;border:1px solid #2a2a3a">
          <div style="font-size:11px;color:#8878b8;font-family:Orbitron,monospace;margin-bottom:4px">SYMBOLS</div>
          <div style="display:flex;gap:6px;flex-wrap:wrap">
            ${p.symbols.length ? p.symbols.map(s=>`<span style="color:${SYMS[s].color};display:inline-flex;align-items:center;gap:3px">${symSvg(s,14)} ${SYMS[s].name}</span>`).join('') : `<span style="font-size:11px;color:#4a4a6a">${T('ไม่มี','none')}</span>`}
          </div>
        </div>
        ${passiveInfo}
        <div style="padding:6px 10px;border-radius:8px;background:#08080f;border:1px solid #2a2a3a">
          <div style="font-size:11px;color:#8878b8;font-family:Orbitron,monospace;margin-bottom:4px">ARTIFACT</div>
          <div style="font-size:12px;color:${artGc};margin-bottom:2px">${art ? `${art.icon} ${N(art)}` : T('— slot 1 ว่าง','— slot 1 empty')}</div>
          <div style="font-size:12px;color:${artGc2}">${art2 ? `${art2.icon} ${N(art2)}` : T('— slot 2 ว่าง','— slot 2 empty')}</div>
        </div>
        <div data-storagedetailclose style="padding:10px;border-radius:10px;background:#1a1a3a;border:1px solid #3a3a6a;font-family:Orbitron,monospace;font-size:12px;color:#8878b8;text-align:center;cursor:pointer">${T('✕ ปิด','✕ CLOSE')}</div>
      </div>
    </div>`;
  })() : '';

  // Collection: build detail overlay for a single form
  const collDetailData = (() => {
    if(!collectionDetailKey) return null;
    const unlockedEvolved = seenEvolved;
    const unlockedFinal   = seenFinal;
    const isFinal = collectionDetailKey.includes('+');
    const form = isFinal ? FINAL_FORMS[collectionDetailKey] : FORMS[collectionDetailKey];
    if(!form) return null;
    const ok = isFinal ? unlockedFinal.has(collectionDetailKey) : unlockedEvolved.has(collectionDetailKey);
    return { form, isFinal, ok };
  })();

  const collDetailOverlay = collDetailData ? (()=>{
    const { form, isFinal, ok } = collDetailData;
    const col = ok ? form.color : '#2a2a4a';
    const symsHtml = !isFinal
      ? collectionDetailKey.split('').map(s=>`<div style="display:flex;align-items:center;gap:4px;padding:6px 10px;border-radius:8px;background:#0a0a18;border:1px solid ${SYMS[s].color}44"><span style="color:${SYMS[s].color};display:inline-flex;align-items:center">${symSvg(s,20)}</span><span style="font-size:11px;color:${SYMS[s].color}">${SYMS[s].name}</span></div>`).join('')
      : '';
    return `
    <div style="position:absolute;inset:0;background:#09091e;z-index:50;border-radius:16px;display:flex;flex-direction:column;border:1px solid #2a2a4a">
      <div style="padding:12px 14px 8px;display:flex;align-items:center;gap:8px;border-bottom:1px solid ${col}44">
        <span style="font-family:Orbitron,monospace;font-size:12px;font-weight:700;color:${col};flex:1;text-align:center">${ok?form.name:'???'}</span>
      </div>
      <div style="flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;align-items:center;gap:14px">
        <div style="${ok?'':'filter:brightness(0) invert(1) opacity(0.25)'};width:120px;height:120px;display:flex;align-items:center;justify-content:center">${buildEvolvedSvg(collectionDetailKey,110,ok)}</div>
        ${ok ? `
        <div style="width:100%;padding:10px 14px;border-radius:10px;background:#08080f;border:1px solid ${col}44">
          <div style="font-family:Orbitron,monospace;font-size:10px;color:#4a4a7a;margin-bottom:6px">${isFinal?'FUSION FORM':'EVOLVED FORM'}</div>
          <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;text-align:center">

function renderExpedition() {
  labelStrip.textContent = '🌑 EXPEDITION';
  const now = Date.now();

  // Pets available to send (not active, not egg)
  const available = pets.map((p,i)=>({p,i})).filter(({p,i})=> p.phase!=='egg');

  if(available.length === 0) {
    screenContent.innerHTML = `
      <div style="width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;text-align:center">
        <div style="font-size:34px">🌑</div>
        <div style="font-family:Orbitron,monospace;font-size:13px;color:#8878b8">${T('ต้องมีสัตว์เลี้ยงตัวที่ 2 ขึ้นไป<br>ที่ไม่ใช่ไข่เพื่อส่งสำรวจ','Need at least 2 non-egg beasts to send on Expedition')}</div>
        <div style="font-size:11px;color:#6858a0">${T('ไปที่ PARTY เพื่อเพิ่มสัตว์เลี้ยง','Go to PARTY to add more beasts')}</div>
      </div>`;
    return;
  }

  const petCards = available.map(({p, i}) => {
    const f = p.formKey ? FORMS[p.formKey] : null;
    const nameColor = f ? f.color : '#c0a0ff';
    const onExp = !!p.expedition;

    if(onExp) {
      const rem = Math.max(0, p.expedition.endTime - now);
      const expDef = EXPEDITIONS.find(e=>e.type===p.expedition.type);
      const pct = Math.round((1 - rem / expDef.duration) * 100);
      const isReady = !!p.expedition.ready;
      return `
        <div style="padding:8px 10px;border-radius:10px;border:2px solid ${isReady?'#00ffaa':'#ffaa00'};background:${isReady?'rgba(0,255,170,0.04)':'rgba(255,170,0,0.04)'}">
          <div style="display:flex;align-items:center;gap:8px">
            <div style="width:34px;height:34px;flex-shrink:0;display:flex;align-items:center;justify-content:center;overflow:visible">${buildPetSvg(p,34,true)}</div>
            <div style="flex:1;min-width:0">
              <div style="font-family:Orbitron,monospace;font-size:12px;color:${nameColor};font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${petName(p)}</div>
              <div style="font-size:10px;color:${isReady?'#00ffaa':'#ffaa00'};margin-top:1px">${expDef.icon} ${expDef.label}</div>
              <div style="height:4px;background:#0a0a15;border-radius:2px;overflow:hidden;margin-top:4px">
                <div style="width:${pct}%;height:100%;background:${isReady?'linear-gradient(90deg,#00ffaa,#00cc88)':'linear-gradient(90deg,#ffaa00,#ff6600)'};border-radius:2px"></div>
              </div>
            </div>
            ${isReady
              ? `<div onclick="completeExpedition(${i})" style="padding:6px 10px;border-radius:8px;background:#003322;border:2px solid #00ffaa;font-family:Orbitron,monospace;font-size:11px;color:#00ffaa;text-align:center;cursor:pointer;flex-shrink:0;animation:shiny-pulse 1s ease-in-out infinite">✅<br>COLLECT</div>`
              : `<div style="font-family:Orbitron,monospace;font-size:12px;color:#ffaa00;flex-shrink:0;text-align:right"><span data-countdown="${p.expedition.endTime}">${fmtTime(rem)}</span><br><div data-recallpet="${i}" style="font-size:9px;color:#ff6060;cursor:pointer;margin-top:4px;background:#2a0a0a;border:1px solid #6a2a2a;border-radius:4px;padding:2px 6px;font-family:Orbitron,monospace;letter-spacing:1px">✕ RECALL</div></div>`
            }
          </div>
        </div>`;
    }

    const expBtns = EXPEDITIONS.map(e=>`
      <div data-sendexp="${i}" data-exptype="${e.type}" style="flex:1;padding:6px 4px;border-radius:8px;background:#0a0a18;border:1px solid #2a2a4a;text-align:center;cursor:pointer">
        <div style="font-size:18px">${e.icon}</div>
        <div style="font-family:Orbitron,monospace;font-size:10px;color:#8080c0;margin-top:1px">${e.label}</div>
        <div style="font-size:9px;color:#7060aa">${fmtTime(e.duration)}</div>
        <div style="font-size:9px;color:#6858a0">${e.rewardMin}-${e.rewardMax} items</div>
      </div>`).join('');

    return `
      <div style="padding:8px 10px;border-radius:10px;border:1px solid #2a2a4a;background:#0a0a14">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
          <div style="width:34px;height:34px;flex-shrink:0;display:flex;align-items:center;justify-content:center;overflow:visible">${buildPetSvg(p,34,true)}</div>
          <div>
            <div style="font-family:Orbitron,monospace;font-size:12px;color:${nameColor};font-weight:700">${petName(p)}</div>
            <div style="font-size:9px;color:#7060aa">HP ${p.hp}/${p.maxHp} ● ATK ${p.atk} ● SPD ${p.spd}</div>
          </div>
        </div>
        <div style="display:flex;gap:5px">${expBtns}</div>
      </div>`;
  }).join('');

  let collectPopupHtml = '';
  if(expeditionCollectPopup) {
    const ep = expeditionCollectPopup;
    const gainedHtml = ep.gained.map(t => {
      const item = ITEMS[t];
      return item
        ? `<div style="display:flex;align-items:center;gap:8px;padding:5px 8px;background:#0a0a18;border-radius:6px;border:1px solid #2a2a4a">
            <span style="font-size:20px">${item.icon}</span>
            <span style="font-family:Orbitron,monospace;font-size:11px;color:${item.color||'#c0b0ff'}">${N(item)}</span>
           </div>`
        : `<div style="font-size:11px;color:#8878b8;padding:4px 8px">${t}</div>`;
    }).join('');
    collectPopupHtml = `
      <div style="position:absolute;inset:0;background:rgba(0,0,0,0.82);display:flex;align-items:center;justify-content:center;z-index:200;border-radius:inherit">
        <div style="background:#10101e;border:2px solid #5a3a9a;border-radius:14px;padding:18px 16px;width:88%;max-width:280px;display:flex;flex-direction:column;gap:10px">
          <div style="font-family:Orbitron,monospace;font-size:13px;color:#c0a0ff;text-align:center;letter-spacing:1px">📦 EXPEDITION RETURN</div>
          <div style="font-size:11px;color:#8878b8;text-align:center">${ep.petName} — ${ep.expLbl}</div>
          <div style="display:flex;align-items:center;gap:6px;background:#0a0a18;border-radius:8px;padding:7px 12px;border:1px solid #3a2a5a">
            <span style="font-size:18px">💰</span>
            <span style="font-family:Orbitron,monospace;font-size:13px;color:#ffd700;font-weight:700">+${ep.goldGain}G</span>
          </div>
          <div style="display:flex;flex-direction:column;gap:5px;max-height:140px;overflow-y:auto">${gainedHtml || T('<div style="color:#6858a0;font-size:11px;text-align:center">ไม่ได้รับไอเทม</div>','<div style="color:#6858a0;font-size:11px;text-align:center">No items received</div>')}</div>
          <div style="display:flex;gap:8px;margin-top:4px">
            <button id="expCollectCancel" style="flex:1;padding:8px;background:#1a1a2e;border:1px solid #4a3a6a;border-radius:8px;color:#8878b8;font-family:Orbitron,monospace;font-size:11px;cursor:pointer">${T('ยกเลิก','CANCEL')}</button>
            <button id="expCollectConfirm" style="flex:2;padding:8px;background:linear-gradient(135deg,#4a2a8a,#6a3ab0);border:none;border-radius:8px;color:#fff;font-family:Orbitron,monospace;font-size:11px;cursor:pointer;font-weight:700">${T('✓ รับของ','✓ Collect')}</button>
          </div>
        </div>
      </div>`;
  }

  screenContent.innerHTML = `
    <div style="width:100%;height:100%;display:flex;flex-direction:column;gap:8px;padding:2px 0;position:relative">
      <div style="font-family:Orbitron,monospace;font-size:12px;color:#8878b8;text-align:center;letter-spacing:1px">SEND PETS ON EXPEDITION</div>
      <div style="flex:1;display:flex;flex-direction:column;gap:8px;overflow-y:auto">${petCards}</div>
      <div style="font-size:10px;color:#6858a0;text-align:center;font-family:Orbitron,monospace">${T('กลับมาอัตโนมัติ ● แจ้งในเกม','Returns automatically ● notified in-game')}</div>
      ${collectPopupHtml}
    </div>`;

  document.getElementById('expCollectConfirm')?.addEventListener('click', confirmExpeditionCollect);
  document.getElementById('expCollectCancel')?.addEventListener('click', ()=>{ expeditionCollectPopup=null; render(); });
}

function renderInventory() {
  labelStrip.textContent = '🎒 INVENTORY';
  const now = Date.now();

  const buffHtml = ['atk','spd','def'].map(stat=>{
    const rem = buffRemaining(stat);
    if(!rem) return '';
    const icons = {atk:'🔥',spd:'💨',def:'🛡'};
    const labels = {atk:'ATK +8',spd:'SPD +8',def:'DEF +6'};
    return `<div style="display:flex;align-items:center;gap:6px;padding:4px 8px;background:#0a1a0a;border-radius:6px;border:1px solid #2a4a2a">
      <span>${icons[stat]}</span>
      <span style="font-size:11px;font-family:Orbitron,monospace;color:#4ecdc4;flex:1">${labels[stat]}</span>
      <span data-countdown="${Date.now()+rem}" style="font-size:11px;color:#2ecc71">${fmtTime(rem)}</span>
    </div>`;
  }).join('');

  const SELL_PRICE = {
    hp_potion:5, super_potion:10, max_potion:15, power_shard:15, speed_shard:15, guard_shard:15,
    map_scroll:20, energy_drink:25, revive:50,
    perm_atk:80, perm_spd:80, perm_def:80, perm_hp:80,
    mystery_egg:100, shiny_egg:500, box_R:150, box_E:400, sym_F:10, sym_W:10, sym_S:10,
    fusion_stone:30, artifact_box:40, essence:25,
  };

  // === ARTIFACTS TAB ===
  const ART_SELL_PRICE = {N:20, R:60, E:200};
  const gradeOrder = {E:0, R:1, N:2};
  const sortedArtifactBag = [...artifactBag].sort((a,b)=>{
    const aa = ARTIFACTS[a.key], ab = ARTIFACTS[b.key];
    if(!aa||!ab) return 0;
    if(invArtSort==='grade') return (gradeOrder[aa.grade]??9)-(gradeOrder[ab.grade]??9);
    return (N(aa)||'').localeCompare(N(ab)||'');
  });
  const artifactTabHtml = artifactBag.length ? sortedArtifactBag.map(slot=>{
    const art = ARTIFACTS[slot.key];
    if(!art) return '';
    const gradeColor = art.grade==='E'?'#ff9944':art.grade==='R'?'#4488ff':'#b0b0c0';
    const gradeBorder = art.grade==='E'?'#cc6600':art.grade==='R'?'#2255cc':'#4a4a6a';
    const artSellPrice = ART_SELL_PRICE[art.grade]||20;
    return `
      <div style="display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;background:${invSellMode?'#1a0a00':'#0a0a18'};border:1px solid ${invSellMode?'#cc6600':gradeBorder}">
        <span style="font-size:24px">${art.icon}</span>
        <div style="flex:1">
          <div style="font-family:Orbitron,monospace;font-size:13px;color:${gradeColor}">${N(art)} <span style="font-size:10px">[${art.grade}]</span></div>
          <div style="font-size:11px;color:#7060aa;margin-top:2px">${D(art)}</div>
        </div>
        ${slot.qty>1?`<div style="font-family:Orbitron,monospace;font-size:13px;color:#c0a0ff;min-width:24px;text-align:center">×${slot.qty}</div>`:''}
        ${invSellMode
          ? `<div data-sell-artifact="${slot.key}" style="padding:6px 12px;border-radius:8px;background:#3a1a00;border:2px solid #cc6600;font-family:Orbitron,monospace;font-size:12px;color:#ffaa44;cursor:pointer;white-space:nowrap;font-weight:bold">💰 ${artSellPrice}G${slot.qty>1?` <span style="color:#cc8833;font-size:10px">(×${slot.qty})</span>`:''}</div>`
          : `<div data-equip-bag-artifact="${slot.key}" style="padding:6px 10px;border-radius:8px;background:#1a1a3a;border:1px solid ${gradeBorder};font-family:Orbitron,monospace;font-size:11px;color:${gradeColor};cursor:pointer;white-space:nowrap">${T('ใส่ ▶','Equip ▶')}</div>`}
      </div>`;
  }).join('') : `<div style="text-align:center;color:#6858a0;font-size:13px;padding:20px">${T('ยังไม่มี Artifact','No Artifacts yet')}<br><span style="font-size:11px">${T('ผ่านทุก 10 ชั้นในหอคอยเพื่อรับ','Clear every 10 Tower floors to earn')}</span></div>`;

  // === ITEMS TAB ===
  const itemHtml = inventory.length ? inventory.map(slot=>{
    const it = ITEMS[slot.type];
    if(!it) return '';
    const sellPrice = SELL_PRICE[slot.type] || 0;
    if(invSellMode) {
      return `
        <div style="display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;background:#1a0a0a;border:1px solid #4a1a1a">

          <div style="flex:1">
            <div style="font-family:Orbitron,monospace;font-size:13px;color:${it.color}">${N(it)}</div>
            <div style="font-size:11px;color:#5a3a3a;margin-top:2px">${D(it)}</div>

          <div style="font-family:Orbitron,monospace;font-size:15px;color:#c0a0ff;min-width:24px;text-align:center">×${slot.qty}</div>

            ? `<div data-sellitem="${slot.type}" style="padding:6px 12px;border-radius:8px;background:#3a1a00;border:2px solid #cc6600;font-family:Orbitron,monospace;font-size:12px;color:#ffaa44;cursor:pointer;white-space:nowrap;font-weight:bold">💰 ${sellPrice}G</div>`
            : `<div style="padding:6px 10px;font-size:11px;color:#3a3a3a">—</div>`}
        </div>`;
    }
    if(slot.type.startsWith('box_')) {

          <span style="position:relative;display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;font-size:24px">${slot.type==='box_R'?`📦<span style="position:absolute;top:-2px;right:-4px;font-size:12px">💜</span>`:slot.type==='box_E'?`📦<span style="position:absolute;top:-2px;right:-4px;font-size:12px">✨</span>`:it.icon}</span>

            <div style="font-size:11px;color:#7060aa;margin-top:2px">${D(it)}</div>

      : it.icon;
    return `
      <div style="display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;background:#0e0e22;border:1px solid #2a2a5a">

        <div data-useitem="${slot.type}" style="flex:1;cursor:pointer">
          <div style="font-family:Orbitron,monospace;font-size:13px;color:${it.color}">${N(it)}</div>

      <div style="background:#0e0e22;border:2px solid #cc6600;border-radius:14px;padding:20px 24px;text-align:center;width:220px">

                 : petPhase==='evolved' ? (FORMS[targetPet.formKey]?.color||'#c0a0ff')
                 : '#9070b8';
    const petLabel = petPhase==='final'?'FINAL':petPhase==='evolved'?'EVOLVED':petPhase.toUpperCase();
    const petSvg = buildPetSvg(targetPet, 40, true);
    const showNav = pets.length > 1;
    return `
    <div style="position:absolute;inset:0;background:rgba(0,0,0,0.8);display:flex;align-items:center;justify-content:center;z-index:11;border-radius:16px">
      <div style="background:#0a0a1e;border:2px solid #6040c0;border-radius:14px;padding:20px 24px;text-align:center;width:230px">
        <div style="font-size:34px;margin-bottom:6px">${it.icon}</div>
        <div style="font-family:Orbitron,monospace;font-size:16px;color:#c0a0ff;margin-bottom:4px">${N(it)}</div>
        <div style="font-size:12px;color:#9080b8;margin-bottom:12px;line-height:1.6;padding:0 4px">${D(it)}</div>
        <div style="background:#0e0e28;border:1px solid #3a2a6a;border-radius:8px;padding:8px 8px;margin-bottom:14px;display:flex;align-items:center;gap:6px">
          ${showNav?`<div id="itemUsePrev" style="font-size:18px;color:#6050a0;cursor:pointer;padding:0 4px;user-select:none">‹</div>`:''}
          <div style="width:44px;height:44px;border-radius:50%;background:${petCol}22;border:2px solid ${petCol};display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden">
            ${petSvg}
          </div>
          <div style="text-align:left;flex:1;min-width:0">
            <div style="font-family:Orbitron,monospace;font-size:9px;color:${petCol};letter-spacing:1px">${petLabel}</div>
            <div style="font-family:Orbitron,monospace;font-size:12px;color:#e0c0ff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${petName}</div>
            <div style="font-size:10px;color:#7060a0;margin-top:1px">HP ${targetPet?.hp||0}/${targetPet?.maxHp||0}</div>
          </div>
          ${showNav?`<div id="itemUseNext" style="font-size:18px;color:#6050a0;cursor:pointer;padding:0 4px;user-select:none">›</div>`:''}
        </div>
        ${showNav?`<div style="font-size:10px;color:#504870;margin-bottom:10px;font-family:Orbitron,monospace">${itemUseTargetIdx+1} / ${pets.length}</div>`:''}
        <div style="display:flex;gap:10px;justify-content:center">
          <div id="itemUseCancel" style="flex:1;padding:9px;border-radius:8px;background:#1a1a3a;border:1px solid #3a3a6a;font-family:Orbitron,monospace;font-size:12px;color:#8080c0;cursor:pointer;text-align:center">${T('ยกเลิก','CANCEL')}</div>
          <div id="itemUseConfirmBtn" data-usetype="${itemUseConfirm.type}" style="flex:1;padding:9px;border-radius:8px;background:#1a0a3a;border:2px solid #8040ff;font-family:Orbitron,monospace;font-size:12px;color:#c080ff;cursor:pointer;text-align:center;font-weight:bold">${T('✓ ใช้เลย','✓ USE')}</div>
        </div>
      </div>
    </div>`;
  })();

  const bagArtOverlay = (() => {
    if(!bagArtifactPending) return '';
    const art = ARTIFACTS[bagArtifactPending];
    if(!art) return '';
    const gradeColor = art.grade==='E'?'#ff9944':art.grade==='R'?'#4488ff':'#b0b0c0';
    const equippable = pets.filter(p=>p.phase!=='egg');
    return `
    <div style="position:absolute;inset:0;background:rgba(0,0,0,0.85);display:flex;align-items:center;justify-content:center;z-index:12;border-radius:16px">
      <div style="background:#0a0a18;border:2px solid ${gradeColor};border-radius:14px;padding:16px 18px;width:240px;display:flex;flex-direction:column;gap:8px">
        <div style="text-align:center">
          <div style="font-size:30px">${art.icon}</div>
          <div style="font-family:Orbitron,monospace;font-size:14px;color:${gradeColor}">${N(art)}</div>
          <div style="font-size:11px;color:#8878b8;margin-top:2px">${D(art)}</div>
        </div>
        <div style="font-family:Orbitron,monospace;font-size:11px;color:#6858a0;text-align:center">${T('ใส่ให้ใคร?','Equip to which beast?')}</div>
        ${equippable.map(p=>{
          const realIdx = pets.indexOf(p);
          const cur = p.artifact ? ARTIFACTS[p.artifact] : null;
          const curColor = cur?(cur.grade==='E'?'#ff9944':cur.grade==='R'?'#4488ff':'#b0b0c0'):'#3a3a5a';
          return `<div data-bag-equip-pet="${realIdx}" style="display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:8px;border:1px solid #2a2a4a;background:#0e0e22;cursor:pointer">
            <div style="width:32px;height:32px;display:flex;align-items:center;justify-content:center">${buildPetSvg(p,30,true)}</div>
            <div style="flex:1;min-width:0">
              <div style="font-family:Orbitron,monospace;font-size:12px;color:#c0a0ff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${petName(p)}</div>
              <div style="font-size:10px;color:${curColor}">${cur?`${cur.icon} ${cur.name}`:T('ว่างอยู่','empty')}</div>
            </div>
            <div style="font-family:Orbitron,monospace;font-size:11px;color:#ffaa00">${T('ใส่','Equip')}</div>
          </div>`;
        }).join('')}
        <div id="bagArtCancel" style="padding:7px;border-radius:8px;background:#0e0e1a;border:1px solid #2a2a4a;font-family:Orbitron,monospace;font-size:11px;color:#5050a0;text-align:center;cursor:pointer">${T('ยกเลิก','CANCEL')}</div>
      </div>
    </div>`;
  })();

  const invToastHtml = invToast ? `
    <div id="invToastOverlay" style="position:absolute;inset:0;background:#000000aa;z-index:99;display:flex;align-items:center;justify-content:center;padding:20px">
      <div style="background:#0e0e22;border:2px solid #5040a0;border-radius:14px;padding:20px 24px;display:flex;flex-direction:column;align-items:center;gap:14px;max-width:240px;text-align:center">
        <div style="font-size:28px">${invToast.match(/^[\p{Emoji}]/u)?.[0]||'ℹ️'}</div>
        <div style="font-size:13px;color:#c0b0ff;line-height:1.5">${invToast}</div>
        <div id="invToastClose" style="padding:8px 24px;border-radius:8px;background:#1a0a3a;border:2px solid #8040ff;font-family:Orbitron,monospace;font-size:12px;color:#c080ff;cursor:pointer">OK</div>
      </div>
    </div>` : '';

  screenContent.innerHTML = `
    <div style="width:100%;height:100%;display:flex;flex-direction:column;gap:8px;padding:2px 0;position:relative">
      ${invToastHtml}
      ${buffHtml ? `<div style="display:flex;flex-direction:column;gap:4px">${buffHtml}</div>` : ''}
      <div style="display:flex;gap:4px">
        <div data-inv-tab="items" style="flex:1;padding:6px;border-radius:8px;text-align:center;font-family:Orbitron,monospace;font-size:11px;cursor:pointer;
          border:1px solid ${invTab==='items'?'#6040c0':'#2a2a4a'};background:${invTab==='items'?'#1a0a3a':'#0a0a1a'};color:${invTab==='items'?'#c0a0ff':'#5050a0'}">
          🎒 ITEMS <span style="color:#6858a0">${inventory.length}/${MAX_INV}</span>
        </div>
        <div data-inv-tab="artifacts" style="flex:1;padding:6px;border-radius:8px;text-align:center;font-family:Orbitron,monospace;font-size:11px;cursor:pointer;
          border:1px solid ${invTab==='artifacts'?'#cc6600':'#2a2a4a'};background:${invTab==='artifacts'?'#1a0800':'#0a0a1a'};color:${invTab==='artifacts'?'#ffaa44':'#5050a0'}">
          💎 ARTIFACTS <span style="color:#6858a0">${artifactBag.reduce((a,s)=>a+s.qty,0)}</span>
        </div>
        ${(invTab==='items'||invTab==='artifacts')?`<div id="invModeBtn" style="padding:6px 10px;border-radius:8px;border:1px solid ${invSellMode?'#cc6600':'#2a2a5a'};background:${invSellMode?'#2a0e00':'#0a0a1a'};font-family:Orbitron,monospace;font-size:11px;color:${invSellMode?'#ffaa44':'#5050a0'};cursor:pointer;white-space:nowrap">
          ${invSellMode?'💰 SELL':'💰'}
        </div>`:''}
        ${invTab==='artifacts'?`<div id="invArtSortBtn" style="padding:6px 10px;border-radius:8px;border:1px solid #2a3a4a;background:#0a0a1a;font-family:Orbitron,monospace;font-size:11px;color:#5080a0;cursor:pointer;white-space:nowrap">
          ${invArtSort==='grade'?'⬆ GRADE':'⬆ NAME'}
        </div>`:''}
      </div>
      <div style="flex:1;display:flex;flex-direction:column;gap:6px;overflow-y:auto">${invTab==='artifacts'?artifactTabHtml:itemHtml}</div>
      ${invSellArtConfirm ? (()=>{
        const a = ARTIFACTS[invSellArtConfirm];
        const price = {N:20,R:60,E:200}[a?.grade]||20;
        const gc = a?.grade==='E'?'#ff9944':a?.grade==='R'?'#4488ff':'#b0b0c0';
        const slot = artifactBag.find(s=>s.key===invSellArtConfirm);
        return `<div style="position:absolute;inset:0;background:rgba(0,0,0,0.88);display:flex;align-items:center;justify-content:center;z-index:50;border-radius:inherit">
          <div style="background:#0a0a18;border:2px solid #cc6600;border-radius:14px;padding:18px 20px;display:flex;flex-direction:column;gap:12px;width:80%;max-width:280px;align-items:center">
            <div style="font-size:28px">${a?.icon||'💎'}</div>
            <div style="font-family:Orbitron,monospace;font-size:13px;color:${gc};text-align:center">${N(a)} [${a?.grade}]${slot?.qty>1?` ×${slot.qty}`:''}</div>
            <div style="font-family:Orbitron,monospace;font-size:12px;color:#8878b8;text-align:center">${T('ขาย 1 อัน ได้รับ','Sell 1 for')} <span style="color:#ffaa44">${price}G</span>?</div>
            <div style="display:flex;gap:10px;width:100%">
              <div id="sellArtConfirmNo" style="flex:1;padding:8px;border-radius:10px;background:#1a1a3a;border:1px solid #2a2a5a;font-family:Orbitron,monospace;font-size:12px;color:#5050a0;text-align:center;cursor:pointer">${T('ยกเลิก','CANCEL')}</div>
              <div id="sellArtConfirmYes" style="flex:1;padding:8px;border-radius:10px;background:#3a1a00;border:2px solid #cc6600;font-family:Orbitron,monospace;font-size:12px;color:#ffaa44;text-align:center;cursor:pointer;font-weight:bold">💰 ${T('ขาย','SELL')}</div>
            </div>
          </div>
        </div>`;
      })() : ''}
      ${confirmOverlay}
      ${useOverlay}
      ${bagArtOverlay}
      ${(()=>{
        if(!invFullPending) return '';
        const pi = ITEMS[invFullPending.type];
        return `
        <div style="position:absolute;inset:0;background:rgba(0,0,0,0.88);display:flex;flex-direction:column;z-index:300;border-radius:inherit;padding:12px;gap:8px">
          <div style="font-family:Orbitron,monospace;font-size:13px;color:#ffaa44;text-align:center">${T('⚠ กระเป๋าเต็ม!','⚠ Bag full!')} (${MAX_INV}/${MAX_INV})</div>
          <div style="font-size:11px;color:#c0a0ff;text-align:center">${T('ได้รับ:','Received:')} ${pi?.icon||''} <b>${pi?.name||invFullPending.type}</b> ×${invFullPending.qty}<br>${T('ลบไอเทมที่ไม่ต้องการออกก่อน','Drop an item to make room')}</div>
          <div style="flex:1;display:flex;flex-direction:column;gap:5px;overflow-y:auto">
            ${inventory.map((s,i)=>{
              const it = ITEMS[s.type];
              return `<div style="display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:8px;background:#0a0a18;border:1px solid #2a2a4a">
                <span style="font-size:20px">${it?.icon||'?'}</span>
                <div style="flex:1">
                  <div style="font-family:Orbitron,monospace;font-size:11px;color:${it?.color||'#c0b0ff'}">${it?.name||s.type}</div>
                  <div style="font-size:10px;color:#6858a0">×${s.qty}</div>
                </div>
                <div data-invfulldrop="${i}" style="padding:5px 10px;border-radius:7px;background:#1a0808;border:1px solid #5a2020;font-family:Orbitron,monospace;font-size:10px;color:#ff4444;cursor:pointer">${T('🗑 ลบ','🗑 Drop')}</div>
              </div>`;
            }).join('')}
          </div>
          <div data-invfullcancel style="padding:8px;border-radius:8px;background:#0a0a1a;border:1px solid #2a2a4a;font-family:Orbitron,monospace;font-size:11px;color:#6858a0;text-align:center;cursor:pointer">${T('ยกเลิก (ทิ้งของที่ได้)','CANCEL (discard received item)')}</div>
        </div>`;
      })()}
    </div>`;
}

function toggleRest(idx) {
  const p = pets[idx];
  if(!p || p.phase==='egg' || p.expedition) return;
  p.resting = !p.resting;
  if(p.resting && p.hp<=0) p.deadRestUntil = p.phase==='larva' ? 0 : Date.now() + 5*60*1000;
  if(!p.resting) p.deadRestUntil = 0;
  saveGame();
}

function renderReplay() {
  labelStrip.textContent = '🔄 REPLAY STAGE';
  const maxStage = hardMode ? stage : stage - 1;
  const stageList = Array.from({length: maxStage}, (_,i) => i+1);
  panel.innerHTML = `
    <div style="display:flex;flex-direction:column;gap:10px;padding:10px;height:100%;overflow-y:auto">
      <div style="font-family:Orbitron,monospace;font-size:11px;color:#8878b8;text-align:center;letter-spacing:2px">เลือก Stage ที่จะ Replay</div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px">
        ${stageList.map(s=>`
          <div data-replay-stage="${s}" style="cursor:pointer;background:#0e0e22;border:1px solid rgba(100,80,200,0.5);border-radius:10px;padding:10px 4px;text-align:center;font-family:Orbitron,monospace;font-size:12px;color:#c0a0ff;transition:all 0.15s" onmouseover="this.style.background='#1a1a33'" onmouseout="this.style.background='#0e0e22'">
            ${s<=5?'🌿':s<=10?'🏜':s<=15?'🌋':'⚡'}
            <div style="font-size:14px;font-weight:900;margin-top:2px">S${s}</div>
          </div>`).join('')}
      </div>
    </div>`;
  panel.querySelectorAll('[data-replay-stage]').forEach(el => {
    el.addEventListener('click', () => {
      const s = parseInt(el.dataset.replayStage);
      replayStage = s;
      genScoutGrid();
      scoutPos = {x:0, y:0};
      state = 'scout';
      render();
    });
  });
}

function enterScout() {
  if(creature.expedition) { scoutToast=T('🌑 ตัวนี้กำลัง Expedition อยู่ เปลี่ยน Active ก่อน!','🌑 This beast is on Expedition — switch Active first!'); render(); return; }
  if(creature.resting) { scoutToast=T('🛌 กำลังพักอยู่ ออกจาก Rest ก่อน!','🛌 Beast is resting — stop Rest first!'); render(); return; }
  if(!scoutGrid.length) { genScoutGrid(); scoutPos={x:0,y:0}; }
  state='scout'; render();
}

// ============================================================
// BOOT
// ============================================================
// Migrate old save → slot 1
(()=>{
  const hasSlots = [1,2,3].some(n=>localStorage.getItem(SLOT_KEY(n)));
  if(!hasSlots) {
    const old = localStorage.getItem(SAVE_KEY_BASE) || localStorage.getItem(SAVE_KEY_OLD);
    if(old) localStorage.setItem(SLOT_KEY(1), old);
  }
})();

function checkDailyScrolls() {
  const today = new Date().toISOString().slice(0,10);
  if(lastScrollDay !== today) {
    lastScrollDay = today;
    addItemToInventory('map_scroll');
    addItemToInventory('map_scroll');
    scoutToast = T('🗺️ ได้รับ Map Scroll ฟรี 2 อัน (รายวัน)!','🗺️ Received 2 free Map Scrolls (daily)!');
    saveGame();
  }
}

// Check if opened via Duel link
(function() {
  const duelData = parseDuelUrl();
  if(duelData) {
    duelUrlData = duelData;
    duelMode = duelData.mode;
    duelEnemyTeam = duelData.team.map(p=>({...p,hp:p.maxHp}));
    duelSelectStep = 'team';
    vsTab = 'duel';
    state = 'vs_lobby';
  } else {
    state = 'title';
  }
})();
render();


// Resting pets regen +1 HP every 5s, auto-exit when full
setInterval(() => {
  let changed = false;
  pets.forEach(p => {
    if(!p.resting || p.phase==='egg') return;
    if(p.hp<=0 && Date.now() < (p.deadRestUntil||0)) return;
    if(p.hp >= p.maxHp) { p.resting = false; changed = true; return; }
    p.hp = Math.min(p.maxHp, p.hp + (p.phase==='larva' ? 2 : 1)); changed = true;
  });
  // storage regen
  storage.forEach(p => {
    if(p.phase==='egg' || p.hp >= p.maxHp) return;
    p.hp = Math.min(p.maxHp, p.hp + 1); changed = true;
  });
  if(changed) { saveGame(); if(state==='party'||state==='menu') render(); }
}, 5000);

// Passive regen for non-resting pets (+1 HP every 30s, only if HP>0)
setInterval(() => {
  let changed = false;
  pets.forEach(p => {
    if(p.resting || p.phase==='egg' || p.hp<=0 || p.hp>=p.maxHp) return;
    p.hp = Math.min(p.maxHp, p.hp + (p.phase==='larva' ? 2 : 1)); changed = true;
  });
  if(changed) { saveGame(); if(state==='party'||state==='menu') render(); }
}, 30000);

// Expedition countdown refresh every second — update text only, no full render
setInterval(() => {
  if(state !== 'expedition' && state !== 'party') return;
  const now = Date.now();
  // update [data-countdown] elements in-place
  document.querySelectorAll('[data-countdown]').forEach(el => {
    const end = parseInt(el.dataset.countdown);
    const rem = Math.max(0, end - now);
    if(rem === 0) { render(); return; } // trigger full render when timer expires
    el.textContent = fmtTime(rem);
  });
  // update [data-countdown-status] for party card status lines
  document.querySelectorAll('[data-countdown-status]').forEach(el => {
    const end = parseInt(el.dataset.countdownStatus);
    const lbl = el.dataset.label || '';
    const rem = Math.max(0, end - now);
    if(rem === 0) { render(); return; }
    el.textContent = `🌑 ${lbl} — ${fmtTime(rem)}`;
  });
}, 1000);

// Stamina regen 1 AP per minute
setInterval(() => {
  if(stamina < MAX_STAMINA) {
    stamina = Math.min(MAX_STAMINA, stamina + 1);
    saveGame();
    if(state==='scout' || state==='menu') render();
  }
}, 60000);
</script>
</body>
</html>
